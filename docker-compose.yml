services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ebay_automation
      POSTGRES_USER: ebay
      POSTGRES_PASSWORD: ebay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebay -d ebay_automation"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ebay:ebay@postgres:5432/ebay_automation
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/app:/app/app

  worker:
    build:
      context: ./apps/api
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ebay:ebay@postgres:5432/ebay_automation
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/app:/app/app

  beat:
    build:
      context: ./apps/api
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://ebay:ebay@postgres:5432/ebay_automation
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api/app:/app/app

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/components:/app/components
      - ./apps/web/lib:/app/lib

volumes:
  postgres_data:

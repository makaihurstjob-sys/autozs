<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06110d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/autozs-icon.svg" />
  <title>AutoZS Mobile</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06110d;
      --panel: #101b16;
      --panel-2: #13241e;
      --panel-3: #18352d;
      --line: #263a33;
      --line-strong: #38564c;
      --text: #f4fbf7;
      --muted: #a7b8b0;
      --muted-2: #7f9189;
      --accent: #55c8b8;
      --accent-2: #168777;
      --blue: #58a8ff;
      --warn: #f2a642;
      --danger: #ee7b5b;
      --ok: #36d17d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% -20%, rgba(85, 200, 184, 0.08), transparent 40%),
        var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    button, select, a { font: inherit; color: inherit; }
    button { cursor: pointer; }
    .shell {
      width: min(100%, 460px);
      margin: 0 auto;
      padding: 22px 18px 30px;
    }
    .hero {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: #020403;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }
    .logo img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      display: block;
    }
    .top-controls {
      min-width: 0;
      display: grid;
      gap: 9px;
    }
    .store-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px 38px;
      gap: 7px;
      align-items: center;
    }
    .store-picker-wrap { position: relative; min-width: 0; }
    .store-picker {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #091510;
      color: var(--text);
      font-size: 18px;
      font-weight: 850;
      padding: 0 42px 0 14px;
      appearance: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .store-picker-wrap::after {
      content: "⌄";
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-56%);
      color: var(--text);
      font-size: 25px;
      pointer-events: none;
    }
    .privacy .store-picker {
      color: transparent;
      text-shadow: 0 0 10px rgba(244, 251, 247, 0.72);
    }
    .icon-btn {
      min-width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(85, 200, 184, 0.62);
      background: #123b34;
      color: var(--text);
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      line-height: 1;
    }
    .icon-btn.muted { background: #13241f; border-color: var(--line); color: var(--muted); }
    .icon-btn svg {
      width: 19px;
      height: 19px;
      stroke-width: 2.4;
    }
    .status-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
    }
    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      display: inline-block;
      background: var(--danger);
      margin-right: 2px;
    }
    .status-dot.ok { background: var(--ok); }
    .worker-pill {
      border: 1px solid rgba(88, 168, 255, 0.74);
      color: var(--blue);
      background: rgba(31, 84, 137, 0.14);
      border-radius: 999px;
      min-height: 31px;
      padding: 3px 12px;
      display: inline-flex;
      align-items: center;
      font-weight: 900;
      font-size: 15px;
      max-width: 100%;
    }
    .worker-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dashboard-banner {
      min-height: 84px;
      border-radius: 9px;
      border: 1px solid #35b6a3;
      background: linear-gradient(180deg, #1c9583, #177d6f);
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      margin-bottom: 22px;
    }
    .dashboard-banner h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0;
      line-height: 1;
    }
    .segments {
      width: min(100%, 330px);
      min-height: 52px;
      margin: 0 auto 26px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0b1712;
      padding: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .segment {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 950;
      font-size: 18px;
    }
    .segment.active {
      background: #173e35;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(85, 200, 184, 0.62);
    }
    .error {
      display: none;
      margin: -8px 0 18px;
      color: #ffb39f;
      background: #311913;
      border: 1px solid #633627;
      border-radius: 8px;
      padding: 12px;
      font-weight: 750;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      min-height: 112px;
      border: 1px solid var(--line);
      background: rgba(16, 27, 22, 0.98);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: inset 0 0 0 3px rgba(42, 58, 52, 0.38);
      display: grid;
      align-content: space-between;
    }
    .stat-card label {
      display: block;
      color: var(--muted);
      font-size: 15px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .stat-card strong {
      display: block;
      text-align: center;
      color: #b7c7c0;
      font-size: clamp(36px, 13vw, 62px);
      font-weight: 350;
      line-height: 0.95;
      letter-spacing: 0;
    }
    .stat-card.money strong { font-size: clamp(31px, 10vw, 48px); }
    .queue-tools {
      display: none;
      gap: 9px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin: 0 -3px 13px;
    }
    .queue-tools.visible { display: flex; }
    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      min-height: 40px;
      padding: 0 15px;
      white-space: nowrap;
      font-weight: 950;
      font-size: 16px;
    }
    .chip.active {
      color: var(--text);
      border-color: var(--accent);
      background: #17342d;
    }
    .queue-summary {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .queue-summary.visible { display: grid; }
    .mini-metric {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 11px;
    }
    .mini-metric label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .mini-metric strong {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-top: 6px;
    }
    .alert-list {
      display: none;
      gap: 10px;
    }
    .alert-list.visible { display: grid; }
    .alert {
      border: 1px solid var(--line);
      background: var(--panel);
      border-left: 6px solid var(--accent);
      border-radius: 8px;
      padding: 15px;
    }
    .alert.critical { border-left-color: var(--danger); }
    .alert.warning { border-left-color: var(--warn); }
    .alert.info { border-left-color: var(--blue); }
    .alert-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .alert-title {
      flex: 1;
      min-width: 0;
      font-size: 20px;
      font-weight: 950;
      line-height: 1.18;
    }
    .pill {
      background: #263b34;
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .pill.critical { color: #ffb39f; background: #4b2017; }
    .pill.warning { color: #ffd18a; background: #3b2c12; }
    .message {
      color: var(--muted);
      line-height: 1.34;
      margin: 11px 0 0;
      font-size: 16px;
    }
    .meta {
      color: var(--muted-2);
      font-size: 13px;
      word-break: break-word;
      margin-top: 9px;
    }
    .alert-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .small-btn {
      border: 1px solid var(--line);
      background: #24352f;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 12px;
      font-weight: 950;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .small-btn.accent { background: #16796a; border-color: #209a88; }
    .small-btn.danger { background: #7d3e2d; border-color: #9d4f39; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 850;
    }
    .dashboard-link {
      display: block;
      text-align: center;
      color: var(--muted);
      text-decoration: none;
      font-weight: 850;
      margin-top: 18px;
    }
    @media (max-width: 380px) {
      .shell { padding-left: 12px; padding-right: 12px; }
      .hero { grid-template-columns: 58px minmax(0, 1fr); gap: 11px; }
      .logo { width: 56px; height: 56px; }
      .logo img { width: 50px; height: 50px; }
      .store-row { grid-template-columns: minmax(0, 1fr) 34px 34px; }
      .icon-btn { min-width: 34px; height: 34px; }
      .store-picker { font-size: 16px; min-height: 40px; }
      .dashboard-banner h1 { font-size: 29px; }
      .stats-grid { gap: 10px; }
      .stat-card { min-height: 100px; padding: 13px; border-radius: 15px; }
      .stat-card label { font-size: 13px; }
      .segment { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" id="hero">
      <div class="logo"><img src="/autozs-icon.svg" alt="AutoZS" /></div>
      <div class="top-controls">
        <div class="store-row">
          <div class="store-picker-wrap">
            <select class="store-picker" id="store-picker" aria-label="Store">
              <option value="all">All stores</option>
            </select>
          </div>
          <button class="icon-btn muted" id="privacy-button" type="button" aria-label="Toggle privacy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/><path d="m4 4 16 16"/></svg>
          </button>
          <button class="icon-btn" id="notify-button" type="button" aria-label="Enable notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.3 21a2 2 0 0 0 3.4 0"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/></svg>
          </button>
        </div>
        <div class="status-row">
          <span class="status-dot" id="api-dot"></span><span id="api-status">API checking</span>
          <span class="worker-pill"><span id="worker-status">Worker checking</span></span>
        </div>
      </div>
    </section>

    <section class="dashboard-banner">
      <h1>Dashboard</h1>
    </section>

    <section class="segments" aria-label="Mobile view">
      <button class="segment active" data-view="stats" type="button">Stats</button>
      <button class="segment" data-view="queue" type="button">Worker Queue</button>
    </section>

    <div class="error" id="error-box"></div>

    <section class="stats-grid" id="stats-view">
      <div class="stat-card"><label>Active</label><strong id="active-count">-</strong></div>
      <div class="stat-card money"><label>30D Revenue</label><strong id="revenue-30d">-</strong></div>
      <div class="stat-card"><label>Scheduled</label><strong id="scheduled-count">-</strong></div>
      <div class="stat-card money"><label>1W Revenue</label><strong id="revenue-7d">-</strong></div>
      <div class="stat-card"><label>Orders</label><strong id="orders-count">-</strong></div>
      <div class="stat-card"><label>Drafts</label><strong id="drafts-count">-</strong></div>
    </section>

    <section class="queue-summary" id="queue-summary">
      <div class="mini-metric"><label>Running</label><strong id="running-count">0</strong></div>
      <div class="mini-metric"><label>Queued</label><strong id="queued-count">0</strong></div>
      <div class="mini-metric"><label>Attention</label><strong id="attention-count">0</strong></div>
    </section>

    <section class="queue-tools" id="queue-tools" aria-label="Queue filters">
      <button class="chip active" data-filter="active" type="button">Active</button>
      <button class="chip" data-filter="open" type="button">Open</button>
      <button class="chip" data-filter="acknowledged" type="button">Ack</button>
      <button class="chip" data-filter="dismissed" type="button">Dismissed</button>
      <button class="chip" data-filter="all" type="button">All</button>
    </section>

    <section class="alert-list" id="alerts"></section>
    <a class="dashboard-link" id="dashboard-link" href="/">Open full dashboard</a>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get("api") || defaultApiBase()).replace(/\/$/, "");
    const dashboardUrl = `${window.location.origin}/?api=${encodeURIComponent(apiBase)}`;
    const seenKey = `autozs-mobile-seen-alerts:${apiBase}`;
    const storeKey = `autozs-mobile-store:${apiBase}`;
    const privacyKey = "autozs-mobile-privacy";
    let selectedFilter = "active";
    let selectedView = "stats";
    let selectedStore = localStorage.getItem(storeKey) || "all";
    let privacyMode = localStorage.getItem(privacyKey) === "true";
    let lastAlerts = [];
    let seenAlerts = new Set(JSON.parse(localStorage.getItem(seenKey) || "[]"));
    let pushConfig = null;
    let serviceWorkerRegistration = null;

    document.getElementById("dashboard-link").href = dashboardUrl;
    document.getElementById("notify-button").addEventListener("click", enableNotifications);
    document.getElementById("privacy-button").addEventListener("click", togglePrivacy);
    document.getElementById("store-picker").addEventListener("change", (event) => {
      selectedStore = event.target.value || "all";
      localStorage.setItem(storeKey, selectedStore);
      refresh();
    });
    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });
    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        selectedFilter = button.dataset.filter;
        document.querySelectorAll("[data-filter]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        refresh();
      });
    });

    applyPrivacy();
    setView(selectedView);
    initializePushState();
    refresh();
    setInterval(refresh, 30000);

    function defaultApiBase() {
      if (window.location.hostname.includes(".ts.net")) {
        return `${window.location.protocol}//${window.location.hostname}:8443`;
      }
      return "http://127.0.0.1:8000";
    }

    async function refresh() {
      let health;
      try {
        health = await api("/health");
        updateApiStatus(health);
      } catch (error) {
        updateApiStatus(null);
        setError(error.message || String(error));
        return;
      }

      const results = await Promise.allSettled([
          api("/workers"),
          api("/alerts/summary"),
          api(`/alerts?status=${encodeURIComponent(selectedFilter)}&limit=100`),
          api("/products"),
          api("/ebay/listings"),
          api("/orders"),
          api("/ebay/accounts"),
          api(statsPath(30)),
          api(statsPath(7)),
      ]);
      const failures = results.filter((result) => result.status === "rejected");
      const [
        workers,
        summary,
        alerts,
        products,
        listings,
        orders,
        stores,
        stats30,
        stats7,
      ] = results.map((result) => result.status === "fulfilled" ? result.value : null);

      setError(failures.length
        ? `${failures.length} dashboard section${failures.length === 1 ? "" : "s"} could not refresh.`
        : "");
      if (workers) updateWorker(workers);
      if (stores) updateStores(stores);
      if (products && listings && orders && stats30 && stats7) {
        updateStats({ products, listings, orders, stats30, stats7 });
      }
      if (summary) updateQueueSummary(summary);
      if (alerts) {
        updateAlerts(alerts);
        maybeNotify(alerts);
      }
    }

    async function api(path, options = {}) {
      const response = await fetch(`${apiBase}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!response.ok) throw new Error(`${path} failed with ${response.status}`);
      return response.json();
    }

    function statsPath(range) {
      const account = selectedStore === "all" ? "" : `&account=${encodeURIComponent(selectedStore)}`;
      return `/stats/overview?range=${range}&grain=day${account}`;
    }

    function setView(view) {
      selectedView = view === "queue" ? "queue" : "stats";
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === selectedView);
      });
      document.getElementById("stats-view").style.display = selectedView === "stats" ? "grid" : "none";
      document.getElementById("queue-tools").classList.toggle("visible", selectedView === "queue");
      document.getElementById("queue-summary").classList.toggle("visible", selectedView === "queue");
      document.getElementById("alerts").classList.toggle("visible", selectedView === "queue");
    }

    function updateApiStatus(health) {
      const dot = document.getElementById("api-dot");
      const label = document.getElementById("api-status");
      const online = health && health.status === "ok";
      dot.classList.toggle("ok", online);
      label.textContent = online ? "API online" : "API offline";
    }

    function updateWorker(workers) {
      const current = [...(workers || [])].sort((a, b) => (a.seconds_since_seen ?? 999999) - (b.seconds_since_seen ?? 999999))[0];
      const label = document.getElementById("worker-status");
      if (!current) {
        label.textContent = "Worker offline";
        return;
      }
      const name = current.label || current.worker_id || "Worker";
      const status = current.status || "offline";
      label.textContent = `${name} ${status}`;
    }

    function updateStores(stores) {
      const picker = document.getElementById("store-picker");
      const current = new Set([...picker.options].map((option) => option.value));
      const nextStores = [{ key: "all", label: "All stores" }, ...(stores || []).map((store) => ({
        key: store.key || store.account_id || store.label,
        label: store.label || store.account_id || store.key || "Store",
      }))];
      const nextSignature = nextStores.map((store) => `${store.key}:${store.label}`).join("|");
      if (picker.dataset.signature !== nextSignature) {
        picker.innerHTML = nextStores.map((store) => `<option value="${escAttr(store.key)}">${escapeHtml(store.label)}</option>`).join("");
        picker.dataset.signature = nextSignature;
      }
      if (!current.has(selectedStore) && !nextStores.some((store) => store.key === selectedStore)) {
        selectedStore = "all";
        localStorage.setItem(storeKey, selectedStore);
      }
      picker.value = selectedStore;
    }

    function updateStats({ products, listings, orders, stats30, stats7 }) {
      const scopedListings = selectedStore === "all"
        ? listings
        : listings.filter((listing) => listing.account_id === selectedStore);
      const liveListings = scopedListings.filter((listing) => ["active", "listed", "live"].includes(String(listing.status || "").toLowerCase()));
      const scheduledListings = scopedListings.filter((listing) => String(listing.status || "").toLowerCase() === "scheduled");
      const scheduledProducts = products.filter((product) => product.listing_schedule_at);
      const draftProducts = products.filter((product) => isDraftProduct(product, scopedListings));
      const scopedOrders = selectedStore === "all"
        ? orders
        : orders.filter((order) => order.account_id === selectedStore);

      setText("active-count", liveListings.length);
      setText("scheduled-count", Math.max(scheduledListings.length, scheduledProducts.length));
      setText("orders-count", scopedOrders.length);
      setText("drafts-count", draftProducts.length);
      setText("revenue-30d", money(stats30?.totals?.order_revenue));
      setText("revenue-7d", money(stats7?.totals?.order_revenue));
    }

    function isDraftProduct(product, scopedListings) {
      const status = String(product.status || "").toLowerCase();
      if (["deleted", "tombstoned", "listed", "live", "scheduled"].includes(status)) return false;
      if (product.listing_schedule_at) return false;
      return !scopedListings.some((listing) => Number(listing.product_id) === Number(product.id) && ["active", "listed", "live", "scheduled"].includes(String(listing.status || "").toLowerCase()));
    }

    function updateQueueSummary(summary) {
      const active = Number(summary?.active ?? 0);
      const critical = Number(summary?.critical ?? 0);
      const warning = Number(summary?.warning ?? 0);
      setText("running-count", active);
      setText("queued-count", summary?.open ?? 0);
      setText("attention-count", critical + warning);
    }

    function updateAlerts(alerts) {
      lastAlerts = alerts || [];
      const container = document.getElementById("alerts");
      if (!lastAlerts.length) {
        container.innerHTML = `<div class="empty">No ${escapeHtml(selectedFilter)} queue items right now.</div>`;
        return;
      }
      container.innerHTML = lastAlerts.map((alert) => renderAlert(alert)).join("");
      container.querySelectorAll("[data-alert-action]").forEach((button) => {
        button.addEventListener("click", () => changeAlertStatus(button.dataset.alertId, button.dataset.alertAction));
      });
      container.querySelectorAll("[data-open-alert]").forEach((button) => {
        button.addEventListener("click", () => openAlert(button.dataset.openAlert));
      });
    }

    function renderAlert(alert) {
      const severity = escapeHtml(alert.severity || "warning");
      const status = escapeHtml(alert.status || "open");
      const title = escapeHtml(alert.title || "AutoZS alert");
      const message = escapeHtml(alert.message || "");
      const when = formatDate(alert.last_seen_at);
      const product = alert.product_id ? `Product ${alert.product_id}` : "";
      const job = alert.job_type ? `${alert.job_type} ${alert.job_id || ""}` : "";
      const meta = [alert.source || "AutoZS", product, job, when].filter(Boolean).join(" · ");
      return `
        <article class="alert ${severity}">
          <div class="alert-head">
            <div class="alert-title">${title}</div>
            <span class="pill ${severity}">${status}</span>
          </div>
          <div class="message">${message}</div>
          <div class="meta">${escapeHtml(meta)}</div>
          <div class="alert-actions">
            <button class="small-btn" data-open-alert="${alert.id}" type="button">View</button>
            ${alert.status === "open" ? `<button class="small-btn accent" data-alert-id="${alert.id}" data-alert-action="acknowledged" type="button">Ack</button>` : ""}
            ${alert.status !== "dismissed" ? `<button class="small-btn danger" data-alert-id="${alert.id}" data-alert-action="dismissed" type="button">Dismiss</button>` : ""}
          </div>
        </article>
      `;
    }

    async function changeAlertStatus(id, status) {
      await api(`/alerts/${id}`, {
        method: "PATCH",
        body: JSON.stringify({ status }),
      });
      await refresh();
    }

    function openAlert(id) {
      const alert = lastAlerts.find((item) => String(item.id) === String(id));
      if (alert && alert.action_url) {
        window.open(alert.action_url, "_blank", "noopener");
        return;
      }
      window.open(dashboardUrl, "_blank", "noopener");
    }

    function togglePrivacy() {
      privacyMode = !privacyMode;
      localStorage.setItem(privacyKey, String(privacyMode));
      applyPrivacy();
    }

    function applyPrivacy() {
      document.getElementById("hero").classList.toggle("privacy", privacyMode);
      document.getElementById("privacy-button").classList.toggle("muted", !privacyMode);
    }

    async function enableNotifications() {
      if (!("Notification" in window)) {
        setError("This browser does not support notifications.");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        markNotifications(false);
        return;
      }

      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        markNotifications(true);
        maybeNotify(lastAlerts, true);
        return;
      }

      try {
        pushConfig = await api("/push/config");
        if (!pushConfig.enabled) {
          setError(`Push not configured: ${pushConfig.reason || "missing server keys"}`);
          markNotifications(true);
          maybeNotify(lastAlerts, true);
          return;
        }
        serviceWorkerRegistration = await navigator.serviceWorker.register("/sw.js");
        const existing = await serviceWorkerRegistration.pushManager.getSubscription();
        const subscription = existing || await serviceWorkerRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(pushConfig.public_key),
        });
        const serialized = subscription.toJSON();
        await api("/push/subscriptions", {
          method: "POST",
          body: JSON.stringify({
            endpoint: serialized.endpoint,
            keys: serialized.keys || {},
            label: "iPhone AutoZS",
            user_agent: navigator.userAgent,
            dashboard_url: window.location.href,
          }),
        });
        await api("/push/test", {
          method: "POST",
          body: JSON.stringify({
            title: "AutoZS push enabled",
            body: "Your iPhone will alert you when AutoZS needs attention.",
          }),
        });
        markNotifications(true);
      } catch (error) {
        setError(error.message || String(error));
        markNotifications(false);
      }
    }

    async function initializePushState() {
      if ("Notification" in window && Notification.permission === "granted") markNotifications(true);
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
      try {
        serviceWorkerRegistration = await navigator.serviceWorker.register("/sw.js");
        const subscription = await serviceWorkerRegistration.pushManager.getSubscription();
        if (subscription) markNotifications(true);
      } catch {
        // iOS only enables web push for the installed Home Screen PWA.
      }
    }

    function markNotifications(enabled) {
      document.getElementById("notify-button").classList.toggle("muted", !enabled);
    }

    function maybeNotify(alerts, force = false) {
      if (!("Notification" in window) || Notification.permission !== "granted") return;
      (alerts || []).forEach((alert) => {
        if (!["critical", "warning"].includes(alert.severity)) return;
        if (!force && seenAlerts.has(alert.id)) return;
        seenAlerts.add(alert.id);
        new Notification(alert.title || "AutoZS alert", {
          body: alert.message || `${alert.source || "AutoZS"} needs attention`,
          tag: `autozs-alert-${alert.id}`,
        });
      });
      localStorage.setItem(seenKey, JSON.stringify([...seenAlerts].slice(-500)));
    }

    function setError(message) {
      const box = document.getElementById("error-box");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = message;
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value ?? "-";
    }

    function money(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toLocaleString([], { style: "currency", currency: "USD", maximumFractionDigits: 0 });
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function escAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function urlBase64ToUint8Array(value) {
      const padding = "=".repeat((4 - value.length % 4) % 4);
      const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
      const raw = window.atob(base64);
      const output = new Uint8Array(raw.length);
      for (let index = 0; index < raw.length; index += 1) output[index] = raw.charCodeAt(index);
      return output;
    }
  </script>
</body>

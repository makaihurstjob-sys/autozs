<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06110d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/assets/autozs-logo.png" />
  <title>AutoZS Mobile</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06110d;
      --panel: #101b16;
      --panel-2: #13241e;
      --panel-3: #18352d;
      --line: #263a33;
      --line-strong: #38564c;
      --text: #f4fbf7;
      --muted: #a7b8b0;
      --muted-2: #7f9189;
      --accent: #55c8b8;
      --accent-2: #168777;
      --blue: #58a8ff;
      --warn: #f2a642;
      --danger: #ee7b5b;
      --ok: #36d17d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% -20%, rgba(85, 200, 184, 0.08), transparent 40%),
        var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    button, select, a { font: inherit; color: inherit; }
    button { cursor: pointer; }
    .shell {
      width: min(100%, 430px);
      margin: 0 auto;
      padding: 14px 14px 24px;
    }
    .hero {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 11px;
      align-items: center;
      margin-bottom: 14px;
    }
    .logo {
      width: 50px;
      height: 50px;
      border-radius: 7px;
      background: #000;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }
    .logo img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: block;
    }
    .top-controls {
      min-width: 0;
      display: grid;
      gap: 6px;
    }
    .store-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px 34px;
      gap: 6px;
      align-items: center;
    }
    .store-picker-wrap { position: relative; min-width: 0; }
    .store-picker {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #091510;
      color: var(--text);
      font-size: 16px;
      font-weight: 850;
      padding: 0 42px 0 14px;
      appearance: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .store-picker-wrap::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 9px;
      height: 9px;
      border-right: 2px solid var(--text);
      border-bottom: 2px solid var(--text);
      transform: translateY(-70%) rotate(45deg);
      pointer-events: none;
    }
    .privacy .store-picker {
      color: transparent;
      text-shadow: 0 0 10px rgba(244, 251, 247, 0.72);
    }
    .privacy .store-picker:disabled {
      color: var(--muted);
      text-shadow: none;
      opacity: 1;
      cursor: not-allowed;
    }
    .icon-btn {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(85, 200, 184, 0.62);
      background: #123b34;
      color: var(--text);
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      line-height: 1;
    }
    .icon-btn.muted { background: #13241f; border-color: var(--line); color: var(--muted); }
    .icon-btn svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }
    .status-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
      background: var(--danger);
      margin-right: 2px;
    }
    .status-dot.ok { background: var(--ok); }
    .worker-pill {
      border: 1px solid rgba(88, 168, 255, 0.74);
      color: var(--blue);
      background: rgba(31, 84, 137, 0.14);
      border-radius: 999px;
      min-height: 27px;
      padding: 2px 10px;
      display: inline-flex;
      align-items: center;
      font-weight: 900;
      font-size: 13px;
      max-width: 100%;
    }
    .worker-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dashboard-banner {
      min-height: 54px;
      border-radius: 7px;
      border: 1px solid #35b6a3;
      background: linear-gradient(180deg, #1c9583, #177d6f);
      display: grid;
      place-items: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      margin-bottom: 16px;
      color: var(--text);
      text-decoration: none;
      font-size: 24px;
      font-weight: 950;
    }
    .segments {
      width: min(100%, 330px);
      min-height: 42px;
      margin: 0 auto 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0b1712;
      padding: 4px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .segment {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 950;
      font-size: 15px;
    }
    .segment.active {
      background: #173e35;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(85, 200, 184, 0.62);
    }
    .error {
      display: none;
      margin: -8px 0 18px;
      color: #ffb39f;
      background: #311913;
      border: 1px solid #633627;
      border-radius: 8px;
      padding: 12px;
      font-weight: 750;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-card {
      min-height: 84px;
      border: 1px solid var(--line);
      background: rgba(16, 27, 22, 0.98);
      border-radius: 13px;
      padding: 11px 13px;
      box-shadow: inset 0 0 0 3px rgba(42, 58, 52, 0.38);
      display: grid;
      align-content: space-between;
    }
    .stat-card label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .stat-card strong {
      display: block;
      text-align: center;
      color: var(--text);
      font-size: clamp(30px, 10vw, 42px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0;
    }
    .stat-card.money strong { font-size: clamp(27px, 8vw, 36px); }
    .mobile-calendar {
      display: none;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .mobile-calendar.visible { display: block; }
    .mobile-calendar-toolbar {
      min-height: 48px;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .mobile-calendar-toolbar strong { text-align: center; font-size: 16px; }
    .calendar-nav {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 21px;
    }
    .mobile-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }
    .mobile-calendar-weekday {
      padding: 8px 2px 6px;
      color: var(--muted);
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .mobile-calendar-day {
      position: relative;
      min-width: 0;
      min-height: 43px;
      border: 0;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
    }
    .mobile-calendar-day:nth-child(7n) { border-right: 0; }
    .mobile-calendar-day.muted { color: #53625c; }
    .mobile-calendar-day.selected { background: #173b33; box-shadow: inset 0 0 0 1px var(--accent); }
    .mobile-calendar-day.today .day-number { color: var(--accent); }
    .calendar-dots {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
    }
    .calendar-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
    .calendar-dot.scheduled { background: var(--blue); }
    .calendar-dot.listed { background: var(--ok); }
    .calendar-dot.renewal { background: var(--accent); }
    .calendar-detail {
      border-top: 1px solid var(--line);
      padding: 11px;
      display: grid;
      gap: 9px;
    }
    .calendar-detail-heading { color: var(--muted); font-size: 12px; font-weight: 850; }
    .calendar-mini-card {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 7px;
      background: #0b1813;
    }
    .calendar-mini-card.scheduled { border-left-color: var(--blue); }
    .calendar-mini-card.listed { border-left-color: var(--ok); }
    .calendar-mini-card.renewal { border-left-color: var(--accent); }
    .calendar-mini-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border-radius: 5px;
      background: #fff;
    }
    .calendar-mini-title { font-weight: 900; line-height: 1.2; }
    .calendar-mini-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.3; }
    .calendar-empty { color: var(--muted); font-size: 13px; padding: 4px 0; }
    .queue-summary {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .queue-summary.visible { display: grid; }
    .mini-metric {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 11px;
    }
    .mini-metric label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .mini-metric strong {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-top: 6px;
    }
    .alert-list {
      display: none;
      gap: 10px;
    }
    .alert-list.visible { display: grid; }
    .alert {
      border: 1px solid var(--line);
      background: var(--panel);
      border-left: 6px solid var(--accent);
      border-radius: 8px;
      padding: 15px;
    }
    .alert.critical { border-left-color: var(--danger); }
    .alert.warning { border-left-color: var(--warn); }
    .alert.info { border-left-color: var(--blue); }
    .alert.running { border-left-color: var(--blue); }
    .alert.queued { border-left-color: var(--accent); }
    .alert.attention { border-left-color: var(--danger); }
    .alert.done { border-left-color: var(--ok); }
    .alert-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .alert-title {
      flex: 1;
      min-width: 0;
      font-size: 20px;
      font-weight: 950;
      line-height: 1.18;
    }
    .pill {
      background: #263b34;
      color: var(--accent);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .pill.critical { color: #ffb39f; background: #4b2017; }
    .pill.warning { color: #ffd18a; background: #3b2c12; }
    .pill.running { color: #9ac8ff; background: #17365a; }
    .pill.queued { color: #9ce8dc; background: #173e35; }
    .pill.attention { color: #ffb39f; background: #4b2017; }
    .pill.done { color: #8ce4ae; background: #173b28; }
    .message {
      color: var(--muted);
      line-height: 1.34;
      margin: 11px 0 0;
      font-size: 16px;
    }
    .meta {
      color: var(--muted-2);
      font-size: 13px;
      word-break: break-word;
      margin-top: 9px;
    }
    .revision-prices {
      background: #0b1813;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding: 11px 12px;
    }
    .revision-price-row {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    .revision-price-row span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }
    .revision-price-row strong {
      color: var(--text);
      font-size: 15px;
      text-align: right;
    }
    .alert-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .small-btn {
      border: 1px solid var(--line);
      background: #24352f;
      border-radius: 8px;
      min-height: 42px;
      padding: 0 12px;
      font-weight: 950;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .small-btn.accent { background: #16796a; border-color: #209a88; }
    .small-btn.danger { background: #7d3e2d; border-color: #9d4f39; }
    .small-btn:disabled { cursor: wait; opacity: .55; }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 850;
    }
    .notification-modal[hidden] { display: none; }
    .notification-modal {
      align-items: flex-end;
      background: rgba(3, 8, 6, .72);
      display: flex;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 1000;
    }
    .notification-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -18px 60px rgba(0,0,0,.4);
      max-height: 92vh;
      max-width: 620px;
      overflow: auto;
      padding: 18px 16px calc(24px + env(safe-area-inset-bottom));
      width: 100%;
    }
    .notification-head, .notification-actions, .notification-setting {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: space-between;
    }
    .notification-head h2 { margin: 0; }
    .notification-head p { color: var(--muted); font-size: 12px; margin: 4px 0 0; }
    .notification-status-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin: 16px 0;
    }
    .notification-status {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 5px;
      min-height: 68px;
      padding: 10px;
    }
    .notification-status span, .notification-group small { color: var(--muted); font-size: 11px; }
    .notification-status strong { font-size: 13px; overflow-wrap: anywhere; }
    .notification-status.bad strong { color: #ff9d7f; }
    .notification-status.good strong { color: #70d9c8; }
    .notification-error {
      background: #3a1f17;
      border: 1px solid #6e3427;
      border-radius: 8px;
      color: #ffb39f;
      display: none;
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 12px;
      padding: 10px;
    }
    .notification-actions { flex-wrap: wrap; justify-content: flex-start; margin-bottom: 16px; }
    .notification-actions button { flex: 1 1 120px; }
    .notification-group {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
      padding: 14px 0;
    }
    .notification-group h3 { font-size: 15px; margin: 0; }
    .notification-setting { font-size: 13px; min-height: 32px; }
    .notification-setting input[type="checkbox"] { height: 22px; width: 22px; }
    .notification-setting select, .notification-setting input[type="time"] {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      min-height: 36px;
      padding: 6px 8px;
    }
    @media (max-width: 380px) {
      .shell { padding-left: 10px; padding-right: 10px; }
      .hero { grid-template-columns: 46px minmax(0, 1fr); gap: 9px; }
      .logo, .logo img { width: 44px; height: 44px; }
      .store-row { grid-template-columns: minmax(0, 1fr) 32px 32px; }
      .icon-btn { min-width: 32px; height: 32px; }
      .store-picker { font-size: 15px; min-height: 38px; }
      .dashboard-banner { min-height: 50px; font-size: 22px; }
      .stats-grid { gap: 8px; }
      .stat-card { min-height: 78px; padding: 10px; }
      .stat-card label { font-size: 11px; }
      .segment { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" id="hero">
      <div class="logo"><img src="/assets/autozs-logo.png" alt="AutoZS" /></div>
      <div class="top-controls">
        <div class="store-row">
          <div class="store-picker-wrap">
            <select class="store-picker" id="store-picker" aria-label="Store">
              <option value="all">All stores</option>
            </select>
          </div>
          <button class="icon-btn muted" id="privacy-button" type="button" aria-label="Toggle privacy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/><path d="m4 4 16 16"/></svg>
          </button>
          <button class="icon-btn" id="notify-button" type="button" aria-label="Enable notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10.3 21a2 2 0 0 0 3.4 0"/><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/></svg>
          </button>
        </div>
        <div class="status-row">
          <span class="status-dot" id="api-dot"></span><span id="api-status">API checking</span>
          <span class="worker-pill"><span id="worker-status">Worker checking</span></span>
        </div>
      </div>
    </section>

    <a class="dashboard-banner" id="dashboard-link" href="/">Dashboard</a>

    <section class="segments" aria-label="Mobile view">
      <button class="segment active" data-view="stats" type="button">Stats</button>
      <button class="segment" data-view="queue" type="button">Worker Queue</button>
    </section>

    <div class="error" id="error-box"></div>

    <section class="stats-grid" id="stats-view">
      <div class="stat-card"><label>Listings</label><strong id="active-count">-</strong></div>
      <div class="stat-card money"><label>30D Revenue</label><strong id="revenue-30d">-</strong></div>
      <div class="stat-card"><label>Scheduled</label><strong id="scheduled-count">-</strong></div>
      <div class="stat-card money"><label>1W Revenue</label><strong id="revenue-7d">-</strong></div>
      <div class="stat-card"><label>Orders</label><strong id="orders-count">-</strong></div>
      <div class="stat-card"><label>Drafts</label><strong id="drafts-count">-</strong></div>
      <div class="stat-card"><label>30D Views</label><strong id="views-30d">-</strong></div>
      <div class="stat-card"><label>1W Views</label><strong id="views-7d">-</strong></div>
    </section>

    <section class="mobile-calendar" id="mobile-calendar" aria-label="Listing calendar">
      <div class="mobile-calendar-toolbar">
        <button class="calendar-nav" id="calendar-prev" type="button" aria-label="Previous month">&#8249;</button>
        <strong id="calendar-month-label">Calendar</strong>
        <button class="calendar-nav" id="calendar-next" type="button" aria-label="Next month">&#8250;</button>
      </div>
      <div class="mobile-calendar-grid" id="calendar-grid"></div>
      <div class="calendar-detail" id="calendar-detail"></div>
    </section>

    <section class="queue-summary" id="queue-summary">
      <div class="mini-metric"><label>Running</label><strong id="running-count">0</strong></div>
      <div class="mini-metric"><label>Queued</label><strong id="queued-count">0</strong></div>
      <div class="mini-metric"><label>Attention</label><strong id="attention-count">0</strong></div>
    </section>

    <section class="alert-list" id="alerts"></section>
  </main>

  <div class="notification-modal" id="notification-modal" hidden>
    <div class="notification-panel" role="dialog" aria-modal="true" aria-labelledby="notification-title">
      <div class="notification-head">
        <div><h2 id="notification-title">Notifications</h2><p>Delivery health and alerts for this iPhone</p></div>
        <button class="icon-btn" id="notification-close" type="button" aria-label="Close notification settings">&times;</button>
      </div>
      <div class="notification-status-grid">
        <div class="notification-status" id="notification-permission-status"><span>iPhone</span><strong>Checking</strong></div>
        <div class="notification-status" id="notification-subscription-status"><span>Subscription</span><strong>Checking</strong></div>
        <div class="notification-status" id="notification-delivery-status"><span>Delivery</span><strong>Checking</strong></div>
      </div>
      <div class="notification-error" id="notification-error"></div>
      <div class="notification-actions">
        <button class="small-btn accent" id="notification-setup" type="button">Set up</button>
        <button class="small-btn" id="notification-repair" type="button">Repair</button>
        <button class="small-btn" id="notification-test" type="button">Send test</button>
      </div>
      <div id="notification-preferences"></div>
      <button class="small-btn accent" id="notification-save" type="button" style="width:100%;margin-top:8px">Save notification settings</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const apiBase = (params.get("api") || defaultApiBase()).replace(/\/$/, "");
    const dashboardUrl = `${window.location.origin}/?api=${encodeURIComponent(apiBase)}`;
    const businessTimeZone = "America/New_York";
    const storeKey = `autozs-mobile-store:${apiBase}`;
    const privacyKey = "autozs-mobile-privacy";
    let selectedView = params.get("view") === "queue" ? "queue" : "stats";
    let selectedStore = localStorage.getItem(storeKey) || "all";
    let privacyMode = localStorage.getItem(privacyKey) === "true";
    let pushConfig = null;
    let serviceWorkerRegistration = null;
    let browserPushSubscription = null;
    let currentPushSubscription = null;
    let calendarMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let calendarSelectedDate = localDateKey(new Date());
    let calendarEvents = [];

    document.getElementById("dashboard-link").href = dashboardUrl;
    document.getElementById("notify-button").addEventListener("click", openNotificationSettings);
    document.getElementById("notification-close").addEventListener("click", closeNotificationSettings);
    document.getElementById("notification-modal").addEventListener("click", (event) => {
      if (event.target.id === "notification-modal") closeNotificationSettings();
    });
    document.getElementById("notification-setup").addEventListener("click", () => enableNotifications(false));
    document.getElementById("notification-repair").addEventListener("click", () => enableNotifications(true));
    document.getElementById("notification-test").addEventListener("click", sendNotificationTest);
    document.getElementById("notification-save").addEventListener("click", saveNotificationSettings);
    document.getElementById("privacy-button").addEventListener("click", togglePrivacy);
    document.getElementById("store-picker").addEventListener("change", (event) => {
      selectedStore = event.target.value || "all";
      localStorage.setItem(storeKey, selectedStore);
      refresh();
    });
    document.getElementById("calendar-prev").addEventListener("click", () => shiftCalendarMonth(-1));
    document.getElementById("calendar-next").addEventListener("click", () => shiftCalendarMonth(1));
    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });

    applyPrivacy();
    setView(selectedView);
    initializePushState();
    refresh();
    setInterval(refresh, 30000);

    function defaultApiBase() {
      if (window.location.hostname.includes(".ts.net")) {
        return `${window.location.protocol}//${window.location.hostname}:8443`;
      }
      return "http://127.0.0.1:8000";
    }

    async function refresh() {
      let health;
      try {
        health = await api("/health");
        updateApiStatus(health);
      } catch (error) {
        updateApiStatus(null);
        setError("Windows API unavailable. Open Tailscale on this iPhone, confirm it is connected, then refresh AutoZS.");
        return;
      }

      const results = await Promise.allSettled([
        api("/workers"),
        api("/products"),
        api("/ebay/listings"),
        api("/listing-jobs"),
        api("/source-refresh/jobs"),
        api("/ebay/revision-jobs"),
        api("/ebay/revision-batches"),
        api("/orders"),
        api("/ebay/accounts"),
        api(statsPath(30)),
        api(statsPath(7)),
        api(viewSummaryPath()),
      ]);
      const failures = results.filter((result) => result.status === "rejected");
      const [
        workers,
        products,
        listings,
        listingJobs,
        sourceRefreshJobs,
        revisionJobs,
        revisionBatches,
        orders,
        stores,
        stats30,
        stats7,
        viewSummary,
      ] = results.map((result) => result.status === "fulfilled" ? result.value : null);

      setError(failures.length
        ? `${failures.length} dashboard section${failures.length === 1 ? "" : "s"} could not refresh.`
        : "");
      if (workers) updateWorker(workers);
      if (stores) updateStores(stores);
      if (products && listings && listingJobs && orders && stats30 && stats7) {
        updateStats({ products, listings, listingJobs, orders, stats30, stats7 });
        updateMobileCalendar({ products, listings, listingJobs });
      }
      if (viewSummary) updateViewStats(viewSummary);
      if (listingJobs && sourceRefreshJobs && revisionJobs && revisionBatches) {
        updateWorkerQueue({ listingJobs, sourceRefreshJobs, revisionJobs, revisionBatches });
      }
    }

    async function api(path, options = {}) {
      const response = await fetch(`${apiBase}${path}`, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });
      if (!response.ok) {
        let detail = "";
        try {
          const payload = await response.json();
          detail = payload.detail || payload.message || "";
        } catch {
          detail = await response.text().catch(() => "");
        }
        throw new Error(detail || `${path} failed with ${response.status}`);
      }
      return response.json();
    }

    function statsPath(range) {
      const account = selectedStore === "all" ? "" : `&account=${encodeURIComponent(selectedStore)}`;
      return `/stats/overview?range=${range}&grain=day${account}`;
    }

    function viewSummaryPath() {
      return selectedStore === "all"
        ? "/ebay/listing-views/summary"
        : `/ebay/listing-views/summary?account_key=${encodeURIComponent(selectedStore)}`;
    }

    function setView(view) {
      selectedView = view === "queue" ? "queue" : "stats";
      document.querySelectorAll("[data-view]").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === selectedView);
      });
      document.getElementById("stats-view").style.display = selectedView === "stats" ? "grid" : "none";
      document.getElementById("mobile-calendar").classList.toggle("visible", selectedView === "stats");
      document.getElementById("queue-summary").classList.toggle("visible", selectedView === "queue");
      document.getElementById("alerts").classList.toggle("visible", selectedView === "queue");
    }

    function updateApiStatus(health) {
      const dot = document.getElementById("api-dot");
      const label = document.getElementById("api-status");
      const online = health && health.status === "ok";
      dot.classList.toggle("ok", online);
      label.textContent = online ? "API online" : "API offline";
    }

    function updateWorker(workers) {
      const current = [...(workers || [])].sort((a, b) => (a.seconds_since_seen ?? 999999) - (b.seconds_since_seen ?? 999999))[0];
      const label = document.getElementById("worker-status");
      if (!current) {
        label.textContent = "Worker offline";
        return;
      }
      const name = current.label || current.worker_id || "Worker";
      const status = current.status || "offline";
      label.textContent = `${name} ${status}`;
    }

    function updateStores(stores) {
      const picker = document.getElementById("store-picker");
      const current = new Set([...picker.options].map((option) => option.value));
      const nextStores = [{ key: "all", label: "All stores" }, ...(stores || []).map((store) => ({
        key: store.key || store.account_id || store.label,
        label: mobileStoreDisplayName(store),
      }))];
      const nextSignature = nextStores.map((store) => `${store.key}:${store.label}`).join("|");
      if (picker.dataset.signature !== nextSignature) {
        picker.innerHTML = nextStores.map((store) => `<option value="${escAttr(store.key)}" data-label="${escAttr(store.label)}">${escapeHtml(store.label)}</option>`).join("");
        picker.dataset.signature = nextSignature;
      }
      if (!current.has(selectedStore) && !nextStores.some((store) => store.key === selectedStore)) {
        selectedStore = "all";
        localStorage.setItem(storeKey, selectedStore);
      }
      picker.value = selectedStore;
      applyPrivacy();
    }

    function mobileStoreDisplayName(store) {
      const label = String(store?.label || store?.key || "Store").trim();
      const accountId = String(store?.account_id || "").trim();
      if (!accountId || accountId === label) return label;
      return `${label} (${accountId})`;
    }

    function updateStats({ products, listings, listingJobs, orders, stats30, stats7 }) {
      const scopedListings = selectedStore === "all"
        ? listings
        : listings.filter((listing) => listing.account_id === selectedStore);
      const scopedJobs = selectedStore === "all"
        ? listingJobs
        : listingJobs.filter((job) => job.ebay_account_key === selectedStore || job.account_key === selectedStore || job.account_id === selectedStore);
      const latestJobByProduct = new Map();
      [...scopedJobs]
        .sort((a, b) => apiDateMs(b.updated_at) - apiDateMs(a.updated_at))
        .forEach((job) => {
          const productId = Number(job.product_id);
          if (productId && !latestJobByProduct.has(productId)) latestJobByProduct.set(productId, job);
        });
      const now = Date.now();
      const listingIsDue = (listing) => {
        const job = latestJobByProduct.get(Number(listing.product_id));
        const start = apiDateMs(job?.listing_schedule_at, NaN);
        return Number.isFinite(start) && start <= now && job?.status === "completed";
      };
      const liveListings = scopedListings.filter((listing) => {
        const status = String(listing.status || "").toLowerCase();
        return ["active", "listed", "live"].includes(status) || (status === "scheduled" && listingIsDue(listing));
      });
      const scheduledListings = scopedListings.filter((listing) => {
        const status = String(listing.status || "").toLowerCase();
        return status === "scheduled" && !listingIsDue(listing);
      });
      const representedProductIds = new Set(scopedListings.map((listing) => Number(listing.product_id)).filter(Boolean));
      const pendingScheduledJobs = scopedJobs.filter((job) =>
        job.listing_schedule_at
        && !representedProductIds.has(Number(job.product_id))
        && ["queued", "running", "needs_review", "ready_to_save", "saved_draft"].includes(String(job.status || "").toLowerCase())
      );
      const draftProducts = products.filter((product) => isDraftProduct(product, scopedListings));
      const scopedOrders = selectedStore === "all"
        ? orders
        : orders.filter((order) => order.account_id === selectedStore);

      setText("active-count", liveListings.length);
      setText("scheduled-count", scheduledListings.length + pendingScheduledJobs.length);
      setText("orders-count", scopedOrders.length);
      setText("drafts-count", draftProducts.length);
      setText("revenue-30d", money(stats30?.totals?.order_revenue));
      setText("revenue-7d", money(stats7?.totals?.order_revenue));
    }

    function updateViewStats(summary) {
      setText("views-30d", Number(summary?.views_30d || 0).toLocaleString());
      setText("views-7d", Number(summary?.views_7d || 0).toLocaleString());
    }

    function isDraftProduct(product, scopedListings) {
      const status = String(product.status || "").toLowerCase();
      if (["deleted", "tombstoned", "listed", "live", "scheduled"].includes(status)) return false;
      if (product.listing_schedule_at) return false;
      return !scopedListings.some((listing) => Number(listing.product_id) === Number(product.id) && ["active", "listed", "live", "scheduled"].includes(String(listing.status || "").toLowerCase()));
    }

    function updateWorkerQueue({ listingJobs, sourceRefreshJobs, revisionJobs, revisionBatches }) {
      const entries = [
        ...listingJobs.map((job) => workerQueueEntry("Listing", job, workerQueueGroup(job.status))),
        ...latestSourceRefreshJobs(sourceRefreshJobs).map((job) => workerQueueEntry("Price refresh", job, workerQueueGroup(job.status))),
        ...revisionJobs.filter((job) => job.status !== "cancelled").map((job) => workerQueueEntry("Revision", job, workerQueueGroup(job.status))),
        ...revisionBatches.map((job) => workerQueueEntry("Revision batch", job, revisionBatchGroup(job.status))),
      ].sort((a, b) => {
        const groupOrder = { running: 0, attention: 1, queued: 2, other: 3, done: 4 };
        const groupDelta = (groupOrder[a.group] ?? 5) - (groupOrder[b.group] ?? 5);
        return groupDelta || apiDateMs(b.updatedAt) - apiDateMs(a.updatedAt);
      }).slice(0, 40);
      const counts = entries.reduce((result, entry) => {
        if (entry.group === "running") result.running += 1;
        if (entry.group === "queued") result.queued += 1;
        if (entry.group === "attention") result.attention += 1;
        return result;
      }, { running: 0, queued: 0, attention: 0 });
      setText("running-count", counts.running);
      setText("queued-count", counts.queued);
      setText("attention-count", counts.attention);

      const container = document.getElementById("alerts");
      if (!entries.length) {
        container.innerHTML = `<div class="empty">No worker jobs yet.</div>`;
        return;
      }
      container.innerHTML = entries.map(renderWorkerQueueEntry).join("");
      wireRevisionReviewActions(container);
    }

    function latestSourceRefreshJobs(jobs = []) {
      const latestByProduct = new Map();
      [...jobs]
        .sort((a, b) => apiDateMs(b.updated_at || b.created_at) - apiDateMs(a.updated_at || a.created_at) || Number(b.id || 0) - Number(a.id || 0))
        .forEach((job) => {
          const key = job.product_id === null || job.product_id === undefined ? `job-${job.id}` : `product-${job.product_id}`;
          if (!latestByProduct.has(key)) latestByProduct.set(key, job);
        });
      return [...latestByProduct.values()];
    }

    function workerQueueEntry(kind, job, group) {
      const title = job.title || job.filename || job.sku || `${kind} #${job.id}`;
      const subtitle = kind === "Revision batch"
        ? `${job.account_key || "unknown account"} · ${Number(job.rows_total || 0)} revision${Number(job.rows_total || 0) === 1 ? "" : "s"}`
        : kind === "Revision"
          ? `${job.listing_id || "No listing id"} · ${job.ebay_account_key || "manual"}`
          : `${job.sku || `Product ${job.product_id || "-"}`} · ${job.batch_key || job.ebay_account_key || "worker"}`;
      return {
        kind,
        id: job.id,
        group,
        status: job.status || "unknown",
        title,
        subtitle,
        message: job.message || job.guard_reason || "",
        updatedAt: job.updated_at || job.created_at || job.scheduled_for,
        attempts: job.attempts || 0,
        revisionJob: kind === "Revision" ? job : null,
      };
    }

    function workerQueueGroup(status) {
      const normalized = String(status || "").toLowerCase();
      if (normalized === "running") return "running";
      if (normalized === "queued") return "queued";
      if (["failed", "needs_review", "paused"].includes(normalized)) return "attention";
      if (["completed", "saved_draft", "ready_to_save", "tombstoned", "cancelled"].includes(normalized)) return "done";
      return "other";
    }

    function revisionBatchGroup(status) {
      const normalized = String(status || "").toLowerCase();
      if (["uploading", "waiting_results"].includes(normalized)) return "running";
      if (normalized === "prepared") return "queued";
      if (["needs_review", "failed"].includes(normalized)) return "attention";
      if (["completed", "cancelled"].includes(normalized)) return "done";
      return "other";
    }

    function renderWorkerQueueEntry(entry) {
      const meta = [entry.subtitle, entry.updatedAt ? `Updated ${formatDate(entry.updatedAt)}` : "", `${entry.attempts} attempt(s)`].filter(Boolean).join(" · ");
      const revision = entry.revisionJob;
      const canReviewRevision = revision && ["needs_review", "failed", "paused"].includes(String(revision.status || "").toLowerCase());
      return `
        <article class="alert ${escapeHtml(entry.group)}">
          <div class="alert-head">
            <div class="alert-title">${escapeHtml(entry.kind)} #${escapeHtml(entry.id)} · ${escapeHtml(entry.title)}</div>
            <span class="pill ${escapeHtml(entry.group)}">${escapeHtml(entry.status)}</span>
          </div>
          ${entry.message ? `<div class="message">${escapeHtml(entry.message)}</div>` : ""}
          ${revision ? renderRevisionPrices(revision) : ""}
          <div class="meta">${escapeHtml(meta)}</div>
          <div class="alert-actions">
            ${revision?.source_url ? `<a class="small-btn" href="${escAttr(revision.source_url)}" target="_blank" rel="noopener noreferrer">Open source</a>` : ""}
            ${canReviewRevision ? `<button class="small-btn accent" type="button" data-revision-approve="${escapeHtml(revision.id)}">Approve</button><button class="small-btn danger" type="button" data-revision-disapprove="${escapeHtml(revision.id)}">Disapprove</button>` : ""}
            <a class="small-btn" href="${escAttr(dashboardUrl)}">View</a>
          </div>
        </article>
      `;
    }

    function renderRevisionPrices(job) {
      const ebayDelta = `${moneyExact(job.old_price)} → ${moneyExact(job.target_price)}`;
      const sourceDelta = job.source_price === null || job.source_price === undefined
        ? "Price unavailable"
        : `${moneyExact(job.old_source_price ?? job.source_price)} → ${moneyExact(job.source_price)}`;
      const shipping = Number(job.source_shipping || 0) > 0 ? ` + ${moneyExact(job.source_shipping)} shipping` : "";
      return `
        <div class="revision-prices">
          <div class="revision-price-row"><span>Source price</span><strong>${escapeHtml(sourceDelta + shipping)}</strong></div>
          <div class="revision-price-row"><span>eBay price</span><strong>${escapeHtml(ebayDelta)}</strong></div>
        </div>
      `;
    }

    function wireRevisionReviewActions(container) {
      container.querySelectorAll("[data-revision-approve]").forEach((button) => {
        button.addEventListener("click", () => reviewRevisionFromCard(button, "approve"));
      });
      container.querySelectorAll("[data-revision-disapprove]").forEach((button) => {
        button.addEventListener("click", () => reviewRevisionFromCard(button, "disapprove"));
      });
    }

    async function reviewRevisionFromCard(button, action) {
      const jobId = button.dataset.revisionApprove || button.dataset.revisionDisapprove;
      const approving = action === "approve";
      const promptText = approving
        ? "Approve this guarded eBay price revision? AutoZS will add it to the worker queue."
        : "Disapprove and cancel this proposed eBay price revision?";
      if (!window.confirm(promptText)) return;
      const card = button.closest(".alert");
      card?.querySelectorAll("button").forEach((control) => { control.disabled = true; });
      try {
        if (approving) {
          await api(`/ebay/revision-jobs/${jobId}/approve`, { method: "POST" });
        } else {
          await api(`/ebay/revision-jobs/${jobId}`, {
            method: "PATCH",
            body: JSON.stringify({ status: "cancelled", message: "Disapproved from the AutoZS mobile review queue." }),
          });
        }
        setError("");
        await refresh();
      } catch (error) {
        setError(error.message || String(error));
        card?.querySelectorAll("button").forEach((control) => { control.disabled = false; });
      }
    }

    function togglePrivacy() {
      privacyMode = !privacyMode;
      localStorage.setItem(privacyKey, String(privacyMode));
      applyPrivacy();
    }

    function applyPrivacy() {
      document.getElementById("hero").classList.toggle("privacy", privacyMode);
      document.getElementById("privacy-button").classList.toggle("muted", !privacyMode);
      const picker = document.getElementById("store-picker");
      picker.disabled = privacyMode;
      picker.setAttribute("aria-label", privacyMode ? "Store hidden. Turn off privacy to change stores." : "Store");
      [...picker.options].forEach((option) => {
        const original = option.dataset.label || option.textContent;
        option.dataset.label = original;
        option.textContent = privacyMode
          ? (option.value === "all" ? "All stores" : "Store hidden")
          : original;
      });
    }

    function updateMobileCalendar({ products, listings, listingJobs }) {
      const productById = new Map(products.map((product) => [Number(product.id), product]));
      const scopedListings = selectedStore === "all"
        ? listings
        : listings.filter((listing) => listing.account_id === selectedStore);
      const scopedJobs = selectedStore === "all"
        ? listingJobs
        : listingJobs.filter((job) => job.ebay_account_key === selectedStore || job.account_key === selectedStore || job.account_id === selectedStore);
      const latestJobByProduct = new Map();
      [...scopedJobs].sort((a, b) => apiDateMs(b.updated_at) - apiDateMs(a.updated_at)).forEach((job) => {
        const productId = Number(job.product_id);
        if (productId && !latestJobByProduct.has(productId)) latestJobByProduct.set(productId, job);
      });
      const listingByProduct = new Map(scopedListings.map((listing) => [Number(listing.product_id), listing]));
      const now = Date.now();
      const events = [];
      latestJobByProduct.forEach((job, productId) => {
        if (!job.listing_schedule_at || ["cancelled", "tombstoned"].includes(String(job.status || "").toLowerCase())) return;
        const instant = apiDate(job.listing_schedule_at);
        if (Number.isNaN(instant.getTime())) return;
        const listing = listingByProduct.get(productId);
        const product = productById.get(productId);
        const isListed = String(job.status || "").toLowerCase() === "completed" && instant.getTime() <= now;
        events.push(mobileCalendarEvent(isListed ? "listed" : "scheduled", instant, product, listing, job));
      });
      scopedListings.forEach((listing) => {
        if (!listing.renews_at) return;
        const instant = apiDate(listing.renews_at);
        if (Number.isNaN(instant.getTime())) return;
        const product = productById.get(Number(listing.product_id));
        events.push(mobileCalendarEvent("renewal", instant, product, listing, null));
      });
      calendarEvents = events.sort((a, b) => a.date - b.date);
      renderMobileCalendar();
    }

    function mobileCalendarEvent(type, date, product, listing, job) {
      const image = product?.images?.slice().sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0))[0]?.image_url || "";
      const price = listing?.price ?? job?.price ?? product?.listing_drafts?.[0]?.price ?? null;
      return {
        type,
        date,
        dateKey: localDateKey(date),
        title: job?.title || product?.listing_drafts?.[0]?.title || product?.title || `Product ${listing?.product_id || job?.product_id || ""}`,
        image,
        price,
      };
    }

    function shiftCalendarMonth(delta) {
      calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
      calendarSelectedDate = localDateKey(calendarMonth);
      renderMobileCalendar();
    }

    function renderMobileCalendar() {
      const label = document.getElementById("calendar-month-label");
      const grid = document.getElementById("calendar-grid");
      const detail = document.getElementById("calendar-detail");
      if (!label || !grid || !detail) return;
      label.textContent = calendarMonth.toLocaleDateString([], { month: "long", year: "numeric" });
      const grouped = new Map();
      calendarEvents.forEach((event) => {
        if (!grouped.has(event.dateKey)) grouped.set(event.dateKey, []);
        grouped.get(event.dateKey).push(event);
      });
      const first = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const weekdays = ["S", "M", "T", "W", "T", "F", "S"];
      const cells = weekdays.map((day) => `<div class="mobile-calendar-weekday">${day}</div>`);
      const today = localDateKey(new Date());
      for (let index = 0; index < 42; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        const key = localDateKey(date);
        const events = grouped.get(key) || [];
        const types = [...new Set(events.map((event) => event.type))];
        const classes = ["mobile-calendar-day", date.getMonth() === calendarMonth.getMonth() ? "" : "muted", key === today ? "today" : "", key === calendarSelectedDate ? "selected" : ""].filter(Boolean).join(" ");
        cells.push(`<button class="${classes}" type="button" data-calendar-date="${key}" aria-label="${escAttr(date.toLocaleDateString([], { month: "long", day: "numeric" }))}, ${events.length} item${events.length === 1 ? "" : "s"}"><span class="day-number">${date.getDate()}</span><span class="calendar-dots">${types.slice(0, 3).map((type) => `<span class="calendar-dot ${type}"></span>`).join("")}</span></button>`);
      }
      grid.innerHTML = cells.join("");
      grid.querySelectorAll("[data-calendar-date]").forEach((button) => button.addEventListener("click", () => {
        calendarSelectedDate = button.dataset.calendarDate;
        renderMobileCalendar();
      }));
      const selected = grouped.get(calendarSelectedDate) || [];
      const selectedDate = new Date(`${calendarSelectedDate}T12:00:00`);
      detail.innerHTML = `<div class="calendar-detail-heading">${escapeHtml(selectedDate.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" }))}</div>${selected.length ? selected.map(renderMobileCalendarCard).join("") : `<div class="calendar-empty">Nothing scheduled, listed, or renewing on this day.</div>`}`;
    }

    function renderMobileCalendarCard(event) {
      const typeLabel = event.type === "renewal" ? "Renews" : event.type === "listed" ? "Listed" : "Scheduled";
      const scheduleTime = event.date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", timeZone: businessTimeZone, timeZoneName: "short" });
      const meta = [typeLabel, scheduleTime, event.price === null ? "" : money(event.price)].filter(Boolean).join(" · ");
      return `<article class="calendar-mini-card ${event.type}">${event.image ? `<img src="${escAttr(event.image)}" alt="" />` : `<div></div>`}<div><div class="calendar-mini-title">${escapeHtml(event.title)}</div><div class="calendar-mini-meta">${escapeHtml(meta)}</div></div></article>`;
    }

    function localDateKey(value) {
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    const defaultPushPreferences = {
      listing_queued: true,
      listing_running: true,
      listing_attention: true,
      listing_completed: false,
      source_queued: true,
      source_running: true,
      source_attention: true,
      source_completed: false,
      revision_queued: true,
      revision_running: true,
      revision_attention: true,
      revision_completed: false,
      worker_attention: true,
      delivery_mode: "individual",
    };

    function openNotificationSettings() {
      document.getElementById("notification-modal").hidden = false;
      document.body.style.overflow = "hidden";
      renderNotificationPreferences(currentPushSubscription);
      initializePushState();
    }

    function closeNotificationSettings() {
      document.getElementById("notification-modal").hidden = true;
      document.body.style.overflow = "";
    }

    async function enableNotifications(forceRepair = false) {
      setNotificationError("");
      if (!("Notification" in window)) {
        setNotificationError("For iPhone notifications, add AutoZS to your Home Screen first, then open it from the new icon.");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        markNotifications(false);
        await initializePushState();
        return;
      }

      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        setNotificationError("This browser does not expose Web Push. Open the installed AutoZS Home Screen app and try again.");
        markNotifications(false);
        return;
      }

      const button = document.getElementById(forceRepair ? "notification-repair" : "notification-setup");
      const originalLabel = button.textContent;
      button.disabled = true;
      button.textContent = forceRepair ? "Repairing..." : "Setting up...";
      try {
        pushConfig = await api("/push/config");
        if (!pushConfig.enabled) {
          throw new Error(`Push not configured: ${pushConfig.reason || "missing server keys"}`);
        }
        serviceWorkerRegistration = await navigator.serviceWorker.register("/sw.js");
        let existing = await serviceWorkerRegistration.pushManager.getSubscription();
        if (forceRepair && existing) {
          if (currentPushSubscription) {
            await api(`/push/subscriptions/${currentPushSubscription.id}`, {
              method: "PATCH",
              body: JSON.stringify({ enabled: false }),
            }).catch(() => null);
          }
          await existing.unsubscribe();
          existing = null;
        }
        browserPushSubscription = existing || await serviceWorkerRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(pushConfig.public_key),
        });
        const serialized = browserPushSubscription.toJSON();
        const notificationSettings = collectNotificationSettings();
        currentPushSubscription = await api("/push/subscriptions", {
          method: "POST",
          body: JSON.stringify({
            endpoint: serialized.endpoint,
            keys: serialized.keys || {},
            label: "iPhone AutoZS",
            user_agent: navigator.userAgent,
            dashboard_url: window.location.href,
            vapid_public_key: pushConfig.public_key,
            preferences: {
              ...notificationSettings.preferences,
              timezone: notificationSettings.timezone,
              weekly_summary_day: notificationSettings.weekly_summary_day,
              weekly_summary_time: notificationSettings.weekly_summary_time,
              weekly_summary_enabled: notificationSettings.weekly_summary_enabled,
            },
          }),
        });
        const result = await api("/push/test", {
          method: "POST",
          body: JSON.stringify({
            title: "AutoZS push enabled",
            body: "Your iPhone will alert you when AutoZS needs attention.",
            subscription_id: currentPushSubscription.id,
          }),
        });
        if (Number(result.sent || 0) < 1 || Number(result.failed || 0) > 0) {
          await initializePushState();
          throw new Error(currentPushSubscription?.last_error || result.message || "The test notification was not delivered.");
        }
        await initializePushState();
        markNotifications(true);
      } catch (error) {
        setNotificationError(error.message || String(error));
        markNotifications(false);
        await initializePushState();
      } finally {
        button.disabled = false;
        button.textContent = originalLabel;
      }
    }

    async function initializePushState() {
      updateNotificationStatusCard("notification-permission-status", "Permission", !("Notification" in window) ? "Home Screen required" : Notification.permission, "Notification" in window && Notification.permission === "granted");
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        updateNotificationStatusCard("notification-subscription-status", "Subscription", "Unavailable", false);
        updateNotificationStatusCard("notification-delivery-status", "Delivery", "Not configured", false);
        markNotifications(false);
        return;
      }
      try {
        pushConfig = await api("/push/config");
        serviceWorkerRegistration = await navigator.serviceWorker.register("/sw.js");
        browserPushSubscription = await serviceWorkerRegistration.pushManager.getSubscription();
        const subscriptions = await api("/push/subscriptions");
        currentPushSubscription = browserPushSubscription
          ? subscriptions.find((subscription) => subscription.endpoint === browserPushSubscription.endpoint) || null
          : null;
        const keyCurrent = Boolean(currentPushSubscription?.vapid_public_key && currentPushSubscription.vapid_public_key === pushConfig.public_key);
        updateNotificationStatusCard(
          "notification-subscription-status",
          "Subscription",
          browserPushSubscription && currentPushSubscription?.enabled && keyCurrent ? "Active" : browserPushSubscription && currentPushSubscription?.enabled ? "Repair required" : browserPushSubscription ? "Not registered" : "Missing",
          Boolean(browserPushSubscription && currentPushSubscription?.enabled && keyCurrent),
        );
        const deliveryGood = Boolean(currentPushSubscription?.last_notified_at && !currentPushSubscription?.last_error);
        const deliveryLabel = currentPushSubscription?.last_error
          ? "Failed"
          : currentPushSubscription?.last_notified_at
            ? `Delivered ${formatDate(currentPushSubscription.last_notified_at)}`
            : "Not tested";
        updateNotificationStatusCard("notification-delivery-status", "Delivery", deliveryLabel, deliveryGood);
        setNotificationError(currentPushSubscription?.last_error || (currentPushSubscription?.enabled && !keyCurrent ? "Tap Repair once to activate queue updates and weekly summaries on this iPhone." : ""));
        renderNotificationPreferences(currentPushSubscription);
        markNotifications(Notification.permission === "granted" && Boolean(browserPushSubscription) && Boolean(currentPushSubscription?.enabled) && keyCurrent && !currentPushSubscription?.last_error);
      } catch (error) {
        updateNotificationStatusCard("notification-subscription-status", "Subscription", "Check failed", false);
        updateNotificationStatusCard("notification-delivery-status", "Delivery", "Unknown", false);
        setNotificationError(error.message || String(error));
        markNotifications(false);
      }
    }

    async function sendNotificationTest() {
      if (!currentPushSubscription) {
        setNotificationError("Set up this iPhone before sending a test.");
        return;
      }
      const button = document.getElementById("notification-test");
      button.disabled = true;
      button.textContent = "Sending...";
      setNotificationError("");
      try {
        const result = await api("/push/test", {
          method: "POST",
          body: JSON.stringify({
            title: "AutoZS test alert",
            body: "Notification delivery is working on this iPhone.",
            subscription_id: currentPushSubscription.id,
          }),
        });
        await initializePushState();
        if (Number(result.sent || 0) < 1 || Number(result.failed || 0) > 0) {
          throw new Error(currentPushSubscription?.last_error || result.message || "The test notification was not delivered.");
        }
      } catch (error) {
        setNotificationError(error.message || String(error));
      } finally {
        button.disabled = false;
        button.textContent = "Send test";
      }
    }

    async function saveNotificationSettings() {
      if (!currentPushSubscription) {
        setNotificationError("Set up this iPhone before saving notification settings.");
        return;
      }
      const button = document.getElementById("notification-save");
      button.disabled = true;
      button.textContent = "Saving...";
      setNotificationError("");
      try {
        const settings = collectNotificationSettings();
        currentPushSubscription = await api(`/push/subscriptions/${currentPushSubscription.id}`, {
          method: "PATCH",
          body: JSON.stringify(settings),
        });
        renderNotificationPreferences(currentPushSubscription);
      } catch (error) {
        setNotificationError(error.message || String(error));
      } finally {
        button.disabled = false;
        button.textContent = "Save notification settings";
      }
    }

    function renderNotificationPreferences(subscription) {
      const preferences = { ...defaultPushPreferences, ...(subscription?.preferences || {}) };
      const weeklyDay = Number(subscription?.weekly_summary_day ?? 5);
      const weeklyTime = subscription?.weekly_summary_time || "18:00";
      const weeklyEnabled = subscription?.weekly_summary_enabled ?? true;
      const groups = [
        ["Listing jobs", "Draft creation and scheduled publishing", "listing"],
        ["Source prices", "Supplier price checks", "source"],
        ["eBay revisions", "Active-listing updates", "revision"],
      ];
      document.getElementById("notification-preferences").innerHTML = `
        ${groups.map(([title, note, prefix]) => `
          <section class="notification-group">
            <div><h3>${title}</h3><small>${note}</small></div>
            ${preferenceToggle(`${prefix}_queued`, "Queued", preferences)}
            ${preferenceToggle(`${prefix}_running`, "Running", preferences)}
            ${preferenceToggle(`${prefix}_attention`, "Needs attention", preferences)}
            ${preferenceToggle(`${prefix}_completed`, "Completed", preferences)}
          </section>
        `).join("")}
        <section class="notification-group">
          <div><h3>Worker health</h3><small>Windows worker availability</small></div>
          ${preferenceToggle("worker_attention", "Offline or stale", preferences)}
        </section>
        <section class="notification-group">
          <div><h3>Delivery</h3><small>Choose one alert per job or a compact status update</small></div>
          <label class="notification-setting"><span>Job updates</span><select id="notification-delivery-mode"><option value="individual" ${preferences.delivery_mode === "individual" ? "selected" : ""}>Each job</option><option value="grouped" ${preferences.delivery_mode === "grouped" ? "selected" : ""}>Grouped</option></select></label>
        </section>
        <section class="notification-group">
          <div><h3>Weekly summary</h3><small>Views, listings, scheduled items, orders, and attention</small></div>
          <label class="notification-setting"><span>Enable summary</span><input id="notification-weekly-enabled" type="checkbox" ${weeklyEnabled ? "checked" : ""}></label>
          <label class="notification-setting"><span>Day</span><select id="notification-weekly-day">${["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"].map((day, index) => `<option value="${index}" ${weeklyDay === index ? "selected" : ""}>${day}</option>`).join("")}</select></label>
          <label class="notification-setting"><span>Time</span><input id="notification-weekly-time" type="time" value="${escAttr(weeklyTime)}"></label>
        </section>
      `;
    }

    function preferenceToggle(key, label, preferences) {
      return `<label class="notification-setting"><span>${label}</span><input type="checkbox" data-push-preference="${key}" ${preferences[key] ? "checked" : ""}></label>`;
    }

    function collectNotificationSettings() {
      const preferences = { ...defaultPushPreferences };
      document.querySelectorAll("[data-push-preference]").forEach((input) => {
        preferences[input.dataset.pushPreference] = input.checked;
      });
      preferences.delivery_mode = document.getElementById("notification-delivery-mode")?.value === "grouped" ? "grouped" : "individual";
      return {
        preferences,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "America/New_York",
        weekly_summary_day: Number(document.getElementById("notification-weekly-day")?.value ?? 5),
        weekly_summary_time: document.getElementById("notification-weekly-time")?.value || "18:00",
        weekly_summary_enabled: Boolean(document.getElementById("notification-weekly-enabled")?.checked),
      };
    }

    function updateNotificationStatusCard(id, label, value, good) {
      const card = document.getElementById(id);
      card.classList.toggle("good", Boolean(good));
      card.classList.toggle("bad", !good);
      card.innerHTML = `<span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong>`;
    }

    function setNotificationError(message) {
      const box = document.getElementById("notification-error");
      box.style.display = message ? "block" : "none";
      box.textContent = message || "";
    }

    function markNotifications(enabled) {
      document.getElementById("notify-button").classList.toggle("muted", !enabled);
    }

    function setError(message) {
      const box = document.getElementById("error-box");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = message;
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value ?? "-";
    }

    function money(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toLocaleString([], { style: "currency", currency: "USD", maximumFractionDigits: 0 });
    }

    function moneyExact(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
      return Number(value).toLocaleString([], { style: "currency", currency: "USD", minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function apiDate(value) {
      if (value instanceof Date) return value;
      if (value === null || value === undefined || value === "") return new Date(NaN);
      const text = String(value).trim();
      const hasTime = /T\d{2}:\d{2}/.test(text);
      const hasZone = /(?:Z|[+-]\d{2}:?\d{2})$/i.test(text);
      return new Date(hasTime && !hasZone ? `${text}Z` : text);
    }

    function apiDateMs(value, fallback = 0) {
      const time = apiDate(value).getTime();
      return Number.isFinite(time) ? time : fallback;
    }

    function formatDate(value) {
      if (!value) return "";
      const date = apiDate(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit", timeZone: businessTimeZone, timeZoneName: "short" });
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      })[char]);
    }

    function escAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function urlBase64ToUint8Array(value) {
      const padding = "=".repeat((4 - value.length % 4) % 4);
      const base64 = (value + padding).replace(/-/g, "+").replace(/_/g, "/");
      const raw = window.atob(base64);
      const output = new Uint8Array(raw.length);
      for (let index = 0; index < raw.length; index += 1) output[index] = raw.charCodeAt(index);
      return output;
    }
  </script>
</body>

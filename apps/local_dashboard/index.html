            <button class="secondary" onclick="markListingJobSaved(${job.id})">Saved Draft</button>
            <button class="secondary" onclick="requeueListingJob(${job.id})">Retry</button>
            <button class="secondary" onclick="pauseListingJob(${job.id})">Pause</button>
            <button class="danger" onclick="failListingJob(${job.id})">Fail</button>
          </div>`
        ]);
        return `
          <div class="metrics" style="margin-bottom:14px">
            <div class="metric"><span>Queued</span><strong>${counts.queued}</strong></div>
            <div class="metric"><span>Running</span><strong>${counts.running}</strong></div>
            <div class="metric"><span>Needs review</span><strong>${counts.needs_review}</strong></div>
            <div class="metric"><span>Ready to save</span><strong>${counts.ready_to_save}</strong></div>
          </div>
          <div class="extension-panel">
            <div class="form-grid">
              <select id="queue-product-id">
                ${readyProducts.length ? readyProducts.map((item) => `<option value="${item.product_id}">${esc(item.sku)} - ${esc(item.title).slice(0, 90)}</option>`).join("") : `<option value="">No ready products</option>`}
              </select>
              <input id="queue-scheduled-for" type="datetime-local" value="${escAttr(defaultQueueDateTimeLocal())}" />
              <button onclick="queueSelectedProductDraft()">Queue Draft</button>
              <select id="queue-account-key">${accountOptions}</select>
              <button class="secondary" onclick="queueReadyListingBatch()">Queue Ready Batch</button>
              <button onclick="runNextListingJob()">Run Next Due</button>
            </div>
            <div class="draft">Queue creates or reserves eBay draft jobs only. Final listing stays manual until you personally approve it.</div>
          </div>
          ${jobs.length ? table(["Status", "Product", "Price", "Account", "Scheduled", "Images", "Issues", "Actions"], rows) : `<p class="muted">No listing jobs yet. Queue a ready product to start.</p>`}`;
      }

      function listingJobCounts(jobs) {
        return jobs.reduce((counts, job) => {
          counts[job.status] = (counts[job.status] || 0) + 1;
          return counts;
        }, { queued: 0, running: 0, needs_review: 0, ready_to_save: 0, saved_draft: 0, completed: 0, tombstoned: 0, failed: 0, paused: 0, cancelled: 0 });
      }

      function listingAccountOptions() {
        const accounts = state.ebayAccounts && state.ebayAccounts.length
          ? state.ebayAccounts.map((account) => ({ key: account.key, label: account.label || account.key }))
          : [{ key: "manual", label: "Manual / current Chrome eBay account" }];
        if (!accounts.some((account) => account.key === "manual")) accounts.unshift({ key: "manual", label: "Manual / current Chrome eBay account" });
        return accounts.map((account) => `<option value="${escAttr(account.key)}">${esc(account.label)}</option>`).join("");
      }

      function expectedEbayUsername(accountKey = "manual") {
        if (accountKey && accountKey !== "manual") {
          const account = (state.ebayAccounts || []).find((item) => item.key === accountKey);
          return account?.account_id || "";
        }
        return state.settings.ebay_expected_username || "";
      }

      function ebayBrowserAccountOk(accountKey = "manual") {
        const expected = normalizeUsername(expectedEbayUsername(accountKey));
        const detected = normalizeUsername(state.ebayBrowserAccount?.detected_username);
        return Boolean(expected && detected && expected === detected);
      }

      function ebayBrowserAccountMessage(accountKey = "manual") {
        const expected = expectedEbayUsername(accountKey);
        const detected = state.ebayBrowserAccount?.detected_username || "";
        if (!expected) return "Set the expected eBay username in Settings before listing.";
        if (!detected) return "Open eBay in Chrome so the AutoZS extension can detect the signed-in username.";
        if (!ebayBrowserAccountOk(accountKey)) return `Chrome is signed in as ${detected}, expected ${expected}.`;
        return `Chrome is signed in as ${detected} and matches ${expected}.`;
      }

      function ebayBrowserAccountStatusHtml(accountKey = "manual") {
        const ok = ebayBrowserAccountOk(accountKey);
        const detectedAt = state.ebayBrowserAccount?.detected_at ? ` · checked ${new Date(state.ebayBrowserAccount.detected_at).toLocaleString()}` : "";
        return `<div class="draft"><span class="status ${ok ? "stage-ready" : "stage-source"}">${ok ? "Account match" : "Account check needed"}</span> ${esc(ebayBrowserAccountMessage(accountKey))}${esc(detectedAt)}</div>`;
      }

      function normalizeUsername(value) {
        return String(value || "").trim().replace(/^@/, "").toLowerCase();
      }

      function blockIfEbayAccountMismatch(accountKey = "manual") {
        if (ebayBrowserAccountOk(accountKey)) return false;
        message(ebayBrowserAccountMessage(accountKey));
        return true;
      }

      function listingJobStatusHtml(job) {
        const className = {
          queued: "stage-capture",
          running: "stage-images",
          needs_review: "stage-shipping",
          ready_to_save: "stage-ready",
          saved_draft: "stage-ready",
          completed: "stage-ready",
          tombstoned: "stage-source",
          failed: "stage-source",
          paused: "ship-unknown",
          cancelled: "ship-unknown"
        }[job.status] || "";
        return `<span class="status ${className}">${esc(job.status)}</span><div class="draft">${job.attempts} attempt(s)</div>`;
      }

      function listingJobIssuesHtml(job) {
        const issues = [...(job.missing_manual || []), ...(job.warnings || [])].slice(0, 3);
        if (job.message) issues.unshift(job.message);
        return issues.length ? `<div class="draft">${esc(issues.join(" | "))}</div>` : `<span class="status stage-ready">Clear</span>`;
      }

      function queuePayload(productIds, scheduledForValue, accountKey) {
        return {
          product_ids: productIds,
          ebay_account_key: accountKey || "manual",
          action: scheduledForValue ? "publish" : "create_draft",
          scheduled_for: null,
          listing_schedule_at: scheduledForValue || null
        };
      }

      function ebayImportScheduleControlHtml() {
        return `
          <div class="extension-panel">
            <div class="form-grid">
              <label class="muted" for="ebay-import-schedule-at">Dashboard default eBay start</label>
              <input id="ebay-import-schedule-at" type="datetime-local" value="${escAttr(defaultQueueDateTimeLocal())}" />
              <button class="secondary" onclick="clearEbayImportSchedule()">Start immediately</button>
            </div>
            <div class="draft">This is the default for product imports. Each product can save its own listing start in its actions. Both use eBay's native Schedule your listing field.</div>
          </div>`;
      }

      function selectedEbayImportSchedule() {
        const value = document.getElementById("ebay-import-schedule-at")?.value || document.getElementById("queue-scheduled-for")?.value || "";
        return value ? zonedWallTimeToUtcIso(value) : "";
      }

      function clearEbayImportSchedule() {
        const input = document.getElementById("ebay-import-schedule-at");
        if (input) input.value = "";
      }

      function selectedProductListingSchedule(productId) {
        const input = document.getElementById(`listing-schedule-${productId}`);
        if (input?.value) return zonedWallTimeToUtcIso(input.value);
        const savedSchedule = productListingScheduleAt(productId);
        return savedSchedule ? appDate(savedSchedule)?.toISOString() || "" : selectedEbayImportSchedule();
      }

      function productListingScheduleAt(productId) {
        const product = state.products.find((item) => item.id === Number(productId));
        if (product?.listing_schedule_at) return product.listing_schedule_at;
        const job = (state.listingJobs || []).find((item) =>
          item.product_id === Number(productId) && item.listing_schedule_at && !["cancelled", "tombstoned"].includes(item.status)
        );
        return job?.listing_schedule_at || null;
      }

      function dateTimeLocalValue(value) {
        if (!value) return "";
        const date = appDate(value);
        if (!date) return String(value).slice(0, 16);
        const parts = Object.fromEntries(new Intl.DateTimeFormat("en-US", { timeZone: displayTimeZone(), year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hourCycle: "h23" }).formatToParts(date).filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
        return `${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}`;
      }

      function formatSchedule(value) {
        return formatDateTime(value);
      }

      function defaultQueueDateTimeLocal() {
        if (state.settings.default_listing_schedule_mode !== "scheduled") return "";
        const days = Number(state.settings.default_listing_schedule_days_ahead || 0);
        const time = String(state.settings.default_listing_schedule_time || "09:00");
        const target = new Date(Date.now() + days * 86400000);
        const parts = Object.fromEntries(new Intl.DateTimeFormat("en-US", { timeZone: displayTimeZone(), year: "numeric", month: "2-digit", day: "2-digit" }).formatToParts(target).filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
        let value = `${parts.year}-${parts.month}-${parts.day}T${time}`;
        if (new Date(zonedWallTimeToUtcIso(value)) <= new Date()) {
          const followingDay = new Date(Date.UTC(Number(parts.year), Number(parts.month) - 1, Number(parts.day) + 1));
          value = `${followingDay.getUTCFullYear()}-${String(followingDay.getUTCMonth() + 1).padStart(2, "0")}-${String(followingDay.getUTCDate()).padStart(2, "0")}T${time}`;
        }
        return value;
      }

      async function queueSelectedProductDraft() {
        const accountKey = document.getElementById("queue-account-key")?.value || "manual";
        if (blockIfEbayAccountMismatch(accountKey)) return;
        const productId = Number(document.getElementById("queue-product-id")?.value);
        if (!productId) return message("No ready product selected.");
        const selectedSchedule = document.getElementById("queue-scheduled-for")?.value || "";
        const scheduledFor = selectedSchedule ? zonedWallTimeToUtcIso(selectedSchedule) : "";
        const jobs = await request("/listing-jobs", { method: "POST", body: JSON.stringify(queuePayload([productId], scheduledFor, accountKey)) });
        await refreshAll();
        message(`Created ${jobs.length} eBay draft job(s).`);
      }

      async function queueProductDraft(productId) {
        const accountKey = selectedProductEbayStoreKey(productId);
        if (!accountKey) return message("Choose an eBay store for this product first.");
        if (blockIfEbayAccountMismatch(accountKey)) return;
        const jobs = await request("/listing-jobs", { method: "POST", body: JSON.stringify(queuePayload([productId], selectedProductListingSchedule(productId), accountKey)) });
        await refreshAll();
        message(`Created eBay draft job ${jobs[0]?.id || ""} for product ${productId}.`);
      }

      async function queueSelectedProductDrafts() {
        const products = visibleProducts().filter((product) => selectedProductIds.has(product.id));
        if (!products.length) return message("Select at least one visible product first.");
        const accountKeys = [...new Set(products.map((product) => selectedProductEbayStoreKey(product.id)).filter(Boolean))];
        if (accountKeys.length !== 1) return message("Select products assigned to one eBay store at a time.");
        const accountKey = accountKeys[0];
        if (blockIfEbayAccountMismatch(accountKey)) return;
        const assistantWindows = products.map(() => window.open("about:blank", "_blank"));
        const jobs = [];
        for (const [index, product] of products.entries()) {
          const created = await request("/listing-jobs", {
            method: "POST",
            body: JSON.stringify(queuePayload([product.id], selectedProductListingSchedule(product.id), accountKey))
          });
          const job = created[0];
          if (!job) continue;
          jobs.push(job);
        }
        await openListingJobAssistants(jobs, assistantWindows);
        await refreshAll();
        message(`Importing ${jobs.length} selected product(s) to eBay.`);
      }

      async function openListingJobAssistants(jobs, assistantWindows = []) {
        for (const [index, job] of jobs.entries()) {
          const result = await request(`/listing-jobs/${job.id}/run`, { method: "POST" });
          if (result.job?.assistant_url) {
            if (assistantWindows[index]) assistantWindows[index].location.href = result.job.assistant_url;
            else window.open(result.job.assistant_url, "_blank", "noopener,noreferrer");
          } else {
            assistantWindows[index]?.close();
          }
        }
      }

      function importCalendarPlannedProduct(productId) {
        const assistantWindow = window.open("about:blank", "_blank");
        importProductToEbay(productId, assistantWindow);
      }

      async function importProductToEbay(productId, assistantWindow = null) {
        const accountKey = selectedProductEbayStoreKey(productId);
        if (!accountKey) {
          assistantWindow?.close();
          return message("Choose an eBay store for this product first.");
        }
        if (blockIfEbayAccountMismatch(accountKey)) {
          assistantWindow?.close();
          return;
        }
        const listingScheduleAt = selectedProductListingSchedule(productId);
        const jobs = await request("/listing-jobs", { method: "POST", body: JSON.stringify(queuePayload([productId], listingScheduleAt, accountKey)) });
        const job = jobs[0];
        if (!job) {
          assistantWindow?.close();
          return message(`Could not create an eBay import job for product ${productId}.`);
        }
        const result = await request(`/listing-jobs/${job.id}/run`, { method: "POST" });
        await refreshAll();
        if (result.package) {
          if (assistantWindow && !assistantWindow.closed) assistantWindow.location.href = result.job.assistant_url;
          else window.open(result.job.assistant_url, "_blank", "noopener,noreferrer");
          message(listingScheduleAt
            ? `Publishing product ${productId} as a scheduled eBay listing. AutoZS will stop if any verification fails.`
            : `Importing product ${productId} to eBay. AutoZS will create and save a draft for review.`);
        } else {
          assistantWindow?.close();
          message(`Job ${job.id} needs review before eBay import.`);
        }
      }

      async function queueReadyListingBatch() {
        const accountKey = document.getElementById("queue-account-key")?.value || "manual";
        if (blockIfEbayAccountMismatch(accountKey)) return;
        const readyIds = (state.listingQueue || []).filter((item) => !item.listing_status && item.manual_ready).map((item) => item.product_id);
        if (!readyIds.length) return message("No manual-ready products to queue.");
        const scheduledFor = document.getElementById("queue-scheduled-for")?.value || "";
        const jobs = await request("/listing-jobs", { method: "POST", body: JSON.stringify(queuePayload(readyIds, scheduledFor, accountKey)) });
        await refreshAll();
        message(`Created ${jobs.length} ready eBay draft job(s).`);
      }

      async function runNextListingJob() {
        const accountKey = document.getElementById("queue-account-key")?.value || "";
        if (blockIfEbayAccountMismatch(accountKey || "manual")) return;
        const query = accountKey ? `?ebay_account_key=${encodeURIComponent(accountKey)}` : "";
        try {
          const result = await request(`/listing-jobs/next${query}`, { method: "POST" });
          await refreshAll();
          if (result.package) window.open(result.job.assistant_url, "_blank", "noopener,noreferrer");
          message(result.package ? `Running job ${result.job.id}. AutoZS opened eBay to create and save a draft.` : `Job ${result.job.id} needs review before running.`);
        } catch (error) {
          message(error.message.includes("No queued") ? "No queued listing jobs are due yet." : error.message);
        }
      }

      async function runListingJob(jobId) {
        const job = (state.listingJobs || []).find((item) => item.id === jobId);
        if (blockIfEbayAccountMismatch(job?.ebay_account_key || "manual")) return;
        const result = await request(`/listing-jobs/${jobId}/run`, { method: "POST" });
        await refreshAll();
        if (result.package) window.open(result.job.assistant_url, "_blank", "noopener,noreferrer");
        message(result.package ? `Running job ${jobId}. AutoZS opened eBay to create and save a draft.` : `Job ${jobId} needs review before running.`);
      }

      function openListingJobAssistant(jobId) {
        const job = (state.listingJobs || []).find((item) => item.id === jobId);
        if (!job) return message("Listing job not found.");
        if (blockIfEbayAccountMismatch(job.ebay_account_key || "manual")) return;
        window.open(job.assistant_url, "_blank", "noopener,noreferrer");
        message(`Opened eBay assistant for job ${jobId}.`);
      }

      async function markListingJobSaved(jobId) {
        const draftId = prompt("Optional eBay draft ID. Leave blank if you only want to mark it saved.", "") || "";
        await request(`/listing-jobs/${jobId}`, {
          method: "PATCH",
          body: JSON.stringify({ status: "saved_draft", ebay_draft_id: draftId || null, message: "Saved for later on eBay" })
        });
        await refreshAll();
        message(`Marked job ${jobId} as saved draft.`);
      }

      async function requeueListingJob(jobId) {
        await request(`/listing-jobs/${jobId}`, { method: "PATCH", body: JSON.stringify({ status: "queued", message: "Queued for retry" }) });
        await refreshAll();
        message(`Requeued job ${jobId}.`);
      }

      async function pauseListingJob(jobId) {
        await request(`/listing-jobs/${jobId}`, { method: "PATCH", body: JSON.stringify({ status: "paused", message: "Paused manually" }) });
        await refreshAll();
        message(`Paused job ${jobId}.`);
      }

      async function failListingJob(jobId) {
        const reason = prompt("Why did this job fail?", "Manual draft creation failed") || "Manual draft creation failed";
        await request(`/listing-jobs/${jobId}`, { method: "PATCH", body: JSON.stringify({ status: "failed", message: reason }) });
        await refreshAll();
        message(`Marked job ${jobId} failed.`);
      }

      function listingStatusCounts(items) {
        return items.reduce((counts, item) => {
          counts.all += 1;
          if (listingIsLive(item)) counts.listed += 1;
          else if (item.listing_job?.status === "tombstoned") counts.tombstoned += 1;
          else if (["needs_review", "failed", "paused"].includes(item.listing_job?.status)) counts.review += 1;
          else counts.drafts += 1;
          if (listingIsScheduled(item)) counts.scheduled += 1;
          return counts;
        }, { all: 0, drafts: 0, scheduled: 0, listed: 0, review: 0, tombstoned: 0 });
      }

      function filterListingItems(items) {
        let filtered = items;
        if (listingStatusFilter === "listed") filtered = items.filter(listingIsLive);
        else if (listingStatusFilter === "scheduled") filtered = items.filter(listingIsScheduled);
        else if (listingStatusFilter === "review") filtered = items.filter((item) => ["needs_review", "failed", "paused"].includes(item.listing_job?.status));
        else if (listingStatusFilter === "tombstoned") filtered = items.filter((item) => item.listing_job?.status === "tombstoned");
        else if (listingStatusFilter !== "all") filtered = items.filter((item) => !listingIsLive(item) && item.listing_job && item.listing_job.status !== "tombstoned");
        return sortListingItems(filtered);
      }

      function sortListingItems(items) {
        return [...items].sort((a, b) => {
          if (listingSortMode === "renewal_soon") return listingRenewalSortValue(a) - listingRenewalSortValue(b);
          if (listingSortMode === "renewal_late") return listingRenewalSortValue(b) - listingRenewalSortValue(a);
          if (listingSortMode === "views_low") return Number(a.listing_views || 0) - Number(b.listing_views || 0);
          return new Date(b.listing_job?.updated_at || b.updated_at || 0) - new Date(a.listing_job?.updated_at || a.updated_at || 0);
        });
      }

      function listingRenewalSortValue(item) {
        const date = listingRenewalDate(item);
        return date ? date.getTime() : Number.MAX_SAFE_INTEGER;
      }

      function listingFilterButton(key, label, className) {
        return `<button class="secondary ${listingStatusFilter === key ? "active" : ""}" onclick="setListingStatusFilter('${key}')"><span class="${className}">${esc(label)}</span></button>`;
      }

      function setListingStatusFilter(key) {
        listingStatusFilter = key;
        listingFilterMenuOpen = false;
        render();
      }

      function listingIsLive(item) {
        const status = String(item.listing_status || "").toLowerCase();
        const scheduledStart = appDate(item.listing_started_at || item.listing_job?.listing_schedule_at);
        if (scheduledStart && scheduledStart > new Date()) return false;
        if (["active", "live", "listed"].includes(status)) return true;
        const job = item.listing_job;
        if (job?.status !== "completed" || !job.listing_schedule_at) return false;
        const start = appDate(job.listing_schedule_at);
        return Boolean(start && start <= new Date());
      }

      function listingIsScheduled(item) {
        if (listingIsLive(item) || item.listing_job?.status === "tombstoned") return false;
        const scheduledStart = appDate(item.listing_started_at || item.listing_job?.listing_schedule_at);
        if (scheduledStart && scheduledStart > new Date()) return true;
        if (String(item.listing_status || "").toLowerCase() === "scheduled") return true;
        return Boolean(item.listing_job?.listing_schedule_at);
      }

      function listingStartDate(item) {
        const explicit = item.listing_started_at || (listingIsLive(item) ? item.listing_job?.listing_schedule_at : null);
        return appDate(explicit);
      }

      function listingRenewalDate(item) {
        const explicit = appDate(item.listing_renews_at);
        if (explicit && !Number.isNaN(explicit.getTime())) return explicit;
        const start = listingStartDate(item);
        if (!start) return null;
        const inferred = new Date(start);
        inferred.setDate(inferred.getDate() + 30);
        return inferred;
      }

      function listingDaysUntilRelist(item) {
        if (item.days_until_relist !== null && item.days_until_relist !== undefined) return Number(item.days_until_relist);
        const renewal = listingRenewalDate(item);
        if (!renewal) return null;
        const ms = renewal - new Date();
        return Math.max(0, Math.ceil(ms / 86400000));
      }

      function listingRenewalHtml(item) {
        if (!listingIsLive(item)) return `<span class="draft">-</span>`;
        const renewal = listingRenewalDate(item);
        const days = listingDaysUntilRelist(item);
        if (!renewal || days === null || Number.isNaN(days)) return `<span class="draft">Unknown</span>`;
        return `<span class="status ${days <= 5 ? "stage-shipping" : "stage-ready"}">${esc(`${days} day${days === 1 ? "" : "s"}`)}</span>`;
      }

      function extractListingIdFromJob(job) {
        const match = String(job?.message || "").match(/\bitem\s+(\d{9,15})\b/i) || String(job?.message || "").match(/\b(\d{9,15})\b/);
        return match?.[1] || "";
      }

      function listingStatusHtml(item) {
        if (listingIsLive(item)) return `<span class="status stage-ready">Live</span><div class="draft">${esc(item.listing_id || extractListingIdFromJob(item.listing_job) || "")}</div>`;
        if (item.listing_status) return `<span class="status stage-ready">${esc(item.listing_status)}</span><div class="draft">${esc(item.listing_id || "")}</div>`;
        const job = item.listing_job;
        if (!job) return `<span class="status ship-unknown">No eBay record</span>`;
        return `${listingJobStatusHtml(job)}${job.ebay_draft_id ? `<div class="draft">Draft ${esc(job.ebay_draft_id)}</div>` : ""}`;
      }

      function listingStageBadgeHtml(item) {
        if (listingIsLive(item)) return `<span class="status stage-ready">Live</span>`;
        if (item.listing_status) return `<span class="status stage-ready">${esc(item.listing_status)}</span>`;

          saved_draft: "stage-ready",

      function listingIssuesHtml(item) {

      function productPriceHistoryGraphHtml(product) {
        const loadedHistory = state.priceHistory?.[product.id];
        const history = loadedHistory || (state.snapshots || []).filter((snapshot) => snapshot.product_id === product.id);
        const sales = productSalesStats(product);
        const sourceRows = history
          .filter((snapshot) => snapshot.source === "supplier" && snapshot.price !== null && snapshot.price !== undefined)
          .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        const draftRows = history
          .filter((snapshot) => snapshot.suggested_price !== null && snapshot.suggested_price !== undefined)
          .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        const profitRows = draftRows
          .map((snapshot) => ({
            ...snapshot,
            profit: snapshot.suggested_price === null || snapshot.price === null
              ? null
              : Math.round((Number(snapshot.suggested_price) - Number(snapshot.price) - Math.max(Number(snapshot.shipping || 0), 0) - (Number(snapshot.suggested_price) * totalFeeRate())) * 100) / 100
          }))
          .filter((snapshot) => snapshot.profit !== null);
        const currentSource = sourcePrice(product);
        const currentDraft = product.listing_drafts?.[0]?.calculated_price;
        const currentProfit = estimatedProfit(currentDraft, product);
        const fallbackDate = product.updated_at || product.created_at || new Date().toISOString();
        const chartSourceRows = sourceRows.length ? sourceRows : currentSource !== null && currentSource !== undefined ? [{ created_at: fallbackDate, price: currentSource }] : [];
        const chartDraftRows = draftRows.length ? draftRows : currentDraft !== null && currentDraft !== undefined ? [{ created_at: fallbackDate, suggested_price: currentDraft }] : [];
        const chartProfitRows = profitRows.length ? profitRows : currentProfit !== null && currentProfit !== undefined ? [{ created_at: fallbackDate, profit: currentProfit }] : [];
        return `<div class="product-chart-wrap">
          ${miniPriceHistorySvg(chartSourceRows, chartDraftRows, chartProfitRows)}
          <div class="legend">
            <span><i style="background:#f08a3e"></i>Source price</span>
            <span><i style="background:#2f80ed"></i>Our price</span>
            <span><i style="background:#28a957"></i>Expected profit</span>
          </div>
          <div class="chart-summary">
            <div><span>Sold units</span><strong>${sales.units}</strong></div>
            <div><span>Sold revenue</span><strong>${money(sales.revenue)}</strong></div>
            <div><span>Last sold</span><strong>${sales.lastSold ? new Date(sales.lastSold).toLocaleDateString() : "-"}</strong></div>
            <div><span>Sale dates</span><strong>${sales.dates.length ? esc(sales.dates.join(", ")) : "-"}</strong></div>
          </div>
          ${loadedHistory ? "" : `<div class="actions"><button class="secondary" onclick="loadPriceHistory(${product.id})">Load Full History</button></div>`}
        </div>`;
      }

      function miniPriceHistorySvg(sourceRows, draftRows, profitRows) {
        const width = 720;
        const height = 150;
        const pad = 24;
        const allRows = [
          ...sourceRows.map((row) => ({ date: row.created_at, value: Number(row.price || 0) })),
          ...draftRows.map((row) => ({ date: row.created_at, value: Number(row.suggested_price || 0) })),
          ...profitRows.map((row) => ({ date: row.created_at, value: Number(row.profit || 0) }))
        ].filter((row) => !Number.isNaN(row.value));
        if (!allRows.length) return `<p class="muted">No price history yet. Capture or import this product to start tracking price movement.</p>`;
        const minTime = Math.min(...allRows.map((row) => new Date(row.date).getTime()).filter(Boolean));
        const maxTime = Math.max(...allRows.map((row) => new Date(row.date).getTime()).filter(Boolean));
        const values = allRows.map((row) => row.value);
        const rawMin = Math.min(0, ...values);
        const rawMax = Math.max(1, ...values);
        const spread = Math.max(1, rawMax - rawMin);
        const min = rawMin - spread * 0.08;
        const max = rawMax + spread * 0.08;
        const x = (date) => {
          const time = new Date(date).getTime();
          if (!time || minTime === maxTime) return width / 2;
          return pad + ((time - minTime) / (maxTime - minTime)) * (width - pad * 2);
        };
        const y = (value) => height - pad - ((Number(value) - min) / (max - min)) * (height - pad * 2);
        const pathFrom = (rows, valueKey) => rows
          .filter((row) => row[valueKey] !== null && row[valueKey] !== undefined)
          .map((row, index) => `${index === 0 ? "M" : "L"} ${x(row.created_at).toFixed(1)} ${y(row[valueKey]).toFixed(1)}`)
          .join(" ");
        const dotsFrom = (rows, valueKey, color) => rows
          .filter((row) => row[valueKey] !== null && row[valueKey] !== undefined)
          .map((row) => `<circle cx="${x(row.created_at).toFixed(1)}" cy="${y(row[valueKey]).toFixed(1)}" r="3" fill="${color}"><title>${new Date(row.created_at).toLocaleString()}: ${money(row[valueKey])}</title></circle>`)
          .join("");
        const firstLabel = new Date(minTime).toLocaleDateString();
        const lastLabel = new Date(maxTime).toLocaleDateString();
        return `<svg class="product-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Product price history graph">
          <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="var(--line)" />
          <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="var(--line)" />
          <text x="${pad}" y="16" fill="var(--muted)" font-size="11">${money(max)}</text>
          <text x="${pad}" y="${height - 6}" fill="var(--muted)" font-size="11">${esc(firstLabel)}</text>
          <text x="${width - pad}" y="${height - 6}" fill="var(--muted)" font-size="11" text-anchor="end">${esc(lastLabel)}</text>
          <path d="${pathFrom(sourceRows, "price")}" fill="none" stroke="#f08a3e" stroke-width="3" />
          <path d="${pathFrom(draftRows, "suggested_price")}" fill="none" stroke="#2f80ed" stroke-width="3" />
          <path d="${pathFrom(profitRows, "profit")}" fill="none" stroke="#28a957" stroke-width="3" />
          ${dotsFrom(sourceRows, "price", "#f08a3e")}
          ${dotsFrom(draftRows, "suggested_price", "#2f80ed")}
          ${dotsFrom(profitRows, "profit", "#28a957")}
        </svg>`;
      }

      function productSalesStats(product) {
        const rows = [];
        (state.orders || []).forEach((order) => {
          (order.items || []).forEach((item) => {
            if (item.product_id === product.id) {
              rows.push({
                date: order.created_at || order.ship_by,
                quantity: Number(item.quantity || 0),
                revenue: Number(item.sale_price || 0) * Number(item.quantity || 0)
              });
            }
          });
        });
        const units = rows.reduce((total, row) => total + row.quantity, 0);
        const revenue = Math.round(rows.reduce((total, row) => total + row.revenue, 0) * 100) / 100;
        const sortedDates = rows
          .map((row) => row.date)
          .filter(Boolean)
          .sort((a, b) => new Date(b) - new Date(a));
        const dates = sortedDates.slice(0, 3).map((date) => new Date(date).toLocaleDateString());
        return { units, revenue, lastSold: sortedDates[0] || null, dates };
      }

      function priceComparisonHtml(product) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        const source = sourcePrice(product);
        const target = competitorTargetPrice(product);
        const floor = minimumProfitPrice(product);
        return `<div class="price-grid">
          ${priceCardHtml("Source", money(source), sourceTooltip(product))}
          ${priceCardHtml("Shipping", shippingBadgeHtml(product), shippingTooltip(product))}
          ${priceCardHtml("Competitor", money(product.competitor_price), competitorTooltip(product))}
          ${priceCardHtml("Undercut target", money(target), undercutTooltip(product))}
          ${priceCardHtml("Our margin", money(ownMarginPrice(product)), marginTooltip(product))}
          ${priceCardHtml("Min profit floor", money(floor), minProfitTooltip(product))}
          ${priceCardHtml("Safe competitor", money(safeCompetitorPrice(product)), safeCompetitorTooltip(product))}
          ${priceCardHtml("Draft", money(draft?.calculated_price), draftTooltip(product))}
          ${priceCardHtml("Net profit", money(estimatedProfit(draft?.calculated_price, product)), profitTooltip(product))}
          ${missingSourceHtml(product)}
          ${safeCompetitorWarningHtml(product)}
          ${profitWarningHtml(draft?.calculated_price, product)}
        </div>`;
      }

      function ebayHandoffHtml(product) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        const workflow = productWorkflowState(product);
        const imageCounts = imageDownloadCountsForProduct(product);
        const localPaths = localImagePaths(product);
        const statusClass = workflow.key === "ready" ? "draft" : "needs-data";
        const specifics = inferredItemSpecifics(product);
        return `<div class="price-grid">
          <div><span>Manual status</span><strong>${esc(workflow.key === "ready" ? "Ready" : workflow.label)}</strong></div>
          <div><span>Draft price</span><strong>${money(draft?.calculated_price)}</strong></div>
          <div><span>Local images</span><strong>${imageCounts.downloaded}/${imageCounts.total}</strong></div>
          <div><span>Upload plan</span><strong>${esc(localPaths.length ? `${localPaths.length} local file(s)` : "No local files")}</strong></div>
          <div style="grid-column: 1 / -1"><span>Item specifics</span><strong>${Object.keys(specifics).length ? "Ready to review" : "None inferred yet"}</strong>${specificsListHtml(specifics)}</div>
          <div class="${statusClass}" style="grid-column: 1 / -1">${esc(ebayHandoffNote(product))}</div>
        </div>`;
      }

      function specificsListHtml(specifics) {
        const entries = Object.entries(specifics || {}).filter(([, value]) => value !== null && value !== undefined && String(value).trim());
        if (!entries.length) return `<div class="muted">Capture/import a source product to infer Brand and MPN when possible.</div>`;
        return `<div class="specifics-list">${entries.map(([key, value]) => `<span><b>${esc(key)}</b>${esc(value)}</span>`).join("")}</div>`;
      }

      function inferredItemSpecifics(product) {
        const title = product.title || product.listing_drafts?.[0]?.title || "";
        const currentSupplier = supplier(product);
        const sourceUrl = currentSupplier?.source_url || "";
        const specifics = {};
        const brand = inferBrand(title);
        if (brand) specifics.Brand = brand;
        const mpn = inferModelNumber(title, sourceUrl, currentSupplier?.supplier_sku);
        if (mpn) specifics.MPN = mpn;
        return specifics;
      }

      function inferBrand(title) {
        const cleanTitle = String(title || "").replace(/\s+/g, " ").trim();
        if (!cleanTitle) return null;
        const knownPrefixes = ["Columbia Forest Products", "Ornamental Mouldings", "True Blue", "Milwaukee", "HDX"];
        const lowerTitle = cleanTitle.toLowerCase();
        const known = knownPrefixes.find((prefix) => lowerTitle.startsWith(prefix.toLowerCase()));
        if (known) return known;
        const stopWords = new Set(["in", "ft", "gal", "gallon", "qt", "oz", "pack", "count", "with", "for"]);
        const tokens = [];
        for (const token of cleanTitle.split(" ")) {
          const normalized = token.replace(/[^A-Za-z0-9]/g, "").toLowerCase();
          if (!normalized || stopWords.has(normalized) || /\d/.test(token)) break;
          tokens.push(token);
          if (tokens.length >= 3) break;
        }
        return tokens.length ? tokens.join(" ") : null;
      }

      function inferModelNumber(title, sourceUrl, supplierSku) {
        const candidates = [];
        try {
          const parts = new URL(sourceUrl).pathname.split("/").filter(Boolean).map(decodeURIComponent);
          if (parts.length > 1) candidates.push(parts[1]);
        } catch {}
        candidates.push(title || "");
        const ignored = new Set(["HDX", "USB", "LED", "FPR", "REDLITHIUM"]);
        for (const text of candidates) {
          const matches = String(text || "").match(/\b[A-Z0-9][A-Z0-9-]{4,}\b/g) || [];
          const modelCandidates = matches
            .map((value) => value.replace(/^-+|-+$/g, ""))
            .filter((value) => value && !ignored.has(value) && /\d/.test(value) && !/^\d+(?:-\d+)*$/.test(value));
          if (modelCandidates.length) return modelCandidates[modelCandidates.length - 1];
        }
        return supplierSku || null;
      }

      function ebayHandoffNote(product) {
        const workflow = productWorkflowState(product);
        if (workflow.key === "ready") return "Ready to copy the macro/package and manually review on eBay.";
        if (workflow.key === "images") return "Download every image locally before using the macro or eBay export.";
        if (workflow.key === "shipping") return "Confirm source shipping before listing so profit is real.";
        if (workflow.key === "capture") return "Capture source price, title, description, and images before listing.";
        if (workflow.key === "source") return "Attach or import a source URL before building the eBay package.";
        return "Review listing data before publishing.";
      }

      function supplierDiscountHtml(product) {
        const discount = Number(supplier(product)?.subscription_discount_percent || 0);
        if (!discount) return "";
        return `<div class="needs-data">Supplier subscription discount available: ${discount}% off. Treat as optional fulfillment savings, not shipping.</div>`;
      }

      function priceHistoryHtml(product) {
        const history = state.priceHistory?.[product.id];
        if (!history) {
          return `<div class="actions"><button class="secondary" onclick="loadPriceHistory(${product.id})">Load Price History</button></div>`;
        }
        if (!history.length) {
          return `<p class="muted">No cached price history yet.</p>`;
        }
        const rows = history.slice(0, 8).map((snapshot) => [
          esc(snapshot.source),
          money(snapshot.price),
          shippingBadgeFromValues(snapshot.price, snapshot.shipping),
          money(snapshot.suggested_price),
          esc(snapshot.message || "-"),
          new Date(snapshot.created_at).toLocaleString()
        ]);
        return `<details class="capture">
          <summary>Cached price history (${history.length})</summary>
          ${table(["Type", "Source", "Shipping", "Suggested", "Note", "Captured"], rows)}
        </details>`;
      }

      async function loadPriceHistory(id) {
        const history = await request(`/products/${id}/price-history`);
        state.priceHistory = { ...(state.priceHistory || {}), [id]: history };
        render();
        message(`Loaded ${history.length} cached price snapshot(s).`);
      }

      function missingSourceHtml(product) {
        const source = sourcePrice(product);
        if (source !== null && source !== undefined) return "";
        return `<div><span>Action</span><strong>${esc("Use capture or fill price")}</strong></div>`;
      }

      function sourcePrice(product) {
        if (product.supplier_products && product.supplier_products[0] && product.supplier_products[0].last_price !== null) {
          return product.supplier_products[0].last_price;
        }
        return product.listing_drafts && product.listing_drafts[0] ? product.listing_drafts[0].source_price : null;
      }

      function sourceShipping(product) {
        if (product.supplier_products && product.supplier_products[0]) {
          const value = product.supplier_products[0].last_shipping;
          if (value === null || value === undefined || Number(value) < 0) return null;
          return Number(value);
        }
        return null;
      }

      function shippingState(product) {
        const source = sourcePrice(product);
        if (source === null || source === undefined) return { key: "unknown", label: "Shipping unknown", className: "ship-unknown" };
        const shipping = sourceShipping(product);
        if (shipping === null || shipping === undefined) return { key: "unknown", label: "Shipping unknown", className: "ship-unknown" };
        if (shipping > 0) return { key: "paid", label: `Paid ${money(shipping)}`, className: "ship-paid" };
        return { key: "free", label: "Free shipping", className: "ship-free" };
      }

      function shippingBadgeHtml(product) {
        const state = shippingState(product);
        return `<span class="status ${state.className}">${esc(state.label)}</span>`;
      }

      function shippingBadgeFromValues(sourcePriceValue, sourceShippingValue) {
        if (sourcePriceValue === null || sourcePriceValue === undefined) {
          return `<span class="status ship-unknown">Shipping unknown</span>`;
        }
        if (sourceShippingValue === null || sourceShippingValue === undefined || Number(sourceShippingValue) < 0) {
          return `<span class="status ship-unknown">Shipping unknown</span>`;
        }
        const shipping = Number(sourceShippingValue || 0);
        if (shipping > 0) return `<span class="status ship-paid">Paid ${money(shipping)}</span>`;
        return `<span class="status ship-free">Free shipping</span>`;
      }

      function landedCost(product) {
        const source = sourcePrice(product);
        if (source === null || source === undefined) return null;
        return Math.round((effectiveSourceCost(product) + shippingCost(product)) * 100) / 100;
      }

      function giftCardDiscountPercent() {
        if (!state.settings.default_gift_card_discount_enabled) return 0;
        return Math.max(0, Math.min(Number(state.settings.default_gift_card_discount_percent || 0), 100));
      }

      function effectiveSourceCost(product) {
        const source = sourcePrice(product);
        if (source === null || source === undefined) return null;
        return Math.round(Number(source) * (1 - giftCardDiscountPercent() / 100) * 100) / 100;
      }

      function sourceTooltip(product) {
        const currentSupplier = supplier(product);
        const updated = currentSupplier?.updated_at ? new Date(currentSupplier.updated_at).toLocaleString() : "No supplier update yet";
        return [
          `Supplier item cost: ${money(sourcePrice(product))}`,
          `Gift card discount: ${percent(giftCardDiscountPercent() / 100)}`,
          `Effective item cost: ${money(effectiveSourceCost(product))}`,
          `Source shipping: ${shippingState(product).label}`,
          `Landed cost: ${money(landedCost(product))}`,
          `Last source update: ${updated}`
        ];
      }

      function shippingTooltip(product) {
        return [
          `Shipping status: ${shippingState(product).label}`,
          "This is added to source cost before profit and fees.",
          "Free means $0.00. Unknown means confirm before listing."

      }

      function draftTooltip(product) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        return [
          `Current draft price: ${money(draft?.calculated_price)}`,
          `Default strategy: ${state.settings.default_pricing_strategy || "margin"}`,
          `Estimated net profit: ${money(estimatedProfit(draft?.calculated_price, product))}`

      }

      function profitTooltip(product) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        return [
          `Net profit: ${money(estimatedProfit(draft?.calculated_price, product))}`,
          `Minimum profit target: ${money(state.settings.default_min_profit || 0)}`,
          `Fees used: ${percent(totalFeeRate())}`,
          "Formula: sell price - effective source cost - shipping - eBay/promoted/return fees."
        ];
      }

      function competitorTooltip(product) {
        return [
          `Competitor price: ${money(product.competitor_price)}`,
          `Undercut amount: ${money(state.settings.default_undercut_amount || 0)}`,
          `Raw target after undercut: ${money(competitorTargetPrice(product))}`
        ];
      }

      function undercutTooltip(product) {
        return [
          `Competitor minus undercut: ${money(competitorTargetPrice(product))}`,
          `Competitor: ${money(product.competitor_price)}`,
          `Undercut: ${money(state.settings.default_undercut_amount || 0)}`
        ];
      }

      function marginTooltip(product) {
        return [
          `Margin price: ${money(ownMarginPrice(product))}`,
          `Landed cost: ${money(landedCost(product))}`,
          `Desired margin: ${percent(state.settings.default_margin_percent || 0)}`,
          `Fees used: ${percent(totalFeeRate())}`
        ];
      }

      function minProfitTooltip(product) {
        return [
          `Minimum-profit floor: ${money(minimumProfitPrice(product))}`,
          `Landed cost: ${money(landedCost(product))}`,
          `Minimum profit: ${money(state.settings.default_min_profit || 0)}`,
          `Fees used: ${percent(totalFeeRate())}`
        ];
      }

      function safeCompetitorTooltip(product) {
        return [
          `Safe competitor price: ${money(safeCompetitorPrice(product))}`,
          `Undercut target: ${money(competitorTargetPrice(product))}`,
          `Minimum-profit floor: ${money(minimumProfitPrice(product))}`,
          "Uses whichever is higher so we do not price below the profit floor."
        ];
      }

      function ownMarginPrice(product) {
        const source = sourcePrice(product);
        if (source === null || source === undefined) return null;
        const feeRate = totalFeeRate();
        const margin = Number(state.settings.default_margin_percent || 0);
        const denominator = 1 - feeRate;
        if (denominator <= 0) return null;
        const landedCost = effectiveSourceCost(product) + shippingCost(product);
        const price = (landedCost * (1 + margin)) / denominator;
        return roundedSellingPrice(price);
      }

      function minimumProfitPrice(product) {
        const source = sourcePrice(product);
        if (source === null || source === undefined) return null;
        const denominator = 1 - totalFeeRate();
        if (denominator <= 0) return null;
        const minimumProfit = Number(state.settings.default_min_profit || 0);
        const price = (effectiveSourceCost(product) + shippingCost(product) + minimumProfit) / denominator;
        return roundedSellingPrice(price);
      }

      function competitorTargetPrice(product) {
        if (product.competitor_price === null || product.competitor_price === undefined) return null;
        const price = Number(product.competitor_price) - Number(state.settings.default_undercut_amount || 0);
        return roundedSellingPrice(price);
      }

      function safeCompetitorPrice(product) {
        const target = competitorTargetPrice(product);
        const floor = minimumProfitPrice(product);
        if (target === null && floor === null) return null;
        if (target === null) return floor;
        if (floor === null) return target;
        return Math.max(target, floor);
      }

      function estimatedProfit(sellPrice, product) {
        const source = sourcePrice(product);
        if (sellPrice === null || sellPrice === undefined || source === null || source === undefined) return null;
        const feeRate = totalFeeRate();
        const fees = Number(sellPrice) * feeRate;
        return Math.round((Number(sellPrice) - effectiveSourceCost(product) - shippingCost(product) - fees) * 100) / 100;
      }

      function shippingCost(product) {
        return Math.max(sourceShipping(product) || 0, 0);
      }

      function profitWarningHtml(sellPrice, product) {
        const profit = estimatedProfit(sellPrice, product);
        const minimum = Number(state.settings.default_min_profit || 0);
        if (!state.settings.default_min_profit_guard_enabled || profit === null || profit >= minimum) return "";
        return `<div class="price-note"><span>Warning</span><strong>${esc(`Draft is below min profit by ${money(minimum - profit)}`)}</strong></div>`;
      }

      function safeCompetitorWarningHtml(product) {
        const target = competitorTargetPrice(product);
        const floor = minimumProfitPrice(product);
        if (target === null || floor === null || target >= floor) return "";
        const gap = Math.round((floor - target) * 100) / 100;
        return `<div class="needs-data price-note"><span>Profit guard</span><strong>${esc(`Raw competitor target is ${money(gap)} below the minimum-profit floor`)}</strong></div>`;
      }

      function totalFeeRate() {
        return Number(state.settings.default_ebay_fee_rate || 0) + Number(state.settings.default_promoted_rate || 0) + Number(state.settings.default_return_risk_rate || 0);
      }

      function percent(value) {
        return `${(Number(value || 0) * 100).toFixed(1)}%`;
      }

      function normalizedRoundingCents(value) {
        const cents = Number(value);
        if (!Number.isFinite(cents) || cents < 0 || cents >= 1) return 0.99;
        return Math.round(cents * 100) / 100;
      }

      function roundedSellingPrice(value) {
        if (!state.settings.default_round_to_99) return Math.round(value * 100) / 100;
        return roundUpToCents(value, normalizedRoundingCents(state.settings.default_rounding_cents ?? 0.99));
      }

      function roundUpToCents(value, cents) {
        const dollars = Math.floor(value);
        const target = Math.round((dollars + cents) * 100) / 100;
        return value <= target ? target : Math.round((dollars + 1 + cents) * 100) / 100;
      }

      function captureHtml(p) {

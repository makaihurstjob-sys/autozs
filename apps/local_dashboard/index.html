      function mixReportBodyHtml(rows) {
        const total = rows.reduce((sum, row) => sum + Number(row.value || 0), 0);
        return rows.length ? mixHtml(rows.map((row) => [row.label, row.value, total, mixColor(row.label)])) : `<p class="muted">No mix data yet.</p>`;
      }

      function statsTopProductsTable(products) {
        return table(["Product", "Draft", "Profit", "Stage"], products.map((product) => [
          `<strong>${esc(product.title)}</strong><div class="draft">${esc(product.sku)}</div>`,
          money(product.draft_price),
          money(product.expected_profit),
          stageBadgeHtml(product.stage),
        ]));
      }

      function reportRowsHtml(rows) {
        return `<div class="report-list">${rows.map(([label, value]) => `<div class="report-row"><span class="muted">${esc(label)}</span><strong>${typeof value === "string" && value.includes("<") ? value : esc(value)}</strong></div>`).join("")}</div>`;
      }

      function reportPlaceholder(text) {
        return `<div class="report-placeholder">${esc(text)}</div>`;
      }

      function reportMissingValue() {
        return `<span class="muted">Report import needed</span>`;
      }

      function statsQuantitySold() {
        return (state.orders || []).reduce((total, order) => total + orderQuantity(order), 0);
      }

      function uniqueBuyerCount() {
        return new Set((state.orders || []).map((order) => order.buyer_username).filter(Boolean)).size;
      }

      function marketingHtml() {
        const settings = marketingSettings();
        const accounts = marketingAccounts();
        if (!accounts.some((account) => account.key === marketingAccountKey)) marketingAccountKey = "global";
        const current = marketingScope(settings, marketingAccountKey);
        const inherited = marketingAccountKey !== "global" && current.inherit_global !== false;
        const effective = inherited ? marketingScope(settings, "global") : current;
        return `<div>
          <div class="settings-view-head"><div><h2>Marketing</h2><p class="muted">Control promoted listing and campaign defaults globally or per eBay store.</p></div><button onclick="saveMarketingSettings()">Save marketing settings</button></div>
          <div class="settings-supplier-layout">
            <aside class="settings-supplier-list">
              <h3>Accounts</h3>
              ${accounts.map((account) => `<button class="${marketingAccountKey === account.key ? "active" : ""}" onclick="selectMarketingAccount('${escAttr(account.key)}')">${account.key === "global" ? "All accounts" : esc(account.label)}</button>`).join("")}
            </aside>
            <div class="settings-supplier-content">
              ${marketingAccountKey === "global" ? `<div class="marketing-scope-note">Global settings are the default for every store. Turn off inheritance on a store to override only that account.</div>` : `<label class="settings-toggle wide marketing-scope-note"><input id="marketing-inherit-global" type="checkbox" ${inherited ? "checked" : ""} /> Use All accounts marketing settings for this store</label>`}
              <div class="settings-section">
                <h3>${marketingAccountKey === "global" ? "All accounts defaults" : `${esc(marketingAccountLabel(marketingAccountKey))} marketing`}</h3>
                <div class="settings-form-grid">
                  <label class="settings-toggle wide"><input id="marketing-enabled" type="checkbox" ${effective.enabled !== false ? "checked" : ""} /> Enable marketing controls</label>
                  ${marketingAccountKey === "global" ? `<label class="settings-toggle wide"><input id="marketing-apply-all" type="checkbox" ${effective.apply_to_all !== false ? "checked" : ""} /> Apply global settings to all inherited accounts</label>` : ""}
                  <label class="settings-field"><span>Campaign strategy</span><select id="marketing-campaign-strategy">${["balanced", "maximize_sales", "traffic", "manual"].map((value) => `<option value="${value}" ${effective.campaign_strategy === value ? "selected" : ""}>${marketingStrategyLabel(value)}</option>`).join("")}</select></label>
                  <label class="settings-field"><span>Default promoted rate</span><input id="marketing-promoted-rate" type="number" min="0" max="0.5" step="0.001" value="${esc(effective.promoted_rate ?? 0.02)}" /></label>
                  <label class="settings-field"><span>Daily budget</span><input id="marketing-daily-budget" type="number" min="0" step="0.01" value="${esc(effective.daily_budget ?? 5)}" /></label>
                  <label class="settings-field"><span>Campaign name prefix</span><input id="marketing-campaign-prefix" value="${esc(effective.campaign_prefix || "AutoZS")}" /></label>
                  <label class="settings-toggle wide"><input id="marketing-auto-promote" type="checkbox" ${effective.auto_promote_new_listings !== false ? "checked" : ""} /> Auto-include new eligible listings</label>
                  <label class="settings-toggle wide"><input id="marketing-pause-low-stock" type="checkbox" ${effective.pause_low_stock_ads !== false ? "checked" : ""} /> Pause ads when quantity or source stock is risky</label>
                </div>
              </div>
              <div class="settings-section">
                <h3>eBay marketing pages to mirror next</h3>
                ${reportRowsHtml([
                  ["Summary", "Campaign totals, ad sales, ad fees, impressions, clicks"],
                  ["Promoted Listings", "Rates, eligible listings, campaign membership"],
                  ["Campaigns", "Budgets, names, statuses, start and end dates"],
                  ["Store promotions", "Coupons, markdown sale, buyer groups, newsletters"],
                ])}
              </div>
            </div>
          </div>
        </div>`;
      }

      function marketingSettings() {
        const parsed = settingJson("marketing_settings_json", {});
        return {
          global: { enabled: true, promoted_rate: 0.02, campaign_strategy: "balanced", daily_budget: 5, campaign_prefix: "AutoZS", apply_to_all: true, auto_promote_new_listings: true, pause_low_stock_ads: true, ...(parsed.global || {}) },
          accounts: parsed.accounts || {},
        };
      }

      function marketingAccounts() {
        return [{ key: "global", label: "All accounts" }, ...(state.ebayAccounts || []).map((account) => ({ key: account.key, label: ebayStoreDisplayName(account) }))];
      }

      function marketingScope(settings, key) {
        if (key === "global") return settings.global || {};
        return settings.accounts?.[key] || { inherit_global: true };
      }

      function marketingAccountLabel(key) {
        return marketingAccounts().find((account) => account.key === key)?.label || key;
      }

      function marketingStrategyLabel(value) {
        return {
          balanced: "Balanced",
          maximize_sales: "Maximize sales",
          traffic: "Drive traffic",
          manual: "Manual control",
        }[value] || value;
      }

      function selectMarketingAccount(key) {
        marketingAccountKey = key;
        render();
      }

      async function saveMarketingSettings() {
        const settings = marketingSettings();
        const key = marketingAccountKey;
        const inherit = key !== "global" && document.getElementById("marketing-inherit-global")?.checked;
        const scope = inherit ? { inherit_global: true } : {
          inherit_global: false,
          enabled: document.getElementById("marketing-enabled")?.checked ?? true,
          apply_to_all: document.getElementById("marketing-apply-all")?.checked ?? true,
          campaign_strategy: document.getElementById("marketing-campaign-strategy")?.value || "balanced",
          promoted_rate: Number(document.getElementById("marketing-promoted-rate")?.value || 0),
          daily_budget: Number(document.getElementById("marketing-daily-budget")?.value || 0),
          campaign_prefix: document.getElementById("marketing-campaign-prefix")?.value.trim() || "AutoZS",
          auto_promote_new_listings: document.getElementById("marketing-auto-promote")?.checked ?? true,
          pause_low_stock_ads: document.getElementById("marketing-pause-low-stock")?.checked ?? true,
        };
        if (key === "global") settings.global = scope;
        else settings.accounts[key] = scope;
        await saveCatalogSettings({ marketing_settings_json: JSON.stringify(settings) }, "Marketing settings saved.");
      }

      function customerServiceHtml() {
        return `<div class="empty-state">To be worked on</div>`;
      }

      function calendarHtml() {
        ensureCalendarDate();
        const monthDate = parseMonthKey(calendarMonth);
        const events = calendarEvents();
        const eventsByDate = groupCalendarEventsByDate(events);
        const selectedEvents = eventsByDate.get(calendarSelectedDate) || [];
        const monthEvents = events.filter((event) => event.dateKey.slice(0, 7) === calendarMonth);
        return `<div class="calendar-shell">
          <div class="calendar-toolbar">
            <div>
              <h2>${esc(monthDate.toLocaleDateString([], { month: "long", year: "numeric" }))}</h2>
            </div>
            <div class="actions">
              <button class="secondary icon-button" onclick="shiftCalendarMonth(-1)" aria-label="Previous month" title="Previous month">${calendarArrowSvg("left")}</button>
              <button class="secondary" onclick="setCalendarToday()">Today</button>
              <button class="secondary icon-button" onclick="shiftCalendarMonth(1)" aria-label="Next month" title="Next month">${calendarArrowSvg("right")}</button>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>Scheduled this month</span><strong>${monthEvents.filter((event) => event.type === "scheduled").length}</strong></div>
            <div class="metric"><span>Listed this month</span><strong>${monthEvents.filter((event) => event.type === "listed").length}</strong></div>
            <div class="metric"><span>Renewals this month</span><strong>${monthEvents.filter((event) => event.type === "renewal").length}</strong></div>
            <div class="metric"><span>Sold this month</span><strong>${monthEvents.filter((event) => event.type === "sold").length}</strong></div>
            <div class="metric"><span>Selected day</span><strong>${selectedEvents.length}</strong></div>
          </div>
          <div class="calendar-layout">
            ${calendarGridHtml(monthDate, eventsByDate)}
            ${calendarDetailHtml(selectedEvents)}
          </div>
        </div>`;
      }

      function ensureCalendarDate() {
        const today = localDateKey(new Date());
        if (!calendarSelectedDate) calendarSelectedDate = today;
        if (!calendarMonth) calendarMonth = calendarSelectedDate.slice(0, 7);
      }

      function calendarArrowSvg(direction) {
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="${direction === "left" ? "m15 18-6-6 6-6" : "m9 6 6 6-6 6"}"/></svg>`;
      }

      function parseMonthKey(key) {
        const [year, month] = String(key || localMonthKey(new Date())).split("-").map(Number);
        return new Date(year || new Date().getFullYear(), Math.max(0, (month || 1) - 1), 1);
      }

      function localMonthKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }

      function localDateKey(value) {
        if (!(value instanceof Date)) {
          const instant = appDate(value);
          if (!instant) return "";
          const parts = Object.fromEntries(new Intl.DateTimeFormat("en-US", { timeZone: displayTimeZone(), year: "numeric", month: "2-digit", day: "2-digit" }).formatToParts(instant).filter((part) => part.type !== "literal").map((part) => [part.type, part.value]));
          return `${parts.year}-${parts.month}-${parts.day}`;
        }
        const date = value;
        if (Number.isNaN(date.getTime())) return "";
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function calendarGridHtml(monthDate, eventsByDate) {
        const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
        const gridStart = new Date(first);
        gridStart.setDate(first.getDate() - first.getDay());
        const todayKey = localDateKey(new Date());
        const cells = [];
        for (let index = 0; index < 42; index += 1) {
          const cellDate = new Date(gridStart);
          cellDate.setDate(gridStart.getDate() + index);
          const dateKey = localDateKey(cellDate);
          const dayEvents = eventsByDate.get(dateKey) || [];
          const classes = [
            "calendar-day",
            cellDate.getMonth() === monthDate.getMonth() ? "" : "is-muted",
            dateKey === todayKey ? "is-today" : "",
            dateKey === calendarSelectedDate ? "is-selected" : ""
          ].filter(Boolean).join(" ");
          cells.push(`<button class="${classes}" onclick="selectCalendarDate('${dateKey}')" aria-label="${escAttr(calendarDayLabel(cellDate, dayEvents))}">
            <span class="calendar-day-number">${cellDate.getDate()}</span>
            <span class="calendar-day-events">${calendarDayPillsHtml(dayEvents)}</span>
          </button>`);
        }
        return `<div class="calendar-grid">
          ${weekdays.map((day) => `<div class="calendar-weekday">${esc(day)}</div>`).join("")}
          ${cells.join("")}
        </div>`;
      }

      function calendarDayLabel(date, events) {
        const label = date.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric", year: "numeric" });
        if (!events.length) return `${label}. No events.`;
        return `${label}. ${events.length} event${events.length === 1 ? "" : "s"}.`;
      }

      function calendarDayPillsHtml(events) {
        const counts = calendarEventCounts(events);
        return [
          counts.scheduled ? `<span class="calendar-event-pill scheduled">Scheduled ${counts.scheduled}</span>` : "",
          counts.listed ? `<span class="calendar-event-pill listed">Listed ${counts.listed}</span>` : "",
          counts.renewal ? `<span class="calendar-event-pill renewal">Renewal ${counts.renewal}</span>` : "",
          counts.sold ? `<span class="calendar-event-pill sold">Sold ${counts.sold}</span>` : ""
        ].join("");
      }

      function calendarEventCounts(events) {
        return events.reduce((counts, event) => {
          counts[event.type] = (counts[event.type] || 0) + 1;
          return counts;
        }, { scheduled: 0, listed: 0, renewal: 0, sold: 0 });
      }

      function calendarDetailHtml(events) {
        const selected = parseCalendarDate(calendarSelectedDate);
        const title = selected ? selected.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" }) : "Selected day";
        return `<aside class="calendar-detail">
          <div>
            <h3>${esc(title)}</h3>
            <div class="muted">${events.length ? `${events.length} calendar item${events.length === 1 ? "" : "s"}` : "No scheduled listings, live listings, or sales for this day."}</div>
          </div>
          ${events.length ? events.map(calendarEventCardHtml).join("") : `<div class="empty-state">Nothing planned or sold here yet.</div>`}
        </aside>`;
      }

      function parseCalendarDate(dateKey) {
        const [year, month, day] = String(dateKey || "").split("-").map(Number);
        if (!year || !month || !day) return null;
        return new Date(year, month - 1, day);
      }

      function calendarEventCardHtml(event) {
        return `<div class="calendar-event-card ${event.type}">
          <div class="calendar-event-title">${esc(event.title)}</div>
          <div class="calendar-event-meta">${esc(event.timeLabel)} · ${esc(event.subtitle)}</div>
          <div>${calendarEventBadgeHtml(event)}</div>
          ${calendarEventFactsHtml(event)}
          <div class="actions">${calendarEventActionHtml(event)}</div>
        </div>`;
      }

      function calendarEventFactsHtml(event) {
        const rows = [];
        if (event.price !== null && event.price !== undefined && event.price !== "") rows.push(["Price", money(event.price)]);
        const dateLabel = event.type === "renewal" ? "Renews" : event.type === "listed" ? "Listed" : event.type === "sold" ? "Sold" : "Starts";
        rows.push([dateLabel, formatSchedule(event.date)]);
        return `<div class="calendar-event-facts">${rows.map(([label, value]) => `<div class="calendar-event-fact"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join("")}</div>`;
      }

      function calendarEventBadgeHtml(event) {
        const label = event.plannedOnly ? "Planned" : event.type === "scheduled" ? "Scheduled" : event.type === "listed" ? "Listed" : event.type === "renewal" ? "Renewal" : "Sold";
        const className = event.type === "scheduled" ? "stage-images" : event.type === "listed" ? "stage-ready" : event.type === "renewal" ? "stage-ready" : "order-status-pending";
        return `<span class="status ${className}">${label}</span>`;
      }

      function calendarEventActionHtml(event) {
        if (event.type === "sold") {
          return `<button class="secondary" onclick="openCalendarOrder(${event.orderId})">Open Order</button>`;
        }
        if (event.plannedOnly) {
          return `<button class="calendar-event-preview-button" onclick="importCalendarPlannedProduct(${event.productId})" aria-label="Import scheduled listing" title="Import scheduled listing">
          <span class="calendar-event-preview-fallback">${event.previewFallback || sourceLogoSvg()}</span>
          ${event.previewSrc ? `<img src="${esc(event.previewSrc)}" alt="" onerror="this.classList.add('is-missing')" />` : ""}
        </button>`;
        }
        const label = event.type === "listed" || event.type === "renewal" ? "Open Listing" : "Open Scheduled";
        return `<button class="calendar-event-preview-button" onclick="openCalendarListing(${event.productId}, '${event.type}')" aria-label="${escAttr(label)}" title="${escAttr(label)}">
          <span class="calendar-event-preview-fallback">${event.previewFallback || sourceLogoSvg()}</span>
          ${event.previewSrc ? `<img src="${esc(event.previewSrc)}" alt="" onerror="this.classList.add('is-missing')" />` : ""}
        </button>`;
      }

      function groupCalendarEventsByDate(events) {
        const groups = new Map();
        events.forEach((event) => {
          if (!groups.has(event.dateKey)) groups.set(event.dateKey, []);
          groups.get(event.dateKey).push(event);
        });
        groups.forEach((items) => items.sort((a, b) => a.date - b.date || a.title.localeCompare(b.title)));
        return groups;
      }

      function calendarEvents() {
        const events = [];
        const productsById = new Map((state.products || []).map((product) => [Number(product.id), product]));
        const listingItems = ebayListingItems();
        const listingItemsByProduct = new Map(listingItems.map((item) => [Number(item.product_id), item]));
        const liveProductIds = new Set(listingItems.filter(listingIsLive).map((item) => Number(item.product_id)));
        (state.listingJobs || []).forEach((job) => {
          if (!job.listing_schedule_at || ["cancelled", "tombstoned"].includes(job.status)) return;
          if (liveProductIds.has(Number(job.product_id))) return;
          const product = productsById.get(Number(job.product_id));
          const listingItem = listingItemsByProduct.get(Number(job.product_id));
          events.push(calendarEventFromDate({
            type: "scheduled",
            date: job.listing_schedule_at,
            title: listingItem?.title || product?.title || `Product ${job.product_id}`,
            subtitle: `eBay start · ${job.ebay_draft_id ? `Draft ${job.ebay_draft_id}` : job.status}`,
            productId: job.product_id,
            price: calendarEventPrice(product, listingItem),
            previewSrc: productPreviewImageSrc(product),
            previewFallback: product ? (supplierLogoHtml(product) || sourceLogoSvg()) : sourceLogoSvg()
          }));
        });
        (state.products || []).forEach((product) => {
          if (!product.listing_schedule_at) return;
          if (liveProductIds.has(Number(product.id))) return;
          const hasListingJobSchedule = (state.listingJobs || []).some((job) =>
            Number(job.product_id) === Number(product.id) && job.listing_schedule_at && !["cancelled", "tombstoned"].includes(job.status)
          );
          if (hasListingJobSchedule) return;
          events.push(calendarEventFromDate({
            type: "scheduled",
            date: product.listing_schedule_at,
            title: product.title,
            subtitle: "Planned dashboard start",
            productId: product.id,
            plannedOnly: true,
            price: calendarEventPrice(product),
            previewSrc: productPreviewImageSrc(product),
            previewFallback: supplierLogoHtml(product) || sourceLogoSvg()
          }));
        });
        listingItems.forEach((listingItem) => {
          if (!listingIsLive(listingItem)) return;
          const date = listingStartDate(listingItem) || listingItem.listing_started_at || listingItem.updated_at;
          if (!date) return;
          const product = productsById.get(Number(listingItem.product_id));
          const listingId = listingItem.listing_id || extractListingIdFromJob(listingItem.listing_job);
          events.push(calendarEventFromDate({
            type: "listed",
            date,
            title: listingItem.title || product?.title || `eBay listing ${listingId || listingItem.product_id}`,
            subtitle: `${listingId ? `Item ${listingId}` : "eBay listing"} · ${listingDaysUntilRelist(listingItem) ?? "-"} days to relist`,
            productId: listingItem.product_id,
            price: calendarEventPrice(product, listingItem),
            previewSrc: productPreviewImageSrc(product),
            previewFallback: product ? (supplierLogoHtml(product) || sourceLogoSvg()) : sourceLogoSvg()
          }));
          const renewal = listingRenewalDate(listingItem);
          if (renewal) {
            events.push(calendarEventFromDate({
              type: "renewal",
              date: renewal,
              title: listingItem.title || product?.title || `eBay listing ${listingId || listingItem.product_id}`,
              subtitle: `Renews · ${listingId ? `Item ${listingId}` : "eBay listing"} · ${Number(listingItem.listing_views || 0)} views`,
              productId: listingItem.product_id,
              price: calendarEventPrice(product, listingItem),
              previewSrc: productPreviewImageSrc(product),
              previewFallback: product ? (supplierLogoHtml(product) || sourceLogoSvg()) : sourceLogoSvg()
            }));
          }
        });
        (state.orders || []).forEach((order) => {
          const firstItem = order.items?.[0];
          events.push(calendarEventFromDate({
            type: "sold",
            date: order.created_at || order.updated_at,
            title: orderTitle(order),
            subtitle: `${order.ebay_order_id} · ${money(order.total)} · Buyer ${order.buyer_username || "Unknown"}`,
            orderId: order.id,
            productId: firstItem?.product_id || null,
            price: order.total
          }));
        });
        return events.filter(Boolean).sort((a, b) => a.date - b.date || a.title.localeCompare(b.title));
      }

      function calendarEventPrice(product, listingItem = null) {
        const draft = product?.listing_drafts?.[0];
        const candidates = [
          listingItem?.price,
          listingItem?.calculated_price,
          draft?.calculated_price,
          draft?.price,
          product?.listing_price,
        ];
        const value = candidates.find((candidate) => candidate !== null && candidate !== undefined && candidate !== "" && Number.isFinite(Number(candidate)));
        return value === undefined ? null : Number(value);
      }

      function calendarEventFromDate(event) {
        const date = new Date(event.date);
        if (Number.isNaN(date.getTime())) return null;
        return {
          ...event,
          date,
          dateKey: localDateKey(date),
          timeLabel: date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
        };
      }

      function selectCalendarDate(dateKey) {
        calendarSelectedDate = dateKey;
        calendarMonth = dateKey.slice(0, 7);
        render();
      }

      function shiftCalendarMonth(delta) {
        ensureCalendarDate();
        const date = parseMonthKey(calendarMonth);
        date.setMonth(date.getMonth() + Number(delta || 0));
        calendarMonth = localMonthKey(date);
        const selected = parseCalendarDate(calendarSelectedDate);
        if (!selected || localMonthKey(selected) !== calendarMonth) {
          calendarSelectedDate = localDateKey(new Date(date.getFullYear(), date.getMonth(), 1));
        }
        render();
      }

      function setCalendarToday() {
        const today = new Date();
        calendarSelectedDate = localDateKey(today);
        calendarMonth = localMonthKey(today);
        render();
      }

      function openCalendarListing(productId, type) {
        if (!productId) return message("No product is attached to this calendar item.");
        selectedProductIds.clear();
        selectedProductIds.add(Number(productId));
        active = "eBay Listings";
        listingStatusFilter = ["listed", "renewal"].includes(type) ? "listed" : "scheduled";
        listingDetailsOpenState.set(Number(productId), true);
        render();
      }

      function openCalendarOrder(orderId) {
        active = "Orders";
        orderStatusFilter = "all";
        selectedOrderIds.clear();
        selectedOrderIds.add(Number(orderId));
        orderDetailsOpenState.set(Number(orderId), true);
        render();
      }

      async function updateStatsFilter(kind, value) {
        if (kind === "range") statsRange = value;
        if (kind === "grain") statsGrain = value;
        if (kind === "account") statsAccount = value;
        await refreshAll();
      }

      function stageBadgeHtml(stage) {
        const className = stage === "Ready" ? "stage-ready" : stage === "Capture" ? "stage-capture" : stage === "Images" ? "stage-images" : stage === "Shipping" ? "stage-shipping" : "stage-source";
        return `<span class="status ${className}">${esc(stage)}</span>`;
      }

      function mixColor(label) {
        return {
          Free: "#28a957",
          Paid: "#f08a3e",
          Unknown: "#d99a28",
          Ready: "#28a957",
          Capture: "#d99a28",
          Shipping: "#f08a3e",
          Images: "#2f80ed",
          "No source": "#b9532f",
          "Manual ready": "#28a957",
          "API ready": "#2f80ed",
          "Needs work": "#d99a28",
        }[label] || "#166b5f";
      }

      function statsFilteredProducts() {
        return state.products.filter((product) => inStatsRange(statsDate(product)));
      }

      function statsFilteredOrders() {
        return state.orders.filter((order) => inStatsRange(order.created_at || order.ship_by));
      }

      function statsFilteredSnapshots() {
        return state.snapshots.filter((snapshot) => inStatsRange(snapshot.created_at));
      }

      function statsDate(product) {
        return product.created_at || supplier(product)?.updated_at || product.updated_at;
      }

      function inStatsRange(value) {
        if (statsRange === "all") return true;
        const date = value ? new Date(value) : null;
        if (!date || Number.isNaN(date.getTime())) return false;
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - Number(statsRange));
        return date >= cutoff;
      }

      function catalogTotals(products) {
        return products.reduce((totals, product) => {
          const draftPrice = product.listing_drafts?.[0]?.calculated_price;
          const source = sourcePrice(product);
          const cost = source === null || source === undefined ? 0 : Number(source) + sourceShipping(product);
          const profit = estimatedProfit(draftPrice, product);
          totals.revenue += Number(draftPrice || 0);
          totals.cost += cost;
          totals.profit += Number(profit || 0);
          return totals;
        }, { revenue: 0, cost: 0, profit: 0 });
      }

      function periodKey(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Unknown";
        if (statsGrain === "month") return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
        return date.toISOString().slice(0, 10);
      }

      function statsSeries(products) {
        const groups = new Map();
        products.forEach((product) => {
          const key = periodKey(statsDate(product));
          const current = groups.get(key) || { label: key, revenue: 0, cost: 0, profit: 0 };
          const draftPrice = product.listing_drafts?.[0]?.calculated_price;
          const source = sourcePrice(product);
          current.revenue += Number(draftPrice || 0);
          current.cost += source === null || source === undefined ? 0 : Number(source) + sourceShipping(product);
          current.profit += Number(estimatedProfit(draftPrice, product) || 0);
          groups.set(key, current);
        });
        return [...groups.values()].sort((a, b) => a.label.localeCompare(b.label));
      }

      function importSeries(products) {
        const groups = new Map();
        products.forEach((product) => {
          const key = periodKey(statsDate(product));
          const current = groups.get(key) || { label: key, count: 0 };
          current.count += 1;
          groups.set(key, current);
        });
        return [...groups.values()].sort((a, b) => a.label.localeCompare(b.label));
      }

      function lineChartHtml(rows) {
        if (!rows.length) return `<p class="muted">No products in this period yet.</p>`;
        const width = 720;
        const height = 260;
        const pad = 32;
        const keys = ["revenue", "cost", "fees", "profit"];
        const max = Math.max(1, ...rows.flatMap((row) => keys.map((key) => Number(row[key] || 0))));
        const x = (index) => rows.length === 1 ? width / 2 : pad + (index * (width - pad * 2)) / (rows.length - 1);
        const y = (value) => height - pad - (Number(value || 0) / max) * (height - pad * 2);
        const path = (key) => rows.map((row, index) => `${index === 0 ? "M" : "L"} ${x(index).toFixed(1)} ${y(row[key]).toFixed(1)}`).join(" ");
        const dots = (key, color, label) => rows.map((row, index) =>
          `<circle cx="${x(index).toFixed(1)}" cy="${y(row[key]).toFixed(1)}" r="4" fill="${color}" tabindex="0"><title>${esc(row.label)}\n${label}: ${money(row[key])}</title></circle>`
        ).join("");
        const lastLabel = rows[rows.length - 1]?.label || "";
        return `<svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Revenue cost fees and profit graph">
          <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="var(--line)" />
          <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="var(--line)" />
          <text x="${pad}" y="18" fill="var(--muted)" font-size="12">${money(max)}</text>
          <text x="${width - pad}" y="${height - 8}" fill="var(--muted)" font-size="12" text-anchor="end">${esc(lastLabel)}</text>
          <path d="${path("revenue")}" fill="none" stroke="#2f80ed" stroke-width="3" />
          <path d="${path("cost")}" fill="none" stroke="#f08a3e" stroke-width="3" />
          <path d="${path("fees")}" fill="none" stroke="#a46be8" stroke-width="3" />
          <path d="${path("profit")}" fill="none" stroke="#28a957" stroke-width="3" />
          ${dots("revenue", "#2f80ed", "Revenue")}
          ${dots("cost", "#f08a3e", "Cost")}
          ${dots("fees", "#a46be8", "Fees")}
          ${dots("profit", "#28a957", "Profit")}
        </svg>`;
      }

      function barChartHtml(rows) {
        if (!rows.length) return `<p class="muted">No imports in this period yet.</p>`;
        const width = 360;
        const height = 260;
        const pad = 30;
        const max = Math.max(1, ...rows.map((row) => row.count));
        const barGap = 5;
        const barWidth = Math.max(8, (width - pad * 2) / rows.length - barGap);
        const bars = rows.map((row, index) => {
          const barHeight = (row.count / max) * (height - pad * 2);
          const x = pad + index * (barWidth + barGap);
          const y = height - pad - barHeight;
          return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${barHeight.toFixed(1)}" rx="3" fill="#166b5f"><title>${esc(row.label)}: ${row.count}</title></rect>`;
        }).join("");
        return `<svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Import volume graph">
          <line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="var(--line)" />
          <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="var(--line)" />
          <text x="${pad}" y="18" fill="var(--muted)" font-size="12">${max}</text>
          ${bars}
        </svg>`;
      }

      function mixHtml(rows) {
        if (!rows.length) return "";
        return rows.map(([label, value, total, color]) => {
          const percent = total ? Math.round((value / total) * 100) : 0;
          return `<div class="mix-row" title="${esc(`${label}: ${value} (${percent}%)`)}"><span class="muted">${esc(label)}</span><div class="mix-bar"><div style="background:${color};width:${percent}%"></div></div><strong>${value}</strong></div>`;
        }).join("");
      }

      function refreshPriorityCounts(items) {
        return items.reduce((counts, item) => {
          counts.all += 1;
          counts[item.priority] = (counts[item.priority] || 0) + 1;
          if (item.priority === "high" || item.priority === "medium") counts.needs += 1;
          return counts;
        }, { all: 0, needs: 0, high: 0, medium: 0, low: 0 });
      }

      function filteredRefreshItems(items) {
        if (refreshPriorityFilter === "all") return items;
        if (refreshPriorityFilter === "needs") return items.filter((item) => item.priority === "high" || item.priority === "medium");
        return items.filter((item) => item.priority === refreshPriorityFilter);
      }

      function refreshFilterButton(key, label, className) {
        return `<button class="secondary ${refreshPriorityFilter === key ? "active" : ""}" onclick="setRefreshPriorityFilter('${key}')"><span class="${className}">${esc(label)}</span></button>`;
      }

      function setRefreshPriorityFilter(key) {
        refreshPriorityFilter = key;
        render();
      }

      async function saveRefreshInterval() {
        const value = Number(document.getElementById("refresh-hours").value);
        if (Number.isNaN(value) || value < 0.25 || value > 168) return message("Refresh interval must be between 0.25 and 168 hours.");
        await request("/settings/pricing", { method: "PATCH", body: JSON.stringify({ source_refresh_interval_hours: value }) });
        await refreshAll();
        message(`Source refresh interval saved at ${value} hour(s).`);
      }

      function sourceRefreshJobsHtml() {
        const jobs = state.sourceRefreshJobs || [];
        if (!jobs.length) return `<p class="muted">No browser price-refresh batches have run yet.</p>`;
        return `<details class="capture" open>
          <summary>Browser price refresh history (${jobs.length})</summary>
          ${table(["Batch", "Product", "Before", "Captured", "Result", "Attempts", "When", "Action"], jobs.slice(0, 25).map((job) => [
            esc(job.batch_key),
            `<strong>${esc(job.title)}</strong><div class="draft">${esc(job.sku)}</div>`,
            money(job.baseline_price),
            money(job.captured_price),
            `<span class="status ${job.status === "completed" ? "stage-ready" : job.status === "failed" ? "stage-source" : "stage-shipping"}">${esc(job.status)}</span><div class="draft">${esc(job.message || "")}</div>`,
            job.attempts,
            new Date(job.updated_at).toLocaleString(),
            ["queued", "running"].includes(job.status) && job.runner_url
              ? `<button class="secondary" onclick="openEncodedUrl('${encodeURIComponent(job.runner_url)}')">Resume</button>`
              : "-"

      async function startRefreshPilot(limit = 5, force = false) {
        const intervalHours = Number(state.settings.source_refresh_interval_hours || 6);

          method: "POST",
          body: JSON.stringify({ limit, interval_hours: intervalHours, force })
        });
        await refreshAll();
        if (!batch.runner_url) return message(`No eligible products were queued. ${batch.due_available || 0} product(s) are currently due.`);
        window.open(batch.runner_url, "_blank", "noopener,noreferrer");
        message(`Started ${batch.queued}-product refresh batch in one Chrome tab. Keep that tab open until it says the batch is complete.`);
      }

      function refreshQueueHtml(items) {

          `<strong>${esc(item.title)}</strong><div class="draft">${esc(item.sku)}</div><div class="draft">${esc(item.reason)}</div>`,

          money(item.estimated_profit),
          item.age_hours === null || item.age_hours === undefined ? "-" : `${item.age_hours}h`,
          item.extension_ready ? `<button class="secondary" onclick="openEncodedUrl('${encodeURIComponent(autoImportUrl(item.source_url))}')">Auto Import</button><div class="draft">Use the on-page Import to Website button if capture does not start automatically.</div>` : `<span class="needs-data">Attach source URL first.</span>`
        ]));
      }

      function openNextRefreshSource() {
        const item = activeRefreshItemsWithUrls()[0];
        if (!item) return message("No source URLs in the current refresh queue filter.");
        window.open(autoImportUrl(item.source_url), "_blank", "noopener,noreferrer");
        message(`Opened ${item.sku} with extension auto-import enabled. Use Import to Website on the source page if capture does not start automatically.`);

      function openRefreshBatch(limit = 5) {
        const items = activeRefreshItemsWithUrls().slice(0, limit);
        if (!items.length) return message("No source URLs in the current refresh queue filter.");
        items.forEach((item, index) => {

        const urls = activeRefreshItemsWithUrls().map((item) => item.source_url);
        if (!urls.length) return message("No source URLs in the current refresh queue filter.");

      function ordersHtml() {
        const orders = filteredOrders();
        const counts = orderStatusCounts();
        return `
          ${ordersFilterMenuHtml(counts)}

          ${orders.length

      function primaryOrderTask(order) {
        return (order.fulfillment_tasks || [])[0] || null;
      }

      function normalizedOrderStatus(order) {
        const taskStatus = primaryOrderTask(order)?.status;
        if (["open", "in_progress", "completed", "blocked"].includes(taskStatus)) return taskStatus;
        if (["completed", "shipped"].includes(order.status)) return "completed";
        return "open";
      }

      function orderStatusMeta(order) {
        return {
          open: { label: "Pending", className: "order-status-pending", cardClass: "order-pending" },
          in_progress: { label: "Ordered", className: "order-status-progress", cardClass: "order-in-progress" },
          completed: { label: "Completed", className: "order-status-completed", cardClass: "order-completed" },
          blocked: { label: "Needs review", className: "order-status-blocked", cardClass: "order-blocked" },
        }[normalizedOrderStatus(order)];
      }

      function orderStatusCounts() {
        return state.orders.reduce((counts, order) => {
          counts.all += 1;
          counts[normalizedOrderStatus(order)] += 1;
          return counts;
        }, { all: 0, open: 0, in_progress: 0, completed: 0, blocked: 0 });
      }

      function filteredOrders() {
        if (orderStatusFilter === "all") return state.orders;
        return state.orders.filter((order) => normalizedOrderStatus(order) === orderStatusFilter);
      }

      function ordersFilterMenuHtml(counts) {

          all: "All orders",

            ${filterMenuOption("All orders", orderStatusFilter === "all", "setOrderStatusFilter('all')", counts.all)}
            ${filterMenuOption("Pending", orderStatusFilter === "open", "setOrderStatusFilter('open')", counts.open)}
            ${filterMenuOption("Ordered", orderStatusFilter === "in_progress", "setOrderStatusFilter('in_progress')", counts.in_progress)}
            ${filterMenuOption("Completed", orderStatusFilter === "completed", "setOrderStatusFilter('completed')", counts.completed)}
            ${filterMenuOption("Needs review", orderStatusFilter === "blocked", "setOrderStatusFilter('blocked')", counts.blocked)}
          </div>

      }

        orderFilterMenuOpen = !orderFilterMenuOpen;

        listingFilterMenuOpen = false;
        render();
      }

      function setOrderStatusFilter(status) {

      function orderSelectionToolbarHtml(orders) {
        const visibleIds = orders.map((order) => order.id);
        const selectedVisible = visibleIds.filter((id) => selectedOrderIds.has(id)).length;
        const allVisibleSelected = visibleIds.length > 0 && selectedVisible === visibleIds.length;
        return `<div class="selection-toolbar">
          <label class="select-visible-control" title="Select every visible order"><input type="checkbox" aria-label="Select all visible orders" ${allVisibleSelected ? "checked" : ""} onchange="toggleVisibleOrderSelection(this.checked)" /></label>
          <span class="selection-count">${selectedVisible} item${selectedVisible === 1 ? "" : "s"} selected</span>

      function toggleVisibleOrderSelection(checked) {
        filteredOrders().forEach((order) => {
          if (checked) selectedOrderIds.add(order.id);
          else selectedOrderIds.delete(order.id);
        });
        render();
      }

      function toggleOrderSelection(orderId, checked) {
        if (checked) selectedOrderIds.add(orderId);
        else selectedOrderIds.delete(orderId);
        render();
      }

      function orderDetailsAreOpen(orderId) {
        return Boolean(orderDetailsOpenState.get(Number(orderId)));
      }

      function toggleOrderDrawer(orderId) {
        orderDetailsOpenState.set(Number(orderId), !orderDetailsAreOpen(orderId));
        render();
      }

      function rememberOrderDetailsOpenState(orderId, open) {
        orderDetailsOpenState.set(Number(orderId), Boolean(open));
      }

      function toggleOrderDrawerFromCard(event, orderId) {
        if (cardClickShouldToggle(event)) toggleOrderDrawer(orderId);
      }

      function orderItemProduct(order) {
        const firstItem = order.items?.[0];
        const byId = state.products.find((product) => Number(product.id) === Number(firstItem?.product_id));
        if (byId) return byId;
        const itemKey = orderProductMatchKey(firstItem?.title);
        return state.products.find((product) => orderProductMatchKey(product.title) === itemKey) || null;
      }

      function orderProductMatchKey(value) {
        return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
      }

      function orderTitle(order) {
        const first = order.items?.[0];
        if (!first) return `Order ${order.ebay_order_id}`;
        const extra = Math.max((order.items || []).length - 1, 0);
        return extra ? `${first.title} + ${extra} more` : first.title;
      }

      function orderQuantity(order) {
        return (order.items || []).reduce((total, item) => total + Number(item.quantity || 0), 0);
      }

      function orderSourceCost(order) {
        const result = (order.items || []).reduce((totals, item) => {
          const itemKey = orderProductMatchKey(item.title);
          const product = state.products.find((entry) =>
            Number(entry.id) === Number(item.product_id) || orderProductMatchKey(entry.title) === itemKey
          );
          const price = product ? sourcePrice(product) : null;
          if (price === null || price === undefined) return totals;
          totals.found = true;
          totals.value += Number(price) * Number(item.quantity || 1);
          return totals;
        }, { found: false, value: 0 });
        return result.found ? result.value : null;
      }

      function orderExpectedProfit(order) {
        const explicit = (order.items || []).map((item) => item.expected_profit).filter((value) => value !== null && value !== undefined);
        if (explicit.length === (order.items || []).length && explicit.length) {
          return explicit.reduce((total, value) => total + Number(value), 0);
        }
        const sourceCost = orderSourceCost(order);
        return sourceCost === null ? null : Number(order.total || 0) - sourceCost;
      }

      function compactDate(value) {
        if (!value) return "-";
        return new Date(value).toLocaleDateString([], { month: "short", day: "numeric", year: "numeric" });
      }

      function orderShipByHtml(order) {
        if (!order.ship_by) return "-";
        const overdue = normalizedOrderStatus(order) !== "completed" && new Date(order.ship_by).getTime() < Date.now();
        return `<span class="status ${overdue ? "order-status-blocked" : "order-status-progress"}">${esc(compactDate(order.ship_by))}</span>`;
      }

      function orderCardHtml(order) {
        const product = orderItemProduct(order);
        const status = orderStatusMeta(order);
        const open = orderDetailsAreOpen(order.id);
        const detailLabel = `${open ? "Hide" : "Show"} order details`;
        return `<div class="product-card order-card ${status.cardClass}" onclick="toggleOrderDrawerFromCard(event, ${order.id})">
          <div class="order-row">
            <div class="product-leading-controls">

      async function updateOrderTaskStatus(orderId, status) {
        const order = state.orders.find((item) => Number(item.id) === Number(orderId));
        const task = primaryOrderTask(order || {});
        if (!task) return message("This order does not have a fulfillment task yet.");
        let exceptionReason = task.exception_reason;
        if (status === "blocked" && !exceptionReason) {
          exceptionReason = prompt("Why does this order need review?", "Supplier availability needs review") || "Supplier availability needs review";
        }
        await request(`/fulfillment-tasks/${task.id}`, {
          method: "PATCH",
          body: JSON.stringify({ status, exception_reason: status === "blocked" ? exceptionReason : null })
        });
        await refreshAll();
        const label = { open: "Pending", in_progress: "Ordered", completed: "Completed", blocked: "Needs review" }[status] || status;
        message(`Order ${order.ebay_order_id} updated to ${label}.`);
      }

      async function updateSelectedOrderTasks(status) {
        const orders = state.orders.filter((order) => selectedOrderIds.has(order.id) && primaryOrderTask(order));
        if (!orders.length) return message("Select at least one order with a fulfillment task.");
        await Promise.all(orders.map((order) => request(`/fulfillment-tasks/${primaryOrderTask(order).id}`, {
          method: "PATCH",
          body: JSON.stringify({ status, exception_reason: status === "blocked" ? primaryOrderTask(order).exception_reason : null })
        })));
        await refreshAll();
        message(`Updated ${orders.length} selected order${orders.length === 1 ? "" : "s"}.`);
      }

      async function draftOrderUpdate(orderId) {

      async function draftSelectedOrderUpdates() {
        const orders = state.orders.filter((order) => selectedOrderIds.has(order.id));
        if (!orders.length) return message("Select at least one order first.");
        const results = await Promise.all(orders.map((order) => request(`/orders/${order.id}/customer-updates`, { method: "POST" })));
        const drafted = results.reduce((total, result) => total + Number(result.drafted || 0), 0);
        await refreshAll();
        message(`Drafted ${drafted} buyer update${drafted === 1 ? "" : "s"} for review.`);
      }

      async function maybeDownloadImportedImages(products) {
        if (!autoDownloadImages) return "Image auto-download is off.";
        const targets = (products || []).filter((product) => product?.id && (product.images || []).length);
        if (!targets.length) return "No image URLs found to download.";
        let attempted = 0;
        let downloaded = 0;
        let prepAttempted = 0;
        let prepared = 0;
        for (const product of targets) {
          try {
            const result = await request(`/products/${product.id}/download-images`, { method: "POST" });
            attempted += result.attempted || 0;
            downloaded += result.downloaded || 0;
            const prep = await request(`/products/${product.id}/prepare-images`, { method: "POST" });
            prepAttempted += prep.attempted || 0;
            prepared += prep.prepared || 0;
          } catch (error) {
            return `Image download/prep partially failed after ${downloaded}/${attempted} downloaded and ${prepared}/${prepAttempted} prepared: ${error.message}`;
          }
        }
        return `Image download attempted ${attempted}; downloaded ${downloaded}. Prep created ${prepared}/${prepAttempted} eBay-ready image(s).`;
      }

              <label class="settings-field"><span>Supplier</span><select id="buyer-setup-supplier"><option value="home_depot">Home Depot</option></select></label>
              <label class="settings-field"><span>Region</span><select id="buyer-setup-region"><option value="United States">United States</option></select></label>
              <label class="settings-field"><span>Account email or username</span><input id="buyer-setup-username" type="email" value="${escAttr(data.username)}" placeholder="buyer@example.com" /></label>
              <label class="settings-field"><span>Billing full name</span><input id="buyer-setup-billing_name" value="${escAttr(data.billing_name)}" placeholder="Billing name" /></label>
              <label class="settings-field"><span>ZIP code</span><input id="buyer-setup-billing_zipcode" inputmode="numeric" value="${escAttr(data.billing_zipcode)}" placeholder="ZIP code" /></label>
              <label class="settings-field"><span>Billing phone number</span><input id="buyer-setup-billing_phone" type="tel" value="${escAttr(data.billing_phone)}" placeholder="Phone number" /></label>
            </div>
          </div>`;
        }
        if (buyerAccountSetup.step === 2) {
          return `<div class="add-products-fields">
            <div class="buyer-account-notice">Choose the payment method AutoZS should expect during browser-assisted checkout. Card and gift-card numbers are never stored here.</div>
            <div class="buyer-account-payment-options">
              <label class="store-setup-choice"><input type="radio" id="buyer-setup-payment_method" name="buyer-payment-method" value="credit_card" ${data.payment_method !== "gift_card" ? "checked" : ""} onchange="setBuyerPaymentMethod('credit_card')" /><strong>Credit card</strong><span>Use the payment card already available in the signed-in Home Depot Chrome session.</span></label>
              <label class="store-setup-choice"><input type="radio" name="buyer-payment-method" value="gift_card" ${data.payment_method === "gift_card" ? "checked" : ""} onchange="setBuyerPaymentMethod('gift_card')" /><strong>Gift card</strong><span>Use a Home Depot gift card manually during checkout. Gift-card numbers are not saved.</span></label>
            </div>
          </div>`;
        }
        return `<div class="buyer-account-settings">
          <div class="settings-form-grid">
            <label class="settings-field"><span>Max pending orders</span><input id="buyer-setup-max_pending_orders" type="number" min="1" value="${escAttr(data.max_pending_orders)}" placeholder="No limit" /></label>
            <label class="settings-field"><span>Daily order price limit</span><input id="buyer-setup-daily_order_limit" type="number" min="0" step="0.01" value="${escAttr(data.daily_order_limit)}" placeholder="No limit" /></label>
          </div>
          <label class="settings-toggle"><input id="buyer-setup-auto_order" type="checkbox" ${data.auto_order ? "checked" : ""} disabled /> Auto order <span class="muted">Coming later</span></label>
          <label class="settings-toggle"><input id="buyer-setup-auto_tracking" type="checkbox" ${data.auto_tracking ? "checked" : ""} /> Auto tracking updates</label>
          <label class="settings-toggle"><input id="buyer-setup-order_scan" type="checkbox" ${data.order_scan ? "checked" : ""} /> Order scan and exception checks</label>
        </div>`;
      }

      function setBuyerPaymentMethod(method) {
        buyerAccountSetup.data.payment_method = method;
      }

      function renderBuyerAccountModal() {
        const modal = document.getElementById("buyer-account-modal");
        if (!modal) return;
        modal.hidden = !buyerAccountSetup;
        modal.innerHTML = buyerAccountModalHtml();
      }

      function nextBuyerAccountStep() {
        syncBuyerAccountSetupFields();
        const data = buyerAccountSetup.data;
        if (buyerAccountSetup.step === 1 && (!data.label || !data.username)) {
          return message("Enter an account label and Home Depot email or username.");
        }
        buyerAccountSetup.step = Math.min(3, buyerAccountSetup.step + 1);
        renderBuyerAccountModal();
      }

      function previousBuyerAccountStep() {
        syncBuyerAccountSetupFields();
        buyerAccountSetup.step = Math.max(1, buyerAccountSetup.step - 1);
        renderBuyerAccountModal();
      }

      async function saveBuyerAccountSetup() {
        syncBuyerAccountSetupFields();
        const accounts = settingJson("buyer_accounts_json", []);
        const account = { ...buyerAccountSetup.data, connection_mode: "browser" };
        if (buyerAccountSetup.index === null) accounts.push(account);
        else accounts[buyerAccountSetup.index] = account;
        buyerAccountSetup = null;
        await saveCatalogSettings({ buyer_accounts_json: JSON.stringify(accounts) }, "Buyer account profile saved. Sign in through Chrome when fulfillment is ready.");
      }

      async function removeBuyerAccount(index) {
        const accounts = settingJson("buyer_accounts_json", []);
        accounts.splice(index, 1);
        await saveCatalogSettings({ buyer_accounts_json: JSON.stringify(accounts) }, "Buyer account removed.");
      }

      function openBuyerAccountSignIn() {
        window.open("https://www.homedepot.com/auth/view/signin", "_blank", "noopener,noreferrer");
      }

      async function saveNotificationSettings() {
        await saveCatalogSettings({
          notifications_order_updates: document.getElementById("notification-orders").checked,
          notifications_listing_errors: document.getElementById("notification-listing-errors").checked,
          notifications_email: document.getElementById("notification-email").value.trim(),
        }, "Notification preferences saved.");
      }

      function accountFieldValue(id) {
        return document.getElementById(id)?.value.trim() || "";
      }

      function loadEbayAccount(key) {
        const account = (state.ebayAccounts || []).find((item) => item.key === key);
        if (!account) return message("eBay account profile was not found.");
        const values = {
          "account-key": account.key,
          "account-label": account.label,
          "account-id": account.account_id,
          "account-environment": account.environment,
          "account-client-id": account.client_id,
          "account-redirect-uri": account.redirect_uri,
          "account-access-token": account.access_token,
          "account-refresh-token": account.refresh_token,
          "account-category-id": account.category_id,
          "account-merchant-location-key": account.merchant_location_key,
          "account-fulfillment-policy-id": account.fulfillment_policy_id,
          "account-payment-policy-id": account.payment_policy_id,
          "account-return-policy-id": account.return_policy_id,
        };
        Object.entries(values).forEach(([id, value]) => {
          const element = document.getElementById(id);
          if (element) element.value = value || "";
        });
        const writes = document.getElementById("account-writes-enabled");
        if (writes) writes.checked = Boolean(account.writes_enabled);
        const secret = document.getElementById("account-client-secret");
        if (secret) secret.value = "";
        message(`Loaded eBay account profile: ${account.label}`);
      }

      async function saveEbayAccount() {
        const key = accountFieldValue("account-key");
        const payload = {
          key: key || null,
          label: accountFieldValue("account-label") || accountFieldValue("account-id") || "eBay Account",
          account_id: accountFieldValue("account-id") || null,
          environment: accountFieldValue("account-environment") || "sandbox",
          writes_enabled: Boolean(document.getElementById("account-writes-enabled")?.checked),
          client_id: accountFieldValue("account-client-id") || null,
          redirect_uri: accountFieldValue("account-redirect-uri") || null,
          access_token: accountFieldValue("account-access-token") || null,
          refresh_token: accountFieldValue("account-refresh-token") || null,
          category_id: accountFieldValue("account-category-id") || null,
          merchant_location_key: accountFieldValue("account-merchant-location-key") || null,
          fulfillment_policy_id: accountFieldValue("account-fulfillment-policy-id") || null,
          payment_policy_id: accountFieldValue("account-payment-policy-id") || null,
          return_policy_id: accountFieldValue("account-return-policy-id") || null,
        };
        const secret = accountFieldValue("account-client-secret");
        if (secret) payload.client_secret = secret;
        const existing = key && (state.ebayAccounts || []).some((account) => account.key === key);
        const account = await request(existing ? `/ebay/accounts/${encodeURIComponent(key)}` : "/ebay/accounts", {
          method: existing ? "PATCH" : "POST",
          body: JSON.stringify(payload),
        });
        await refreshAll();
        message(`Saved eBay account profile: ${account.label}`);
      }

      async function deleteEbayAccount(key) {
        const account = (state.ebayAccounts || []).find((item) => item.key === key);
        if (!confirm(`Delete eBay account profile ${account?.label || key}? This does not delete any eBay account.`)) return;
        await request(`/ebay/accounts/${encodeURIComponent(key)}`, { method: "DELETE" });
        await refreshAll();
        message("eBay account profile deleted.");
      }

      async function startEbayOAuth() {
        const result = await request("/ebay/oauth/start", { method: "POST" });
        lastEbayOAuthState = result.state || "";
        navigator.clipboard.writeText(result.authorization_url);
        window.open(result.authorization_url, "_blank", "noopener,noreferrer");
        message("eBay OAuth URL copied and opened. Finish consent, then paste the returned redirect URL or code here.");
      }

      function parseEbayOAuthInput(value) {
        const trimmed = value.trim();
        if (!trimmed) throw new Error("Paste the eBay redirect URL or authorization code first.");
        if (!/^https?:/i.test(trimmed)) return { code: trimmed, state: lastEbayOAuthState || null };
        const parsed = new URL(trimmed);
        const code = parsed.searchParams.get("code");
        const state = parsed.searchParams.get("state");
        if (!code) throw new Error("The pasted eBay redirect URL does not include a code parameter.");
        return { code, state };
      }

      async function completeEbayOAuth() {
        const payload = parseEbayOAuthInput(document.getElementById("ebay-oauth-code").value);
        const result = await request("/ebay/oauth/callback", { method: "POST", body: JSON.stringify(payload) });
        await refreshAll();
        message(`eBay ${result.environment} connected. Access token expires ${result.access_token_expires_at || "soon"}.`);
      }

      async function refreshEbayOAuth() {
        const result = await request("/ebay/oauth/refresh", { method: "POST" });
        await refreshAll();
        message(`eBay access token refreshed. Expires ${result.access_token_expires_at || "soon"}.`);
      }

      async function saveApiBaseUrl() {
        API = normalizeApiBaseUrl(document.getElementById("setting-api-base-url").value);
        if (API) {
          localStorage.setItem(API_STORAGE_KEY, API);
          message(`API URL saved: ${API}`);
          await refreshAll();
        } else {
          localStorage.removeItem(API_STORAGE_KEY);
          message("API URL cleared. Localhost will be used only when the dashboard is opened locally.");
        }
      }

      async function setThemeFromSettings(theme) {
        applyTheme(theme);
        localStorage.setItem(THEME_PREFERENCE_STORAGE_KEY, normalizeThemePreference(theme));
        state.settings = await request("/settings/theme", { method: "PATCH", body: JSON.stringify({ ui_theme: theme }) });
        await refreshAll();
        message(theme === "system" ? "Theme now follows this device." : `Theme override set to ${theme}.`);
      }

      function copyDraft(id) {
        const product = state.products.find((item) => item.id === id);
        if (!product || !product.listing_drafts || !product.listing_drafts.length) return;
        const draft = product.listing_drafts[0];
        const images = (product.images || []).map((img) => img.image_url).join("\\n");
        navigator.clipboard.writeText(`Title: ${draft.title}\\nPrice: ${money(draft.calculated_price)}\\n\\nDescription:\\n${draft.description}\\n\\nImages:\\n${images}`);
        message("eBay draft copied to clipboard.");
      }

      async function copyEbayPackage(id) {
        const pkg = await request(`/products/${id}/ebay-package`);
        navigator.clipboard.writeText(JSON.stringify(pkg, null, 2));
        message("eBay listing package copied as JSON.");
      }

      async function copyEbayApiPayload(id) {
        const pkg = await request(`/products/${id}/ebay-api-payload`);
        navigator.clipboard.writeText(JSON.stringify(pkg, null, 2));
        const missing = pkg.missing_publish_requirements.length ? ` Missing: ${pkg.missing_publish_requirements.join(", ")}` : "";
        message(`eBay Inventory API payload copied.${missing}`);
      }

      async function copyEbayManualMacro(id) {
        const macro = await request(`/products/${id}/ebay-manual-macro`);
        navigator.clipboard.writeText(macro.script);
        const missing = macro.missing_manual.length ? ` Missing: ${macro.missing_manual.join(", ")}` : "";
        message(`Manual eBay macro copied. ${macro.manual_ready ? "Ready for review/paste." : "Needs listing data first."}${missing}`);
      }

      async function checkReadiness(id) {
        const report = await request(`/products/${id}/listing-readiness`);
        const lines = [
          `Manual: ${report.manual_ready ? "ready" : "missing " + report.missing_manual.join(", ")}`,
          `API: ${report.api_ready ? "ready" : "missing " + report.missing_api.join(", ")}`,
          ...(report.warnings.length ? [`Warnings: ${report.warnings.join(" | ")}`] : [])
        ];
        const target = document.getElementById(`ready-${id}`);
        if (target) target.textContent = lines.join("\\n");
        navigator.clipboard.writeText(JSON.stringify(report, null, 2));
        message(`Readiness checked. Manual ${report.manual_ready ? "ready" : "needs review"}; API ${report.api_ready ? "ready" : "needs settings"}.`);
      }

      async function exportEbay(id) {
        const result = await request(`/products/${id}/export-ebay`, { method: "POST" });
        const zipUrl = `${API}/products/${id}/export-ebay.zip`;
        message(`Exported eBay files. ZIP download opened; folder path copied.`);
        navigator.clipboard.writeText(result.export_dir);
        window.open(zipUrl, "_blank");
      }

      async function publishEbaySandbox(id) {
        const item = (state.listingQueue || []).find((listing) => listing.product_id === id);
        const label = item ? `${item.sku} / ${item.title}` : `product ${id}`;
        if (!confirm(`Publish ${label} to the connected eBay Sandbox account? This uses the real eBay Inventory API but only in sandbox mode.`)) return;
        const result = await request(`/products/${id}/publish-ebay-sandbox`, { method: "POST" });
        await refreshAll();
        const warningText = result.warnings && result.warnings.length ? ` Warnings: ${result.warnings.join(" | ")}` : "";
        message(`Published sandbox listing ${result.listing_id} from offer ${result.offer_id}.${warningText}`);
      }

      async function markListed(id) {
        const listingId = prompt("Optional eBay listing ID. Leave blank to store a manual placeholder.", "");
        const accountId = prompt("eBay account/store label", "manual") || "manual";
        const listing = await request(`/products/${id}/mark-listed`, {
          method: "POST",
          body: JSON.stringify({ listing_id: listingId || null, account_id: accountId, environment: "manual", quantity: 1, status: "listed" })
        });
        await refreshAll();
        message(`Marked product as listed: ${listing.listing_id}`);
      }

      function imageSrc(image) {
        if (image.local_path) return `${API}/${image.local_path.replace(/^\/+/, "")}`;
        return image.image_url;
      }

      function stripHtml(value) {
        return String(value || "").replace(/<li>/g, "\\n- ").replace(/<[^>]+>/g, " ").replace(/\\s+/g, " ").trim();
      }

      function badge(value) { return `<span class="status ${["pending", "draft"].includes(value) ? "warn" : ""}">${esc(value)}</span>`; }
      function table(headers, rows) {
        if (!rows.length) return `<p class="muted">No records yet.</p>`;
        return `<table><thead><tr>${headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }

      render();
      refreshAll();
    </script>
  </body>
</html>

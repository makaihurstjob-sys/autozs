      function ebayListingAccountGateHtml(accountKey = "manual") {
        return `<div class="extension-panel">${ebayBrowserAccountStatusHtml(accountKey)}</div>`;
      }

      function toggleProductSelection(productId, checked) {
        captureProductDetailsOpenState();
        if (checked) selectedProductIds.add(productId);
        else selectedProductIds.delete(productId);
        render();
      }

      function toggleVisibleProductSelection(checked) {
        captureProductDetailsOpenState();
        visibleProducts().forEach((product) => {
          if (checked) selectedProductIds.add(product.id);
          else selectedProductIds.delete(product.id);
        });
        render();
      }

      function captureProductDetailsOpenState() {
        document.querySelectorAll("details[data-product-details-id]").forEach((detail) => {
          productDetailsOpenState.set(Number(detail.dataset.productDetailsId), detail.open);
        });
        document.querySelectorAll("details[data-listing-details-id]").forEach((detail) => {
          listingDetailsOpenState.set(Number(detail.dataset.listingDetailsId), detail.open);
        });
      }

      function rememberProductDetailsOpenState(productId, open) {
        productDetailsOpenState.set(Number(productId), Boolean(open));
      }

      function productDetailsOpenAttribute(product, workflow) {
        return productDetailsAreOpen(product, workflow) ? "open" : "";
      }

      function productDetailsAreOpen(product, workflow) {
        const saved = productDetailsOpenState.get(product.id);
        return saved === undefined ? workflow.key !== "ready" : saved;
      }

      function toggleProductDrawer(productId) {
        const detail = document.querySelector(`details[data-product-details-id="${productId}"]`);
        productDetailsOpenState.set(Number(productId), !detail?.open);
        render();
      }

      function cardClickShouldToggle(event) {
        return !event.target.closest("button, input, select, label, a, details");
      }

      function toggleProductDrawerFromCard(event, productId) {
        if (cardClickShouldToggle(event)) toggleProductDrawer(productId);
      }

      function listingDetailsAreOpen(item) {
        const saved = listingDetailsOpenState.get(item.product_id);
        return saved === undefined ? listingNeedsReview(item) : saved;
      }

      function listingDetailsOpenAttribute(item) {
        return listingDetailsAreOpen(item) ? "open" : "";
      }

      function rememberListingDetailsOpenState(productId, open) {
        listingDetailsOpenState.set(Number(productId), Boolean(open));
      }

      function toggleListingDrawer(productId) {
        const detail = document.querySelector(`details[data-listing-details-id="${productId}"]`);
        listingDetailsOpenState.set(Number(productId), !detail?.open);
        render();
      }

      function toggleListingDrawerFromCard(event, productId) {
        if (cardClickShouldToggle(event)) toggleListingDrawer(productId);
      }

      async function repriceSelectedProducts() {
        const productIds = selectedVisibleProductIds();
        await repriceProductIds(productIds);
      }

      function bulkEditSelectedProducts() {
        const productIds = selectedVisibleProductIds();
        if (!productIds.length) return message("Select at least one visible product first.");
        captureProductDetailsOpenState();
        productIds.forEach((id) => {
          productDetailsOpenState.set(Number(id), true);
          productDrawerTabState.set(Number(id), "ebay");
        });
        render();
        message(`Opened eBay edit drawers for ${productIds.length} selected product(s).`);
      }

      async function deleteSelectedProducts() {
        const productIds = selectedVisibleProductIds();
        if (!productIds.length) return message("Select at least one visible product first.");
        if (!confirm(`Delete ${productIds.length} selected product(s) from the active dashboard? Cached history stays saved for re-import.`)) return;
        await Promise.all(productIds.map((id) => request(`/products/${id}`, { method: "DELETE" })));
        productIds.forEach((id) => selectedProductIds.delete(id));
        await refreshAll();
        message(`Deleted ${productIds.length} selected product(s).`);
      }

      function imageDownloadBacklog() {
        return state.products.reduce((totals, product) => {
          const missing = (product.images || []).filter((image) => !image.local_path).length;
          if (missing) {
            totals.products += 1;
            totals.missing += missing;
          }
          return totals;
        }, { products: 0, missing: 0 });
      }

      function productCardHtml(product) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        const updated = product.supplier_products[0]?.updated_at ? new Date(product.supplier_products[0].updated_at).toLocaleDateString() : "-";
        const shipping = shippingState(product);
        const workflow = productWorkflowState(product);
        return `
          <div class="product-card shipping-${shipping.key}" onclick="toggleProductDrawerFromCard(event, ${product.id})">
            <div class="product-row">
              ${productLeadingControlsHtml(product, workflow)}
              <div class="product-main">
                ${sourceThumbHtml(product)}
                <div>
                  <div class="product-title">${esc(product.title)}</div>
                  <div class="product-sku">${productMetaLineHtml(product, updated)}</div>
                </div>
              </div>
              ${productCompactFactsHtml(product, draft)}
              <div class="product-card-context">${productStoreSelectorHtml(product)}</div>
              ${productCardPrimaryActionHtml(product)}
            </div>
            ${productDrawerHtml(product, draft, workflow)}
          </div>`;
      }

      function productLeadingControlsHtml(product, workflow) {
        const isOpen = productDetailsAreOpen(product, workflow);
        const detailsLabel = `${isOpen ? "Hide" : "Show"} ${workflow.summary.toLowerCase()} details`;
        return `<div class="product-leading-controls">
          <label class="product-select-control" title="Select ${escAttr(product.title)}"><input type="checkbox" aria-label="Select ${escAttr(product.title)}" ${selectedProductIds.has(product.id) ? "checked" : ""} onchange="toggleProductSelection(${product.id}, this.checked)" /></label>
          <span class="product-control-divider" aria-hidden="true"></span>
          <button class="product-drawer-toggle" type="button" aria-label="${escAttr(detailsLabel)}" aria-expanded="${isOpen}" onclick="toggleProductDrawer(${product.id})"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="${isOpen ? "m6 9 6 6 6-6" : "m9 18 6-6-6-6"}"/></svg></button>
        </div>`;
      }

      function productMetaLineHtml(product, updated) {
        return [
          `${supplierLogoHtml(product)}<span>${esc(product.sku)}</span>`,
          `<span>Supplier: ${esc(supplierLabel(product))}</span>`,
          `<span>Updated ${esc(updated)}</span>`
        ].join(`<span class="meta-separator">|</span>`);
      }

      function compactFactHtml(label, valueHtml, tooltip = "", className = "") {
        return `<div class="compact-fact price-tooltip ${esc(className)}" ${tooltipAttrs(tooltip)}><span>${esc(label)}</span><strong>${valueHtml}</strong></div>`;
      }

      function imageCountPillHtml(downloaded, total) {
        const ready = Number(total) > 0 && Number(downloaded) === Number(total);
        return `<span class="status ${ready ? "stage-ready" : "stage-images"}">${esc(`${downloaded}/${total}`)}</span>`;
      }

      function productCompactFactsHtml(product, draft) {
        const profit = estimatedProfit(draft?.calculated_price, product);
        const imageCounts = imageDownloadCountsForProduct(product);
        return `<div class="compact-facts">
          ${compactFactHtml("Source", money(sourcePrice(product)), sourceTooltip(product))}
          ${compactFactHtml("Shipping", shippingBadgeHtml(product), shippingTooltip(product))}
          ${compactFactHtml("Draft", money(draft?.calculated_price), draftTooltip(product))}
          ${compactFactHtml("Profit", money(profit), profitTooltip(product))}
          ${compactFactHtml("Images", `${imageCountPillHtml(imageCounts.downloaded, imageCounts.total)}<button class="secondary product-image-action" onclick="downloadImages(${product.id})" aria-label="Download and prepare images for ${escAttr(product.title)}" title="Download and prepare images for this product" data-tooltip="Download and prepare images"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 19h14"/></svg></button>`)}
          ${compactFactHtml("Stage", workflowBadgeHtml(product))}
        </div>`;
      }

      function productDrawerHtml(product, draft, workflow) {
        const tab = productDrawerTabState.get(product.id) || "product";
        return `<details class="product-drawer" data-product-details-id="${product.id}" ${productDetailsOpenAttribute(product, workflow)} ontoggle="rememberProductDetailsOpenState(${product.id}, this.open)">
          <summary>${esc(workflow.summary)}</summary>
          <div class="product-drawer-panel">
            <div class="product-drawer-tabs" role="tablist" aria-label="Product editor sections">
              ${productDrawerTabButton(product.id, "product", "Product", tab)}
              ${productDrawerTabButton(product.id, "description", "Description", tab)}
              ${productDrawerTabButton(product.id, "images", `Images (${(product.images || []).length})`, tab)}
              ${productDrawerTabButton(product.id, "ebay", "eBay Listing", tab)}
            </div>
            <div class="product-drawer-body">${productDrawerTabContent(product, draft, tab)}</div>
          </div>
        </details>`;
      }

      function productDrawerTabButton(productId, key, label, activeTab) {
        return drawerTabButton(productId, key, label, activeTab, "setProductDrawerTab");
      }

      function listingDrawerTabButton(productId, key, label, activeTab) {
        return drawerTabButton(productId, key, label, activeTab, "setListingDrawerTab");
      }

      function drawerTabButton(productId, key, label, activeTab, handlerName) {
        return `<button class="${key === activeTab ? "active" : ""}" role="tab" aria-selected="${key === activeTab}" onclick="${handlerName}(${productId}, '${key}')">${esc(label)}</button>`;
      }

      function setProductDrawerTab(productId, tab) {
        captureProductDetailsOpenState();
        productDrawerTabState.set(Number(productId), tab);
        productDetailsOpenState.set(Number(productId), true);
        render();
      }

      function setListingDrawerTab(productId, tab) {
        captureProductDetailsOpenState();
        productDrawerTabState.set(Number(productId), tab);
        listingDetailsOpenState.set(Number(productId), true);
        render();
      }

      function productDrawerTabContent(product, draft, tab) {
        if (tab === "description") {
          return `<div class="product-drawer-grid">
            <div class="product-drawer-section" style="grid-column: 1 / -1"><h3>eBay draft description</h3><div class="product-description-preview html-preview">${productDescriptionHtml(draft?.description)}</div></div>
          </div>`;
        }
        if (tab === "images") {
          return `<div class="product-drawer-grid"><div class="product-drawer-section" style="grid-column: 1 / -1"><h3>Product images</h3>${imagesHtml(product)}</div></div>`;
        }
        if (tab === "ebay") {
          return `<div class="product-drawer-grid">
            <div class="product-drawer-section"><h3>eBay handoff</h3>${ebayHandoffHtml(product)}</div>
            <div class="product-drawer-section"><h3>eBay actions</h3>${productActionsHtml(product)}<div class="button-row"><button class="secondary" onclick="copyEbayPackage(${product.id})">Package</button><button class="secondary" onclick="copyDraft(${product.id})">Copy draft</button><button class="secondary" onclick="checkReadiness(${product.id})">Readiness</button></div><pre id="ready-${product.id}" class="draft"></pre></div>
          </div>`;
        }
        return `<div class="product-drawer-grid">
          <div class="product-drawer-section" style="grid-column: 1 / -1"><h3>Listing title</h3><div class="product-drawer-title">${esc(draft?.title || product.title)}</div></div>
          <div class="product-drawer-section"><h3>Pricing</h3>${priceComparisonHtml(product)}${supplierDiscountHtml(product)}<div class="button-row"><button onclick="setDraftPrice(${product.id}, 'margin')">Use Margin</button><button class="secondary" onclick="setDraftPrice(${product.id}, 'minimum_profit')">Use Min Profit</button><button class="secondary" onclick="setDraftPrice(${product.id}, 'safe_competitor')">Safe Competitor</button><button class="secondary" onclick="setDraftPrice(${product.id}, 'competitor')">Use Competitor</button></div></div>
          <div class="product-drawer-section"><h3>Source</h3>${sourceCellHtml(product)}${captureHtml(product)}</div>
          <div class="product-drawer-section" style="grid-column: 1 / -1"><h3>Price history</h3>${productPriceHistoryGraphHtml(product)}${priceHistoryHtml(product)}</div>
        </div>`;
      }

      function productDescriptionText(value) {
        return String(value || "No draft description has been captured yet.")
          .replace(/<[^>]*>/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function productDescriptionHtml(value) {
        const html = String(value || "").trim();
        if (!html) return `<div style="padding:12px">${esc(productDescriptionText(value))}</div>`;
        return sanitizeListingDescriptionHtml(html);
      }

      function sanitizeListingDescriptionHtml(html) {
        const template = document.createElement("template");
        template.innerHTML = String(html || "");
        template.content.querySelectorAll("script, style, iframe, object, embed, link, meta").forEach((node) => node.remove());
        template.content.querySelectorAll("*").forEach((node) => {
          [...node.attributes].forEach((attribute) => {
            const name = attribute.name.toLowerCase();
            const value = String(attribute.value || "");
            if (name.startsWith("on") || /javascript:/i.test(value)) node.removeAttribute(attribute.name);
          });
        });
        return template.innerHTML || `<div style="padding:12px">${esc(productDescriptionText(html))}</div>`;
      }

      function productShippingCounts(products = state.products) {
        return products.reduce((counts, product) => {
          counts[shippingState(product).key] += 1;
          return counts;
        }, { free: 0, paid: 0, unknown: 0 });
      }

      function availableEbayStores() {
        return state.ebayAccounts || [];
      }

      function ebayStoreDisplayName(store) {
        const label = String(store?.label || store?.key || "Store").trim();
        const accountId = String(store?.account_id || "").trim();
        if (!accountId || accountId === label) return label;
        return `${label} (${accountId})`;
      }

      function selectedProductEbayStoreKey(productId) {
        const stores = availableEbayStores();
        const saved = localStorage.getItem(`${PRODUCT_EBAY_STORE_STORAGE_PREFIX}${productId}`) || "";
        const selected = selectedEbayStoreKey();
        return stores.some((store) => store.key === saved) ? saved : selected;
      }

      function setProductEbayStore(productId, accountKey) {
        const key = String(accountKey || "");
        if (key) localStorage.setItem(`${PRODUCT_EBAY_STORE_STORAGE_PREFIX}${productId}`, key);
        else localStorage.removeItem(`${PRODUCT_EBAY_STORE_STORAGE_PREFIX}${productId}`);
        render();
      }

      function productStoreSelectorHtml(product) {
        const stores = availableEbayStores();
        if (!stores.length) {
          return `<div class="product-store-select"><span>Store</span><select disabled title="Add an eBay store profile in Settings first"><option>Add store</option></select></div>`;
        }
        const selectedKey = selectedProductEbayStoreKey(product.id);
        return `<label class="product-store-select"><span>Store</span><select aria-label="Store for ${esc(product.title)}" onchange="setProductEbayStore(${product.id}, this.value)">
          ${stores.map((store) => `<option value="${escAttr(store.key)}" ${store.key === selectedKey ? "selected" : ""}>${esc(ebayStoreDisplayName(store))}</option>`).join("")}
        </select></label>`;
      }

      function productCardPrimaryActionHtml(product) {
        if (isScheduledProduct(product)) {
          return `<div class="product-card-primary-action">
            <button class="secondary" disabled title="This product has already moved into the scheduled listings flow">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/><path d="M8 14h3v3H8z"/></svg>
              Schedule
            </button>
          </div>`;
        }
        const accountKey = selectedProductEbayStoreKey(product.id);
        const accountOk = Boolean(accountKey) && ebayBrowserAccountOk(accountKey);
        return `<div class="product-card-primary-action">
          <button ${accountOk ? "" : "disabled"} onclick="openProductSchedule(${product.id})" title="${escAttr(accountOk ? "Schedule this product on eBay through the Windows worker" : accountKey ? ebayBrowserAccountMessage(accountKey) : "Add an eBay store profile in Settings first.")}">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/><path d="M8 14h3v3H8z"/></svg>
            Schedule
          </button>
        </div>`;
      }

      function productWorkflowCounts(products = state.products) {
        return products.reduce((counts, product) => {
          counts[productWorkflowState(product).key] += 1;
          return counts;
        }, { capture: 0, shipping: 0, images: 0, ready: 0, source: 0 });
      }

      function shippingFilterButton(key, label, className) {
        return `<button class="secondary ${productShippingFilter === key ? "active" : ""}" onclick="setProductShippingFilter('${key}')"><span class="${className}">${esc(label)}</span></button>`;
      }

      function setProductShippingFilter(key) {
        productShippingFilter = key;
        productFilterMenuOpen = false;
        render();
      }

      function workflowFilterButton(key, label, className) {
        return `<button class="secondary ${productWorkflowFilter === key ? "active" : ""}" onclick="setProductWorkflowFilter('${key}')"><span class="${className}">${esc(label)}</span></button>`;
      }

      function setProductWorkflowFilter(key) {
        productWorkflowFilter = key;
        productFilterMenuOpen = false;
        render();
      }

      function supplier(product) {
        return product.supplier_products && product.supplier_products[0] ? product.supplier_products[0] : null;
      }

      function supplierLabel(product) {
        const currentSupplier = supplier(product);
        if (!currentSupplier) return "Unknown";
        if (currentSupplier.supplier === "home_depot" || /homedepot\.com/i.test(currentSupplier.source_url || "")) return "Home Depot";
        return currentSupplier.supplier || "Source";
      }

      function supplierLogoHtml(product) {
        const currentSupplier = supplier(product);
        if (!currentSupplier) return "";
        if (currentSupplier.supplier === "home_depot" || /homedepot\.com/i.test(currentSupplier.source_url || "")) {
          return `<span class="supplier-logo home-depot" title="Home Depot" aria-label="Home Depot">${homeDepotLogoSvg()}</span>`;
        }
        return `<span class="supplier-logo" title="${esc(currentSupplier.supplier || "Source")}" aria-label="${esc(currentSupplier.supplier || "Source")}">${sourceLogoSvg()}</span>`;
      }

      function homeDepotLogoSvg() {
        return `<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false"><rect width="16" height="16" rx="2" fill="#f96302"/><path fill="#fff" d="M3 3h2v4h2V3h2v10H7V9H5v4H3V3Zm7 0h2.2c1.7 0 2.8 1.1 2.8 3v4c0 1.8-1.1 3-2.8 3H10V3Zm2 2v6h.2c.5 0 .8-.3.8-1V6c0-.7-.3-1-.8-1H12Z"/></svg>`;
      }

      function sourceLogoSvg() {
        return `<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false"><rect width="16" height="16" rx="2" fill="#e8ede8"/><path fill="#56625a" d="M8 2.5 3 5v6l5 2.5 5-2.5V5L8 2.5Zm0 2.2 2.6 1.3L8 7.3 5.4 6 8 4.7Zm-3 3 2 1v2.5l-2-1V7.7Zm4 3.5V8.7l2-1v2.5l-2 1Z"/></svg>`;
      }

      function sourceThumbHtml(product) {
        const src = productPreviewImageSrc(product);
        const firstImage = (product?.images || []).find((image) => image.local_path) || (product?.images || [])[0];
        const remoteFallback = firstImage?.local_path ? firstImage.image_url : "";
        const fallback = supplierLogoHtml(product) || sourceLogoSvg();
        return `<figure class="product-preview">
          <button class="source-thumb" onclick="openSource(${product.id})" title="Open source product" aria-label="Open source product preview">
          <span class="thumb-fallback">${fallback}</span>
          ${src ? `<img src="${esc(src)}" alt="" ${remoteFallback ? `data-fallback-src="${esc(remoteFallback)}"` : ""} onerror="const fallback=this.dataset.fallbackSrc;if(fallback){delete this.dataset.fallbackSrc;this.src=fallback}else{this.classList.add('is-missing')}" />` : ""}
          </button>
          <figcaption class="preview-label">Preview</figcaption>
        </figure>`;
      }

      function productPreviewImageSrc(product) {
        const images = product?.images || [];
        const firstImage = images.find((image) => image.local_path) || images[0];
        return firstImage ? imageSrc(firstImage) : "";
      }

      function miniPriceStatHtml(label, valueHtml, tooltip, className = "") {
        return `<div class="mini-stat price-tooltip ${esc(className)}" ${tooltipAttrs(tooltip)}><span>${esc(label)}</span><strong>${valueHtml}</strong></div>`;
      }

      function priceCardHtml(label, valueHtml, tooltip, className = "") {
        return `<div class="price-tooltip ${esc(className)}" ${tooltipAttrs(tooltip)} tabindex="0"><span>${esc(label)}</span><strong>${valueHtml}</strong></div>`;
      }

      function tooltipAttrs(tooltip) {
        const text = Array.isArray(tooltip) ? tooltip.filter(Boolean).join("\n") : tooltip;
        if (!text) return "";
        return `data-tooltip="${esc(text)}" aria-label="${esc(text)}" tabindex="0"`;
      }

      function imageDownloadCountsForProduct(product) {
        const total = (product.images || []).length;
        const downloaded = (product.images || []).filter((image) => image.local_path).length;
        return { total, downloaded, missing: Math.max(total - downloaded, 0) };
      }

      function imageReadinessLabel(product) {
        const counts = imageDownloadCountsForProduct(product);
        return counts.total ? `${counts.downloaded}/${counts.total}` : "0";
      }

      function localImagePaths(product) {
        return (product.images || []).map((image) => image.local_path).filter(Boolean);
      }

      function hasAllDownloadedImages(product) {
        const counts = imageDownloadCountsForProduct(product);
        return counts.total > 0 && counts.missing === 0;
      }

      function productWorkflowState(product) {
        const hasSourceUrl = Boolean(supplier(product)?.source_url);
        const hasSourcePrice = sourcePrice(product) !== null && sourcePrice(product) !== undefined;
        const draft = product.listing_drafts && product.listing_drafts[0];
        const hasDraftPrice = draft?.calculated_price !== null && draft?.calculated_price !== undefined;
        const hasImages = Boolean((product.images || []).length);
        if (!hasSourceUrl) {
          return { key: "source", label: "No source", className: "stage-source", summary: "Attach a source URL" };
        }
        if (!hasSourcePrice || !hasDraftPrice) {
          return { key: "capture", label: "Needs capture", className: "stage-capture", summary: "Needs browser capture" };
        }
        if (sourceShipping(product) === null || sourceShipping(product) === undefined) {
          return { key: "shipping", label: "Needs shipping", className: "stage-shipping", summary: "Confirm source shipping" };
        }
        if (!hasImages || !hasAllDownloadedImages(product)) {
          return { key: "images", label: "Needs images", className: "stage-images", summary: "Download product images" };
        }
        return { key: "ready", label: "eBay ready", className: "stage-ready", summary: "eBay package ready" };
      }

      function workflowBadgeHtml(product) {
        const workflow = productWorkflowState(product);
        return `<span class="status ${workflow.className}">${esc(workflow.label)}</span>`;
      }

      function nextStepHtml(product) {
        const workflow = productWorkflowState(product);
        if (workflow.key === "source") {
          return `<div class="needs-data">Next: attach the source URL before capture or repricing can work.</div>`;
        }
        if (workflow.key === "capture") {
          return `
            <div class="needs-data">Next: open the source page in Chrome and use the extension's Capture Into App button.</div>
            <div class="actions">
              <button class="secondary" onclick="openSource(${product.id})">Open Source</button>
              <button class="secondary" onclick="copyCaptureHelper()">Copy Capture Helper</button>
            </div>`;
        }
        if (workflow.key === "images") {
          const counts = imageDownloadCountsForProduct(product);
          return `
            <div class="draft">Next: download all captured image URLs locally, then prep them into eBay-ready square images. ${counts.downloaded}/${counts.total} downloaded.</div>
            <div class="actions">
              <button class="secondary" onclick="downloadImages(${product.id})">Download + Prep Images</button>
              ${counts.downloaded ? `<button class="secondary" onclick="prepareImages(${product.id})">Prep Images</button>` : ""}
            </div>`;
        }
        if (workflow.key === "shipping") {
          return `
            <div class="needs-data">Next: confirm shipping cost from the source page. Enter 0 only when it is truly free.</div>
            <div class="actions">
              <button class="secondary" onclick="openSource(${product.id})">Open Source</button>
            </div>`;
        }
        return `
          <div class="draft">Ready: copy the eBay listing package or macro and review the listing before publishing.</div>
          <div class="actions">
            <button class="secondary" onclick="copyEbayPackage(${product.id})">Package</button>
            <button class="secondary" onclick="copyEbayManualMacro(${product.id})">Copy Macro</button>
          </div>`;
      }

      function productActionsHtml(product) {
        const accountKey = selectedProductEbayStoreKey(product.id);
        const accountOk = Boolean(accountKey) && ebayBrowserAccountOk(accountKey);
        return `<div class="actions">
          <button class="secondary" onclick="prepareImages(${product.id})">Prep Images</button>
          <button ${accountOk ? "" : "disabled"} title="${escAttr(accountOk ? "Import this product to an eBay draft" : accountKey ? ebayBrowserAccountMessage(accountKey) : "Add an eBay store profile in Settings first.")}" onclick="importProductToEbay(${product.id})">Import to eBay</button>
          <button class="secondary" onclick="exportEbay(${product.id})">Export</button>
          <button class="danger" onclick="deleteProduct(${product.id})">Delete</button>
        </div>
        <details class="compact-details">
          <summary>API and macro payloads</summary>
          <div class="actions">
            <button class="secondary" onclick="copyEbayManualMacro(${product.id})">Copy Macro</button>
            <button class="secondary" onclick="copyEbayApiPayload(${product.id})">Copy API Payload</button>
          </div>
        </details>`;
      }

      function listingsHtml() {
        const items = ebayListingItems();
        const counts = listingStatusCounts(items);
        const filteredItems = filterListingItems(items);
        return `
          ${listingsFilterMenuHtml(counts)}
          ${listingSortControlHtml()}
          ${listingSelectionToolbarHtml(filteredItems)}
          ${filteredItems.length ? `<div class="product-list">${filteredItems.map(ebayListingCardHtml).join("")}</div>` : `<p class="muted">No eBay drafts, scheduled listings, or live listings match this filter.</p>`}`;
      }

      function listingsFilterSummary() {
        return {
          all: "All eBay records",
          drafts: "Drafts",
          scheduled: "Scheduled",
          review: "Needs review",
          tombstoned: "Tombstoned",
          listed: "Live",
        }[listingStatusFilter] || "Drafts";
      }

      function listingsFilterMenuHtml(counts) {
        return `<div class="filter-shell ${listingFilterMenuOpen ? "filter-shell-open" : ""}">
          <button class="filter-trigger" onclick="toggleListingFilterMenu()" aria-expanded="${listingFilterMenuOpen ? "true" : "false"}">${filterTriggerSvg()} Add Filter</button>
          <span class="filter-summary">${esc(listingsFilterSummary())}</span>
          <div class="filter-menu ${listingFilterMenuOpen ? "open" : ""}">
            ${filterSearchHtml()}
            <div class="filter-menu-section">Listing status</div>
            ${filterMenuOption("All", listingStatusFilter === "all", "setListingStatusFilter('all')", counts.all)}
            ${filterMenuOption("Drafts", listingStatusFilter === "drafts", "setListingStatusFilter('drafts')", counts.drafts)}
            ${filterMenuOption("Scheduled", listingStatusFilter === "scheduled", "setListingStatusFilter('scheduled')", counts.scheduled)}
            ${filterMenuOption("Needs review", listingStatusFilter === "review", "setListingStatusFilter('review')", counts.review)}
            ${filterMenuOption("Tombstoned", listingStatusFilter === "tombstoned", "setListingStatusFilter('tombstoned')", counts.tombstoned)}
            ${filterMenuOption("Live", listingStatusFilter === "listed", "setListingStatusFilter('listed')", counts.listed)}
          </div>
        </div>`;
      }

      function listingSortControlHtml() {
        return `<div class="filter-shell">
          <span class="filter-summary">Sort</span>
          <select onchange="setListingSortMode(this.value)" aria-label="Sort eBay listings">
            <option value="updated" ${listingSortMode === "updated" ? "selected" : ""}>Recently updated</option>
            <option value="renewal_soon" ${listingSortMode === "renewal_soon" ? "selected" : ""}>Relist soonest</option>
            <option value="renewal_late" ${listingSortMode === "renewal_late" ? "selected" : ""}>Relist latest</option>
            <option value="views_low" ${listingSortMode === "views_low" ? "selected" : ""}>Lowest views</option>
          </select>
        </div>`;
      }

      function setListingSortMode(mode) {
        listingSortMode = mode || "updated";
        render();
      }

      function toggleListingFilterMenu() {
        listingFilterMenuOpen = !listingFilterMenuOpen;
        productFilterMenuOpen = false;
        render();
      }

      function ebayListingItems() {
        const jobsByProduct = new Map();
        const revisionsByProduct = new Map();
        const listingsByProduct = new Map();
        (state.listingJobs || []).forEach((job) => {
          if (!jobsByProduct.has(job.product_id)) jobsByProduct.set(job.product_id, job);
        });
        (state.ebayListings || []).forEach((listing) => {
          if (!listingsByProduct.has(listing.product_id)) listingsByProduct.set(listing.product_id, listing);
        });
        (state.ebayRevisionJobs || []).forEach((job) => {
          if (!revisionsByProduct.has(job.product_id) && ["queued", "running", "paused", "failed"].includes(job.status)) {
            revisionsByProduct.set(job.product_id, job);
          }
        });
        return (state.listingQueue || [])
          .map((item) => {
            const listing = listingsByProduct.get(item.product_id) || null;
            return {
              ...item,
              listing_status: item.listing_status || listing?.status || null,
              listing_id: item.listing_id || listing?.listing_id || null,
              listing_account_id: item.listing_account_id || listing?.account_id || null,
              listing_started_at: item.listing_started_at || listing?.started_at || null,
              listing_renews_at: item.listing_renews_at || listing?.renews_at || null,
              listing_views: Number(item.listing_views ?? listing?.views ?? 0),
              days_until_relist: item.days_until_relist ?? listing?.days_until_relist ?? null,
              auto_delist_candidate: Boolean(item.auto_delist_candidate || listing?.auto_delist_candidate),
              listing_job: jobsByProduct.get(item.product_id) || null,
              revision_job: revisionsByProduct.get(item.product_id) || null,
            };
          })
          .filter((item) => item.listing_status || item.listing_job);
      }

      function queuedEbayRevisionCount() {
        return (state.ebayRevisionJobs || []).filter((job) => job.status === "queued").length;
      }

      function runningEbayRevisionJob() {
        return (state.ebayRevisionJobs || []).find((job) => job.status === "running") || null;
      }

      async function runNextEbayRevision() {
        const current = runningEbayRevisionJob();
        const job = current || await request("/ebay/revision-jobs/next", { method: "POST" });
        if (job.status !== "running") {
          await refreshAll();
          return message(job.message || "The next eBay price update is not ready to run.");
        }
        if (blockIfEbayAccountMismatch(job.ebay_account_key || "manual")) return;
        window.open(job.assistant_url, "_blank", "noopener,noreferrer");
        await refreshAll();
        message(`Opened eBay price update ${job.id}: ${money(job.old_price)} to ${money(job.target_price)}. Finish it before starting the next.`);
      }

      function listingSelectionToolbarHtml(items) {
        const visibleIds = items.map((item) => item.product_id);
        const selectedVisible = visibleIds.filter((id) => selectedProductIds.has(id)).length;
        const allVisibleSelected = visibleIds.length > 0 && selectedVisible === visibleIds.length;
        return `<div class="selection-toolbar">
          <label class="select-visible-control" title="Select every visible eBay listing"><input type="checkbox" aria-label="Select all visible eBay listings" ${allVisibleSelected ? "checked" : ""} onchange="toggleVisibleListingSelection(this.checked)" /></label>
          <span class="selection-count">${selectedVisible} item${selectedVisible === 1 ? "" : "s"} selected</span>
          <div class="selection-toolbar-actions">
            ${toolbarIconButton("refreshSelectedListingSources()", selectedVisible ? "Refresh selected source prices" : "Refresh due source prices", "sync", true)}
            ${toolbarIconButton("runNextEbayRevision()", "Run next eBay price update", "import", queuedEbayRevisionCount() > 0 || Boolean(runningEbayRevisionJob()))}
            ${toolbarIconButton("repriceSelectedListings()", "Reprice selected", "calculator", selectedVisible)}
            ${toolbarIconButton("bulkEditSelectedListings()", "Bulk edit", "edit", selectedVisible)}
            ${toolbarIconButton("tombstoneSelectedListings()", "Delete selected", "trash", selectedVisible, "danger", "Delete selected tracked drafts")}
            ${toolbarIconButton("openBulkSchedule('listings')", "Schedule listings", "calendar", selectedVisible)}
          </div>
        </div>`;
      }

      function selectedVisibleListingItems() {
        return filterListingItems(ebayListingItems()).filter((item) => selectedProductIds.has(item.product_id));
      }

      function toggleVisibleListingSelection(checked) {
        filterListingItems(ebayListingItems()).forEach((item) => {
          if (checked) selectedProductIds.add(item.product_id);
          else selectedProductIds.delete(item.product_id);
        });
        render();
      }

      async function refreshSelectedListingSources() {
        const selectedItems = selectedVisibleListingItems().filter((item) => item.source_url);
        const productIds = [...new Set(selectedItems.map((item) => Number(item.product_id)).filter(Boolean))];
        const intervalHours = Number(state.settings.source_refresh_interval_hours || state.refreshQueue?.stale_after_hours || 6);
        if (!productIds.length) {
          const batch = await request("/source-refresh/auto-queue", { method: "POST" });
          await refreshAll({ silent: true });
          return message(batch.queued
            ? `Queued ${batch.queued} due source price refresh job(s). Windows Chrome will run them.`
            : batch.message || `No scheduled or live supplier prices are due inside the ${intervalHours}-hour window.`);
        }
        const batch = await request("/source-refresh/batches", {
          method: "POST",
          body: JSON.stringify({
            product_ids: productIds,
            limit: productIds.length,
            interval_hours: intervalHours,
            force: true,
            auto_claim: false
          })
        });
        await refreshAll({ silent: true });
        message(batch.queued
          ? `Queued ${batch.queued} selected source price refresh job(s). Windows Chrome will run them.`
          : "Selected source prices already have queued or running refresh jobs.");
      }

      async function repriceSelectedListings() {
        const productIds = selectedVisibleListingItems().map((item) => item.product_id);
        await repriceProductIds(productIds);
      }

      function bulkEditSelectedListings() {
        const items = selectedVisibleListingItems();
        if (!items.length) return message("Select at least one visible eBay listing first.");
        items.forEach((item) => selectedProductIds.add(item.product_id));
        active = "Products";
        productFilterMenuOpen = false;
        listingFilterMenuOpen = false;
        items.forEach((item) => {
          productDetailsOpenState.set(Number(item.product_id), true);
          productDrawerTabState.set(Number(item.product_id), "ebay");
        });
        render();
        message(`Opened product edit drawers for ${items.length} selected eBay listing(s).`);
      }

      async function tombstoneSelectedListings() {
        const items = selectedVisibleListingItems().filter((item) => item.listing_job?.id);
        if (!items.length) return message("Selected eBay listings do not have tracked draft jobs to delete.");
        if (!confirm(`Delete ${items.length} selected tracked eBay draft record(s)? They will be marked tombstoned in AutoZS.`)) return;
        await Promise.all(items.map((item) => request(`/listing-jobs/${item.listing_job.id}`, {
          method: "PATCH",
          body: JSON.stringify({ status: "tombstoned", message: "Deleted from eBay Listings bulk action" })
        })));
        items.forEach((item) => selectedProductIds.delete(item.product_id));
        await refreshAll();
        message(`Tombstoned ${items.length} selected eBay draft record(s).`);
      }

      function ebayListingCardHtml(item) {
        const product = state.products.find((entry) => entry.id === item.product_id);
        const shipping = product ? shippingState(product) : { key: "unknown", className: "ship-unknown", label: "Shipping unknown" };
        const job = item.listing_job;
        const summary = listingCardSummary(item);
        const updated = job?.updated_at ? new Date(job.updated_at).toLocaleDateString() : "-";
        const watchOnly = listingJobIsWatchOnly(item);
        const isFocused = Number(item.product_id) === Number(focusedProductId);
        return `<div class="product-card shipping-${shipping.key} ${watchOnly ? "watch-only" : ""} ${isFocused ? "is-focused" : ""}" data-product-card-id="${escAttr(item.product_id)}" onclick="toggleListingDrawerFromCard(event, ${item.product_id})">
          <div class="${watchOnly ? "product-card-watch-content" : ""}">
            <div class="product-row listing-product-row">
              ${listingLeadingControlsHtml(item, summary)}
              <div class="product-main">
                ${product ? sourceThumbHtml(product) : listingSourceThumbHtml(item)}
                <div>
                  <div class="product-title">${esc(item.title)}</div>
                  <div class="product-sku">${listingMetaLineHtml(item, product, updated)}</div>
                </div>
              </div>
              ${listingCompactFactsHtml(item, product, shipping)}
              <div class="product-card-context listing-context">
                <div class="compact-fact"><span>Status</span><strong>${listingStageBadgeHtml(item)}</strong></div>
                ${item.revision_job ? `<div class="draft">${esc(ebayRevisionLabel(item.revision_job))}</div>` : ""}
                ${job?.ebay_draft_id ? `<div class="draft">Draft ${esc(job.ebay_draft_id)}</div>` : ""}
              </div>
              <div class="product-card-primary-action">
                ${ebayListingPrimaryActionHtml(item)}
              </div>
            </div>
            <details class="capture listing-drawer" id="listing-details-${item.product_id}" data-listing-details-id="${item.product_id}" ${listingDetailsOpenAttribute(item)} ontoggle="rememberListingDetailsOpenState(${item.product_id}, this.open)">
              <summary>${esc(summary)}</summary>
              ${listingDrawerHtml(item, product)}
            </details>
          </div>
          ${watchOnly ? listingJobProgressOverlayHtml(item) : ""}
        </div>`;
      }

      function listingDrawerHtml(item, product) {
        if (!product) {
          return `<div class="listing-card-actions">
            <div class="draft">${listingIssuesHtml(item)}</div>
            ${listingActionsHtml(item)}
          </div>`;
        }
        const tab = productDrawerTabState.get(Number(item.product_id)) || "product";
        return `<div class="product-drawer-panel">
          <div class="product-drawer-tabs" role="tablist" aria-label="Listing review sections">
            ${listingDrawerTabButton(item.product_id, "product", "Product", tab)}
            ${listingDrawerTabButton(item.product_id, "description", "Description", tab)}
            ${listingDrawerTabButton(item.product_id, "images", `Images (${(product.images || []).length})`, tab)}
            ${listingDrawerTabButton(item.product_id, "ebay", "eBay Listing", tab)}
          </div>
          <div class="product-drawer-body">${listingDrawerTabContent(item, product, tab)}</div>
        </div>`;
      }

      function listingDrawerTabContent(item, product, tab) {
        const draft = product.listing_drafts && product.listing_drafts[0];
        if (tab !== "ebay") return productDrawerTabContent(product, draft, tab);
        return `<div class="product-drawer-grid">
          <div class="product-drawer-section">
            <h3>Listing status</h3>
            ${reportRowsHtml([
              ["Status", listingStageBadgeHtml(item)],
              ["Start", listingStartHtml(item)],
              ["eBay price", money(item.price)],
              ["Estimated profit", money(item.estimated_profit)],
              ["Views", item.listing_views ?? 0],
              ["Relist", listingRenewalDate(item) ? formatSchedule(listingRenewalDate(item)) : "-"],
            ])}
            ${listingIssuesHtml(item)}
          </div>
          <div class="product-drawer-section">
            <h3>eBay actions</h3>
            ${listingActionsHtml(item)}
            <div class="button-row">
              ${ebayListingPrimaryActionHtml(item)}
              <button class="secondary" onclick="copyEbayPackage(${item.product_id})">Package</button>
              <button class="secondary" onclick="copyDraft(${item.product_id})">Copy draft</button>
              <button class="secondary" onclick="checkReadiness(${item.product_id})">Readiness</button>
            </div>
            <pre id="ready-${item.product_id}" class="draft"></pre>
          </div>
        </div>`;
      }

      function listingJobIsWatchOnly(item) {
        const job = item.listing_job;
        return Boolean(job?.listing_schedule_at && ["queued", "running"].includes(job.status));
      }

      function listingJobProgressPercent(item) {
        const job = item.listing_job;
        if (!job) return 0;
        if (job.status === "queued") return 15;
        if (job.status === "running") return 55;
        return 100;
      }

      function listingJobProgressOverlayHtml(item) {
        const job = item.listing_job || {};
        const percent = listingJobProgressPercent(item);
        const label = job.status === "running" ? "Scheduling on Windows" : "Queued for Windows worker";
        const start = job.listing_schedule_at ? formatDateTime(job.listing_schedule_at) : "Start time selected";
        return `<div class="product-card-progress-overlay" aria-live="polite">
          <div class="product-card-progress-box">
            <strong>${esc(label)}</strong>
            <span>${esc(item.title)}</span>
            <small>${esc(start)} · ${esc(job.message || "AutoZS is preparing this listing in the Windows queue.")}</small>
            <div class="product-card-progress-track" aria-label="${escAttr(`${percent}% complete`)}">
              <div class="product-card-progress-fill" style="width: ${percent}%"></div>
            </div>
          </div>
        </div>`;
      }

      function listingLeadingControlsHtml(item, summary) {
        const isOpen = listingDetailsAreOpen(item);
        const detailsLabel = `${isOpen ? "Hide" : "Show"} ${summary.toLowerCase()} details`;
        return `<div class="product-leading-controls">
          <label class="product-select-control" title="Select ${escAttr(item.title)}"><input type="checkbox" aria-label="Select ${escAttr(item.title)}" ${selectedProductIds.has(item.product_id) ? "checked" : ""} onchange="toggleProductSelection(${item.product_id}, this.checked)" /></label>
          <span class="product-control-divider" aria-hidden="true"></span>
          <button class="product-drawer-toggle" type="button" aria-label="${escAttr(detailsLabel)}" aria-expanded="${isOpen}" onclick="toggleListingDrawer(${item.product_id})"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="${isOpen ? "m6 9 6 6 6-6" : "m9 18 6-6-6-6"}"/></svg></button>
        </div>`;
      }

      function listingMetaLineHtml(item, product, updated) {
        const supplierName = product ? supplierLabel(product) : supplierNameFromUrl(item.source_url);
        return [
          `${supplierLogoSvgFromUrl(item.source_url)}<span>${esc(item.sku)}</span>`,
          `<span>Supplier: ${esc(supplierName)}</span>`,
          `<span>Updated ${esc(updated)}</span>`
        ].join(`<span class="meta-separator">|</span>`);
      }

      function ebayRevisionLabel(job) {
        const label = job.status === "running" ? "Updating eBay price" : job.status === "failed" ? "Price update failed" : "Price update queued";
        return `${label}: ${money(job.old_price)} to ${money(job.target_price)}`;
      }

      function listingCompactFactsHtml(item, product, shipping) {
        const job = item.listing_job;
        return `<div class="compact-facts">
          ${compactFactHtml("Source", product ? money(sourcePrice(product)) : "-", product ? sourceTooltip(product) : "")}
          ${compactFactHtml("Shipping", product ? shippingBadgeHtml(product) : `<span class="status ${shipping.className}">${esc(shipping.label)}</span>`, product ? shippingTooltip(product) : "")}
          ${compactFactHtml("eBay", money(item.price), job ? [`Listing job ${job.id}`, `Estimated profit: ${money(item.estimated_profit)}`] : "")}
          ${compactFactHtml("Profit", money(item.estimated_profit), item.meets_minimum_profit === false ? "Below the configured minimum profit target." : "")}
          ${compactFactHtml("Images", imageCountPillHtml(item.local_image_count, item.image_count))}
          ${compactFactHtml("Start", listingStartCompactHtml(item))}
          ${compactFactHtml("Relist", listingRenewalHtml(item), listingRenewalDate(item) ? `Renews ${formatSchedule(listingRenewalDate(item))}` : "")}
          ${compactFactHtml("Views", esc(item.listing_views ?? 0), item.auto_delist_candidate ? "0-view delist candidate under current settings." : "")}
        </div>`;
      }

      function supplierNameFromUrl(url) {
        if (/homedepot\.com/i.test(url || "")) return "Home Depot";
        return "Source";
      }

      function ebayListingPrimaryActionHtml(item) {
        const job = item.listing_job;
        if (listingIsTombstoned(item)) {
          return `<button onclick="importProductToEbay(${item.product_id})" title="Create a fresh eBay draft because the previous draft was tombstoned">Reimport</button>`;
        }
        if (listingIsLive(item) && (item.listing_id || extractListingIdFromJob(job))) {
          return `<button class="secondary" onclick="openEbayListingDraft(${item.product_id})" title="Open this live eBay listing">View Listing</button>`;
        }
        const canOpen = Boolean(job?.ebay_draft_id || job?.assistant_url);
        const title = job?.ebay_draft_id
          ? "Open this eBay draft editor"
          : job?.assistant_url
            ? "Open the eBay assistant for this draft"
            : "No eBay draft link is available yet.";
        return `<button class="secondary" ${canOpen ? "" : "disabled"} onclick="openEbayListingDraft(${item.product_id})" title="${escAttr(title)}">Go to Draft</button>`;
      }

      function openEbayListingDraft(productId) {
        const item = ebayListingItems().find((listing) => Number(listing.product_id) === Number(productId));
        if (!item) return message("eBay listing record not found.");
        if (listingIsTombstoned(item)) return message("This eBay draft was tombstoned. Use Reimport to create a fresh draft.");
        const listingId = item.listing_id || extractListingIdFromJob(item.listing_job);
        if (listingIsLive(item) && listingId) {
          window.open(`https://www.ebay.com/itm/${encodeURIComponent(listingId)}`, "_blank", "noopener,noreferrer");
          return message(`Opened eBay listing ${listingId}.`);
        }
        const job = item.listing_job;
        if (!job) return message("No eBay draft job is available for this listing yet.");
        if (blockIfEbayAccountMismatch(job.ebay_account_key || "manual")) return;
        if (job.ebay_draft_id) {
          const draftUrl = new URL(`https://www.ebay.com/lstng?draftId=${encodeURIComponent(job.ebay_draft_id)}&mode=AddItem`);
          const handoff = ebayFillHandoffParams(productId, job);
          handoff.forEach((value, key) => draftUrl.searchParams.set(key, value));
          draftUrl.hash = handoff.toString();
          window.open(draftUrl.href, "_blank", "noopener,noreferrer");
          return message(`Opened eBay draft ${job.ebay_draft_id}.`);
        }
        if (job.assistant_url) {
          window.open(job.assistant_url, "_blank", "noopener,noreferrer");
          return message(`Opened eBay assistant for job ${job.id}.`);
        }
        message("No eBay draft link is available yet.");
      }

      function ebayFillHandoffParams(productId, job = null) {
        const params = new URLSearchParams({
          autozs_fill: "1",
          autozs_product_id: String(productId),
          autozs_popup_product_id: String(productId),
          autozs_workflow: "create_draft",
          autozs_autosave: "1",
          autozs_account_key: job?.ebay_account_key || "manual"
        });
        if (job?.id) params.set("autozs_job_id", String(job.id));
        if (job?.listing_schedule_at) params.set("autozs_listing_schedule_at", job.listing_schedule_at);
        if (job?.action === "publish" && job?.listing_schedule_at) params.set("autozs_autosubmit", "1");
        return params;
      }

      function syncVisibleEbayDrafts() {
        const drafts = filterListingItems(ebayListingItems())
          .filter((item) => {
            const job = item.listing_job;
            if (!job?.ebay_draft_id || job.status === "tombstoned" || listingIsLive(item)) return false;
            if (!item.listing_status) return true;
            return String(item.listing_status || "").toLowerCase() === "scheduled" && job.action === "create_draft";
          });
        if (!drafts.length) return message("No visible eBay drafts have draft IDs to sync.");
        const checks = drafts.slice(0, 12).map((item) => ({
          job_id: item.listing_job.id,
          draft_id: item.listing_job.ebay_draft_id,
          title: item.title,
        }));
        const url = new URL("https://www.ebay.com/sh/lst/drafts");
        const hash = new URLSearchParams();
        hash.set("autozs_verify_drafts", "1");
        hash.set("autozs_checks", JSON.stringify(checks));
        url.hash = hash.toString();
        window.open(url.href, "_blank", "noopener,noreferrer");
        const clipped = drafts.length > 12 ? ` Opened the first 12 of ${drafts.length}.` : "";
        message(`Opened Seller Hub Drafts to verify ${Math.min(drafts.length, 12)} tracked draft(s). AutoZS will tombstone records missing from eBay.${clipped}`);
      }

      function listingSourceThumbHtml(item) {
        const fallback = supplierLogoSvgFromUrl(item.source_url) || sourceLogoSvg();
        return `<figure class="product-preview">
          <span class="source-thumb" aria-label="No local product preview available"><span class="thumb-fallback">${fallback}</span></span>
          <figcaption class="preview-label">Preview</figcaption>
        </figure>`;
      }

        const readyProducts = (state.listingQueue || []).filter((item) => !item.listing_status && item.manual_ready);

          `<div>${money(job.price)}</div><div class="draft">Profit ${money(job.estimated_profit)}</div>`,
          `<div>${esc(job.ebay_account_key)}</div><div class="draft">${esc(job.action)}</div>`,
          job.listing_schedule_at ? `eBay start: ${formatDateTime(job.listing_schedule_at)}` : job.scheduled_for ? `Run: ${formatDateTime(job.scheduled_for)}` : "Now",
          `<span class="status ${job.image_upload_status === "ready" ? "stage-ready" : "stage-images"}">${esc(`${job.local_image_count}/${job.image_count} images`)}</span>`,

          `<div class="actions">

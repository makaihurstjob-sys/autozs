      function openStoreSetup(key = "") {
        const account = (state.ebayAccounts || []).find((item) => item.key === key) || {};
        storeSetup = {
          step: 1,
          data: {
            key: account.key || "",
            label: account.label || "",
            account_id: account.account_id || "",
            environment: account.environment || "production",
            connection_mode: account.client_id ? "api" : "browser",
            writes_enabled: Boolean(account.writes_enabled),
            client_id: account.client_id || "",
            client_secret: "",
            redirect_uri: account.redirect_uri || "",
            category_id: account.category_id || "",
            merchant_location_key: account.merchant_location_key || "",
            fulfillment_policy_id: account.fulfillment_policy_id || "",
            payment_policy_id: account.payment_policy_id || "",
            return_policy_id: account.return_policy_id || ""
          }
        };
        renderStoreSetupModal();
      }

      function closeStoreSetup() {
        storeSetup = null;
        renderStoreSetupModal();
      }

      function storeSetupField(name) {
        return storeSetup?.data?.[name] ?? "";
      }

      function storeSetupInput(name) {
        return document.getElementById(`store-setup-${name}`);
      }

      function syncStoreSetupFields() {
        if (!storeSetup) return;
        const fields = ["label", "account_id", "environment", "client_id", "client_secret", "redirect_uri", "category_id", "merchant_location_key", "fulfillment_policy_id", "payment_policy_id", "return_policy_id"];
        fields.forEach((name) => {
          const input = storeSetupInput(name);
          if (input) storeSetup.data[name] = input.value.trim();
        });
        const mode = document.querySelector('input[name="store-setup-connection-mode"]:checked');
        if (mode) storeSetup.data.connection_mode = mode.value;
        const writes = storeSetupInput("writes_enabled");
        if (writes) storeSetup.data.writes_enabled = writes.checked;
      }

      function setStoreSetupConnectionMode(mode) {
        syncStoreSetupFields();
        storeSetup.data.connection_mode = mode;
        if (mode === "browser") storeSetup.data.writes_enabled = false;
        renderStoreSetupModal();
      }

      function storeSetupStepLabel(step) {
        return ["Store identity", "Connection", "Listing setup", "Review"][step - 1] || "Store setup";
      }

      function storeSetupProgressHtml() {
        return `<div class="store-setup-progress">${[1, 2, 3, 4].map((step) => `<span class="${step <= storeSetup.step ? "active" : ""}">${step}. ${storeSetupStepLabel(step)}</span>`).join("")}</div>`;
      }

      function storeSetupHtml() {
        if (!storeSetup) return "";
        const editing = Boolean(storeSetupField("key"));
        return `<div class="add-products-dialog" role="dialog" aria-modal="true" aria-label="${editing ? "Edit eBay store" : "Add eBay store"}">
          <button class="add-products-close" onclick="closeStoreSetup()" aria-label="Close store setup">&times;</button>
          <h2 class="add-products-heading">${editing ? "Edit store" : "Add store"}</h2>
          <p class="add-products-subtitle">Step ${storeSetup.step} of 4: ${storeSetupStepLabel(storeSetup.step)}</p>
          ${storeSetupProgressHtml()}
          <div class="store-setup-content">${storeSetupStepHtml()}</div>
          <div class="add-products-footer">
            <button class="secondary" onclick="closeStoreSetup()">Cancel</button>
            ${storeSetup.step > 1 ? `<button class="secondary" onclick="previousStoreSetupStep()">Back</button>` : ""}
            <button onclick="${storeSetup.step === 4 ? "saveStoreSetup()" : "nextStoreSetupStep()"}">${storeSetup.step === 4 ? (editing ? "Save changes" : "Save store") : "Continue"}</button>
          </div>
        </div>`;
      }

      function storeSetupStepHtml() {
        const data = storeSetup.data;
        if (storeSetup.step === 1) {
          return `<div class="add-products-fields">
            <label class="add-products-field"><span>Store label</span><input id="store-setup-label" value="${escAttr(data.label)}" placeholder="My eBay store" autofocus /><small class="muted">A name only you see in AutoZS.</small></label>
            <label class="add-products-field"><span>eBay username</span><input id="store-setup-account_id" value="${escAttr(data.account_id)}" placeholder="your-ebay-username" /><small class="muted">Enter the exact username shown in eBay. AutoZS checks it against the Chrome extension before imports.</small></label>
            <label class="add-products-field"><span>eBay environment</span><select id="store-setup-environment"><option value="production" ${data.environment === "production" ? "selected" : ""}>Production</option><option value="sandbox" ${data.environment === "sandbox" ? "selected" : ""}>Sandbox</option></select></label>
          </div>`;
        }
        if (storeSetup.step === 2) {
          const browserMode = data.connection_mode !== "api";
          return `<div class="add-products-fields">
            <label class="store-setup-choice"><input type="radio" name="store-setup-connection-mode" value="browser" ${browserMode ? "checked" : ""} onchange="setStoreSetupConnectionMode('browser')" /><strong>Browser-assisted (no API)</strong><span>Use the AutoZS Chrome extension for account matching and eBay draft import. No eBay developer keys are required.</span></label>
            <label class="store-setup-choice"><input type="radio" name="store-setup-connection-mode" value="api" ${browserMode ? "" : "checked"} onchange="setStoreSetupConnectionMode('api')" /><strong>eBay API connection</strong><span>Save this store's app details and listing policies now. Account-specific OAuth is the next API connection step.</span></label>
            ${browserMode ? `<p class="muted">This path is ready for the current AutoZS importer. Keep Chrome signed into the username from Step 1.</p>` : `<div class="add-products-fields"><label class="add-products-field"><span>Client ID</span><input id="store-setup-client_id" value="${escAttr(data.client_id)}" /></label><label class="add-products-field"><span>Client secret</span><input id="store-setup-client_secret" type="password" placeholder="Leave blank to keep the saved secret" /></label><label class="add-products-field"><span>RuName / redirect URI</span><input id="store-setup-redirect_uri" value="${escAttr(data.redirect_uri)}" placeholder="Your eBay RuName or redirect URI" /></label><label class="muted"><input id="store-setup-writes_enabled" type="checkbox" ${data.writes_enabled ? "checked" : ""} /> Allow API writes for this store</label></div>`}
          </div>`;
        }
        if (storeSetup.step === 3) {
          return `<div class="add-products-fields">
            <p class="muted">These values are optional for browser-assisted imports. Add them now if you use eBay API listing later.</p>
            <label class="add-products-field"><span>Default eBay category ID</span><input id="store-setup-category_id" value="${escAttr(data.category_id)}" /></label>
            <label class="add-products-field"><span>Merchant location key</span><input id="store-setup-merchant_location_key" value="${escAttr(data.merchant_location_key)}" /></label>
            <label class="add-products-field"><span>Fulfillment policy ID</span><input id="store-setup-fulfillment_policy_id" value="${escAttr(data.fulfillment_policy_id)}" /></label>
            <label class="add-products-field"><span>Payment policy ID</span><input id="store-setup-payment_policy_id" value="${escAttr(data.payment_policy_id)}" /></label>
            <label class="add-products-field"><span>Return policy ID</span><input id="store-setup-return_policy_id" value="${escAttr(data.return_policy_id)}" /></label>
          </div>`;
        }
        const apiSelected = data.connection_mode === "api";
        const policyCount = [data.category_id, data.merchant_location_key, data.fulfillment_policy_id, data.payment_policy_id, data.return_policy_id].filter(Boolean).length;
        return `<div class="store-setup-review">
          <div><span>Store</span><strong>${esc(data.label || "Not set")}</strong></div>
          <div><span>eBay username</span><strong>${esc(data.account_id || "Not set")}</strong></div>
          <div><span>Connection</span><strong>${apiSelected ? "eBay API" : "Browser-assisted (no API)"}</strong></div>
          <div><span>Listing setup</span><strong>${policyCount}/5 API policy details added</strong></div>
          <p class="muted">Saving this store enables it in Add Products. Browser-assisted stores are checked against the signed-in Chrome eBay username before import.</p>
        </div>`;
      }

      function renderStoreSetupModal() {
        const modal = document.getElementById("store-setup-modal");
        if (!modal) return;
        modal.hidden = !storeSetup;
        modal.innerHTML = storeSetupHtml();
      }

      function nextStoreSetupStep() {
        syncStoreSetupFields();
        if (storeSetup.step === 1 && (!storeSetup.data.label || !storeSetup.data.account_id)) return message("Enter a store label and the exact eBay username to continue.");
        storeSetup.step = Math.min(4, storeSetup.step + 1);
        renderStoreSetupModal();
      }

      function previousStoreSetupStep() {
        syncStoreSetupFields();
        storeSetup.step = Math.max(1, storeSetup.step - 1);
        renderStoreSetupModal();
      }

      async function saveStoreSetup() {
        syncStoreSetupFields();
        const data = storeSetup.data;
        if (!data.label || !data.account_id) return message("A store label and eBay username are required.");
        const payload = {
          key: data.key || null,
          label: data.label,
          account_id: data.account_id,
          environment: data.environment,
          writes_enabled: data.connection_mode === "api" && Boolean(data.writes_enabled),
          client_id: data.connection_mode === "api" ? data.client_id || null : null,
          redirect_uri: data.connection_mode === "api" ? data.redirect_uri || null : null,
          category_id: data.category_id || null,
          merchant_location_key: data.merchant_location_key || null,
          fulfillment_policy_id: data.fulfillment_policy_id || null,
          payment_policy_id: data.payment_policy_id || null,
          return_policy_id: data.return_policy_id || null
        };
        if (data.connection_mode === "api" && data.client_secret) payload.client_secret = data.client_secret;
        const existing = data.key && (state.ebayAccounts || []).some((account) => account.key === data.key);
        const account = await request(existing ? `/ebay/accounts/${encodeURIComponent(data.key)}` : "/ebay/accounts", {
          method: existing ? "PATCH" : "POST",
          body: JSON.stringify(payload)
        });
        storeSetup = null;
        await refreshAll();
        message(`Saved eBay store: ${account.label}.`);
      }

      function openAddProducts(view) {
        addProductsView = view;
        if (view === "multiple") addProductsBatchTab = "urls";
        renderAddProductsModal();
      }

      function closeAddProducts() {
        addProductsView = null;
        addProductsCsvUrls = [];
        renderAddProductsModal();
      }

      function addProductsStoreOptions() {
        const stores = availableEbayStores();
        if (!stores.length) return `<option value="">Add a store in Settings first</option>`;
        return stores.map((store, index) => `<option value="${escAttr(store.key)}" ${index === 0 ? "selected" : ""}>${esc(ebayStoreDisplayName(store))}</option>`).join("");
      }

      function addProductsSupplierOptions(selected = "source_site") {
        const suppliers = [
          ["home_depot", "Home Depot"],
          ["amazon", "Amazon"],
          ["walmart", "Walmart"],
          ["aliexpress", "AliExpress"],
          ["source_site", "Other source"]
        ];
        return suppliers.map(([key, label]) => `<option value="${key}" ${key === selected ? "selected" : ""}>${label}</option>`).join("");
      }

      function supplierName(key) {
        return ({ home_depot: "Home Depot", amazon: "Amazon", walmart: "Walmart", aliexpress: "AliExpress", source_site: "Other source" })[key] || "Other source";
      }

      function inferredAddProductsSupplier(raw) {
        const text = String(raw || "").toLowerCase();
        if (text.includes("homedepot.com")) return "home_depot";
        if (text.includes("amazon.")) return "amazon";
        if (text.includes("walmart.com")) return "walmart";
        if (text.includes("aliexpress.")) return "aliexpress";
        return "source_site";
      }

      function addProductsSupplierNote(key) {
        if (key === "home_depot") return "Detected from the link. Home Depot items can be completed with the AutoZS Chrome extension when server capture is blocked.";
        if (key === "source_site") return "AutoZS will create a source record from the URL. Use the browser capture tools later if price, images, or description need filling.";
        return `${supplierName(key)} is saved as the supplier. Browser capture may still be needed for full product details.`;
      }

      function addProductsModalTitle() {
        return addProductsView === "single" ? "Add Product" : "Add Products";
      }

      function addProductsModalHtml() {
        if (!addProductsView) return "";
        if (addProductsView === "launcher") {
          return `<div class="add-products-dialog launcher" role="dialog" aria-modal="true" aria-label="Add products">
            <button class="add-products-close" onclick="closeAddProducts()" aria-label="Close add products">&times;</button>
            <div class="add-products-menu">
              <button onclick="openAddProducts('single')"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5 12 3l8 4.5v9L12 21l-8-4.5z"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/></svg><strong>Single Product</strong><span>Import one supplier product to one store</span></button>
              <button onclick="openAddProducts('multiple')"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 8 5-3 5 3v6l-5 3-5-3zM11 12l5-3 5 3v6l-5 3-5-3z"/></svg><strong>Multiple Products / Stores</strong><span>Import a batch of supplier URLs or a CSV</span></button>
            </div>
          </div>`;
        }
        const isMultiple = addProductsView === "multiple";
        const storesReady = availableEbayStores().length > 0;
        const supplier = "source_site";
        return `<div class="add-products-dialog" role="dialog" aria-modal="true" aria-label="${addProductsModalTitle()}">
          <button class="add-products-close" onclick="closeAddProducts()" aria-label="Close add products">&times;</button>
          <h2 class="add-products-heading">${addProductsModalTitle()}</h2>
          <p class="add-products-subtitle">Publish to <strong>${storesReady ? "your selected eBay store" : "an eBay store profile"}</strong></p>
          ${isMultiple ? addProductsMultipleHtml(supplier) : addProductsSingleHtml(supplier)}
          <div class="add-products-footer">
            <label class="muted"><input id="add-products-auto-download" type="checkbox" ${autoDownloadImages ? "checked" : ""} onchange="setAutoDownloadImages(this.checked)" /> Download images after import</label>
            ${storesReady ? "" : `<span class="needs-data">Add an eBay store profile in Settings before importing.</span>`}
            <button class="secondary" onclick="closeAddProducts()">Cancel</button>
            <button ${storesReady ? "" : "disabled"} onclick="submitAddProductsImport()">Add as draft</button>
          </div>
        </div>`;
      }

      function addProductsSingleHtml(supplier) {
        return `<div class="add-products-fields">
          <label class="add-products-field"><span>eBay store</span><select id="add-products-store">${addProductsStoreOptions()}</select></label>
          <label class="add-products-field"><span>Supplier URL or Product ID</span><input id="add-products-single-url" placeholder="Paste a supplier product URL or Home Depot product ID" oninput="handleAddProductUrlInput()" autofocus /></label>
          <div class="add-products-meta">
            <label class="add-products-field"><span>Supplier source</span><select id="add-products-supplier" onchange="handleAddProductsSupplierChange()">${addProductsSupplierOptions(supplier)}</select></label>
            <p id="add-products-supplier-note" class="supplier-note">${addProductsSupplierNote(supplier)}</p>
          </div>
        </div>`;
      }

      function addProductsMultipleHtml(supplier) {
        const urlsTab = addProductsBatchTab === "urls";
        return `<div class="add-products-tabs">
          <button class="${urlsTab ? "active" : ""}" onclick="setAddProductsBatchTab('urls')">URLs or IDs</button>
          <button class="${urlsTab ? "" : "active"}" onclick="setAddProductsBatchTab('csv')">Upload CSV</button>
        </div>
        <div class="add-products-fields">
          ${urlsTab ? `<label class="add-products-field"><span>Supplier URLs or Home Depot product IDs</span><textarea id="add-products-batch-urls" class="add-products-textarea" placeholder="Paste one supplier URL or Home Depot product ID per line" oninput="handleAddProductUrlInput()"></textarea><span id="add-products-url-count" class="muted">One product per line</span></label>` : addProductsCsvHtml()}
          <div class="add-products-meta">
            <label class="add-products-field"><span>eBay store</span><select id="add-products-store">${addProductsStoreOptions()}</select></label>
            <label class="add-products-field"><span>Supplier source</span><select id="add-products-supplier" onchange="handleAddProductsSupplierChange()">${addProductsSupplierOptions(supplier)}</select><span id="add-products-supplier-note" class="supplier-note">${addProductsSupplierNote(supplier)}</span></label>
          </div>
        </div>`;

      function addProductsCsvHtml() {
        const count = addProductsCsvUrls.length;
        return `<div class="csv-dropzone" ondragover="event.preventDefault()" ondrop="handleAddProductCsvFiles(event.dataTransfer.files)">
          <strong>${count ? `${count} product URL${count === 1 ? "" : "s"} ready` : "Drop a CSV file here"}</strong>
          <span>${count ? "The first URL-like column will be imported." : "or select a CSV file from this computer"}</span>
          <input type="file" accept=".csv,text/csv" onchange="handleAddProductCsvFiles(this.files)" />
          ${count ? `<button class="secondary" onclick="clearAddProductCsv()">Clear file</button>` : ""}
        </div>`;

      function renderAddProductsModal() {
        const modal = document.getElementById("add-products-modal");
        if (!modal) return;
        modal.hidden = !addProductsView;
        modal.innerHTML = addProductsModalHtml();
      }

      function renderBulkScheduleModal() {
        const modal = document.getElementById("bulk-schedule-modal");
        if (!modal) return;
        modal.hidden = !bulkScheduleView;
        modal.innerHTML = bulkScheduleModalHtml();
      }

      function bulkScheduleModalHtml() {
        if (!bulkScheduleView) return "";
        const count = bulkScheduleTargetCount(bulkScheduleView.context);
        const isProductSchedule = bulkScheduleView.context === "products";
        return `<div class="add-products-dialog bulk-schedule-dialog" role="dialog" aria-modal="true" aria-label="Schedule drafts">
          <button class="add-products-close" onclick="closeBulkSchedule()" aria-label="Close schedule drafts">×</button>
          <h2>${isProductSchedule ? "Schedule listings" : "Schedule drafts"}</h2>
          <p class="add-products-subtitle">${esc(count)} selected item${count === 1 ? "" : "s"} will ${isProductSchedule ? "be queued on the Windows worker with this native eBay listing start" : "use this eBay listing start"}.</p>
          <div class="bulk-schedule-fields">
            <label>Select date
              <input id="bulk-schedule-date" type="date" oninput="updateBulkScheduleButton()" />
            </label>
            <label>Select time
              <input id="bulk-schedule-time" type="time" oninput="updateBulkScheduleButton()" />
            </label>
          </div>
          <div class="bulk-schedule-actions">
            <button id="bulk-schedule-submit" onclick="applyBulkSchedule()" disabled>Schedule</button>
          </div>
        </div>`;
      }

      function bulkScheduleTargetCount(context) {
        if (bulkScheduleView?.productIds?.length) return bulkScheduleView.productIds.length;
        return context === "listings" ? selectedVisibleListingItems().length : selectedVisibleProductIds().length;
      }

      function openBulkSchedule(context, productIds = null) {
        const nextView = { context, productIds: Array.isArray(productIds) ? productIds.map(Number).filter(Boolean) : [] };
        const count = nextView.productIds.length || (context === "listings" ? selectedVisibleListingItems().length : selectedVisibleProductIds().length);
        if (!count) return message("Select at least one visible item first.");
        bulkScheduleView = nextView;
        renderBulkScheduleModal();
      }

      function openProductSchedule(productId) {
        openBulkSchedule("products", [productId]);
      }

      function closeBulkSchedule() {
        bulkScheduleView = null;
        renderBulkScheduleModal();
      }

      function updateBulkScheduleButton() {
        const submit = document.getElementById("bulk-schedule-submit");
        if (!submit) return;
        submit.disabled = !document.getElementById("bulk-schedule-date")?.value || !document.getElementById("bulk-schedule-time")?.value;
      }

      function selectedBulkScheduleValue() {
        const date = document.getElementById("bulk-schedule-date")?.value || "";
        const time = document.getElementById("bulk-schedule-time")?.value || "";
        return date && time ? zonedWallTimeToUtcIso(`${date}T${time}`) : "";
      }

      async function applyBulkSchedule() {
        if (!bulkScheduleView) return;
        const schedule = selectedBulkScheduleValue();
        if (!schedule) return message("Select a date and time first.");
        const context = bulkScheduleView.context;
        if (context === "listings") {
          const items = selectedVisibleListingItems();
          if (!items.length) return message("Select at least one visible eBay listing first.");
          await Promise.all(items.map((item) => {
            if (item.listing_job?.id) {
              return request(`/listing-jobs/${item.listing_job.id}`, { method: "PATCH", body: JSON.stringify({ listing_schedule_at: schedule }) });
            }
            return request(`/products/${item.product_id}/listing-schedule`, { method: "PATCH", body: JSON.stringify({ listing_schedule_at: schedule }) });
          }));
          listingStatusFilter = "scheduled";
          closeBulkSchedule();
          await refreshAll();
          message(`Scheduled ${items.length} selected eBay listing draft(s).`);
        } else {
          const productIds = bulkScheduleView.productIds?.length ? bulkScheduleView.productIds : selectedVisibleProductIds();
          if (!productIds.length) return message("Select at least one visible product first.");
          const targetIdSet = new Set(productIds.map(Number));
          const products = state.products.filter((product) => targetIdSet.has(product.id));
          const accountKeys = [...new Set(products.map((product) => selectedProductEbayStoreKey(product.id)).filter(Boolean))];
          if (accountKeys.length !== 1) return message("Select products assigned to one eBay store at a time.");
          const accountKey = accountKeys[0];
          if (blockIfEbayAccountMismatch(accountKey)) return;
          message(`Preparing images for ${productIds.length} scheduled product(s)...`);
          await Promise.all(productIds.map(async (id) => {
            await request(`/products/${id}/download-images`, { method: "POST" });
            await request(`/products/${id}/prepare-images?size=1000`, { method: "POST" });
          }));
          await Promise.all(productIds.map((id) => request(`/products/${id}/listing-schedule`, { method: "PATCH", body: JSON.stringify({ listing_schedule_at: schedule }) })));
          const jobs = await request("/listing-jobs", {
            method: "POST",
            body: JSON.stringify(queuePayload(productIds, schedule, accountKey))
          });
          productIds.forEach((id) => selectedProductIds.delete(id));
          active = "eBay Listings";
          listingStatusFilter = "scheduled";
          closeBulkSchedule();
          await refreshAll();
          message(`Scheduled ${jobs.length} product(s). Windows worker will handle the eBay flow.`);
        }
      }

      function setAddProductsBatchTab(tab) {
        addProductsBatchTab = tab;
        renderAddProductsModal();
      }

      function currentAddProductsInput() {
        return document.getElementById("add-products-single-url") || document.getElementById("add-products-batch-urls");
      }

      function handleAddProductUrlInput() {
        const input = currentAddProductsInput();
        const raw = input?.value || "";
        const supplierSelect = document.getElementById("add-products-supplier");
        if (supplierSelect && supplierSelect.dataset.manual !== "true") supplierSelect.value = inferredAddProductsSupplier(raw);
        updateAddProductsSupplierNote();
        const count = raw.split(/[\n,]+/).map((value) => value.trim()).filter(Boolean).length;
        const countLabel = document.getElementById("add-products-url-count");
        if (countLabel) countLabel.textContent = count ? `${count} product${count === 1 ? "" : "s"} ready to add` : "One product per line";
      }

      function handleAddProductsSupplierChange() {
        const supplierSelect = document.getElementById("add-products-supplier");
        if (supplierSelect) supplierSelect.dataset.manual = "true";
        updateAddProductsSupplierNote();
      }

      function updateAddProductsSupplierNote() {
        const supplierSelect = document.getElementById("add-products-supplier");
        const note = document.getElementById("add-products-supplier-note");
        if (supplierSelect && note) note.textContent = addProductsSupplierNote(supplierSelect.value);
      }

      function parseAddProductsCsv(text) {
        const rows = String(text || "").split(/\r?\n/).map((line) => splitAddProductsCsvLine(line)).filter((row) => row.some((value) => value.trim()));
        if (!rows.length) return [];
        const headers = rows[0].map((value) => value.trim().toLowerCase());
        const urlColumn = headers.findIndex((header) => /^(buy_?url|source_?url|product_?url|url|link)$/i.test(header));
        const start = urlColumn >= 0 ? 1 : 0;
        const column = urlColumn >= 0 ? urlColumn : 0;
        return rows.slice(start).map((row) => String(row[column] || "").trim()).filter(Boolean);
      }

      function splitAddProductsCsvLine(line) {
        const values = [];
        let value = "";
        let quoted = false;
        for (let index = 0; index < line.length; index += 1) {
          const character = line[index];
          if (character === '"' && line[index + 1] === '"') { value += '"'; index += 1; }
          else if (character === '"') quoted = !quoted;
          else if (character === "," && !quoted) { values.push(value); value = ""; }
          else value += character;
        }
        values.push(value);
        return values;
      }

      async function handleAddProductCsvFiles(files) {
        const file = files?.[0];
        if (!file) return;
        addProductsCsvUrls = parseAddProductsCsv(await file.text());
        if (!addProductsCsvUrls.length) return message("No product URLs or IDs were found in that CSV.");
        renderAddProductsModal();
      }

      function clearAddProductCsv() {
        addProductsCsvUrls = [];
        renderAddProductsModal();
      }

      function normalizeAddProductsUrls(raw, supplier) {
        const entries = String(raw || "").split(/[\n,]+/).map((value) => value.trim()).filter(Boolean);
        const unsupportedIds = [];
        const urls = entries.map((entry) => {
          if (/^https?:\/\//i.test(entry)) return entry;
          if (supplier === "home_depot" && /^[A-Za-z0-9-]+$/.test(entry)) return `https://www.homedepot.com/p/${entry}`;
          unsupportedIds.push(entry);
          return null;
        }).filter(Boolean);
        if (unsupportedIds.length) throw new Error("Product IDs are currently supported for Home Depot only. Paste full URLs for other suppliers.");
        return urls;
      }

      async function submitAddProductsImport() {
        const storeKey = document.getElementById("add-products-store")?.value || "";
        const supplier = document.getElementById("add-products-supplier")?.value || "source_site";
        const raw = addProductsView === "multiple" && addProductsBatchTab === "csv"
          ? addProductsCsvUrls.join("\n")
          : currentAddProductsInput()?.value || "";
        let urls;
        try {
          urls = normalizeAddProductsUrls(raw, supplier);
        } catch (error) {
          return message(error.message);
        }
        if (!urls.length) return message("Paste at least one supplier URL or upload a CSV first.");
        if (!storeKey) return message("Add an eBay store profile in Settings before importing products.");
        const result = await request("/products/import", { method: "POST", body: JSON.stringify({ urls: urls.join("\n"), supplier_override: supplier }) });
        (result.products || []).forEach((product) => localStorage.setItem(`${PRODUCT_EBAY_STORE_STORAGE_PREFIX}${product.id}`, storeKey));
        const imageResult = await maybeDownloadImportedImages(result.products || []);
        lastExtensionImportItems = extensionItemsFromImportResult(result);
        const missing = lastExtensionImportItems.length;
        addProductsView = null;
        addProductsCsvUrls = [];
        active = "Products";
        await refreshAll();
        message(importResultMessage(result, imageResult, missing));
      }

      function importHtml() {
        return `

          <div class="actions" style="margin-top:10px">
            <button onclick="importProducts()">Import Product</button>

          </div>

      async function importProducts() {
        const urls = document.getElementById("source-urls").value.trim();
        const sourcePriceInput = document.getElementById("source-price");
        const sourceShippingInput = document.getElementById("source-shipping");
        const competitorPriceInput = document.getElementById("competitor-price");
        const sourcePrice = Number(sourcePriceInput?.value);
        const sourceShipping = Number(sourceShippingInput?.value);
        const competitorPrice = Number(competitorPriceInput?.value);
        if (!urls) return message("Paste at least one source URL.");
        const payload = { urls };
        if (!Number.isNaN(sourcePrice) && sourcePriceInput?.value.trim()) payload.source_price_override = sourcePrice;
        if (!Number.isNaN(sourceShipping) && sourceShippingInput?.value.trim()) payload.source_shipping_override = sourceShipping;
        if (!Number.isNaN(competitorPrice) && competitorPriceInput?.value.trim()) payload.competitor_price = competitorPrice;
        const result = await request("/products/import", { method: "POST", body: JSON.stringify(payload) });
        const imageResult = await maybeDownloadImportedImages(result.products || []);
        lastExtensionImportItems = extensionItemsFromImportResult(result);
        const missing = lastExtensionImportItems.length;
        active = "Products";
        await refreshAll();
        message(importResultMessage(result, imageResult, missing));
      }

      function importResultMessage(result, imageResult, missing) {
        const warningText = (result.warnings || []).join(" ");
        const blocked = /Home Depot blocked/i.test(warningText);
        if (missing) {
          return `Imported ${result.imported} product(s). ${missing} ready for extension import. Open them with Auto Import, then click Import to Website on each Home Depot page.`;
        }
        if (blocked) {
          return `Imported ${result.imported} product(s). ${imageResult} Home Depot blocked server capture, but saved source data was reused.`;
        }
        return `Imported ${result.imported} product(s). ${imageResult} ${warningText}`;
      }

      function extensionItemsFromImportResult(result) {
        const warningText = (result.warnings || []).join(" ");
        const serverBlocked = /Home Depot blocked/i.test(warningText);
        return (result.products || [])
          .filter((product) => {
            if (!isHomeDepotProduct(product)) return false;
            const supplierInfo = supplier(product);
            const draft = product.listing_drafts?.[0];
            const missingPrice = sourcePrice(product) === null || sourcePrice(product) === undefined;
            const missingImages = !(product.images || []).length || (product.images || []).some((image) => !image.local_path);
            const placeholderDescription = !draft?.description || /Product details are summarized from the source listing|Source product details captured/i.test(draft.description);
            return serverBlocked || missingPrice || missingImages || placeholderDescription || supplierInfo?.last_shipping < 0;
          })
          .map((product) => {
            const supplierInfo = supplier(product);
            return {
              product_id: product.id,
              sku: product.sku,
              title: product.title,
              source_url: supplierInfo?.source_url || "",
              missing: extensionMissingLabels(product),
            };
          })
          .filter((item) => item.source_url);
      }

      function extensionMissingLabels(product) {
        const labels = [];
        const supplierInfo = supplier(product);
        const draft = product.listing_drafts?.[0];
        if (sourcePrice(product) === null || sourcePrice(product) === undefined) labels.push("price");
        if (supplierInfo?.last_shipping === null || supplierInfo?.last_shipping === undefined || supplierInfo.last_shipping < 0) labels.push("shipping");
        if (!(product.images || []).length) labels.push("images");
        else if ((product.images || []).some((image) => !image.local_path)) labels.push("downloaded images");
        if (!draft?.description || /Product details are summarized from the source listing|Source product details captured/i.test(draft.description)) labels.push("description");
        return labels.length ? labels : ["fresh browser data"];
      }

      function isHomeDepotProduct(product) {
        return (product.supplier_products || []).some((item) => item.supplier === "home_depot" || /homedepot\.com/i.test(item.source_url || ""));
      }

      function autoImportUrl(url) {
        try {
          const nextUrl = new URL(url);

      function setAutoDownloadImages(value) {

      function captureHelperCode() {
        const helperApiBase = JSON.stringify(API || "http://127.0.0.1:8000");
        return `(async () => {
  const apiBase = ${helperApiBase};
  const clean = value => String(value || '').replace(/\\s+/g, ' ').trim();
  const uniq = values => [...new Set(values.filter(Boolean).map(clean).filter(Boolean))];
  const visibleText = document.body.innerText || '';
  const jsonProducts = [];
  document.querySelectorAll('script[type="application/ld+json"]').forEach(script => {
    try {
      const parsed = JSON.parse(script.textContent);
      const queue = Array.isArray(parsed) ? [...parsed] : [parsed];
      while (queue.length) {
        const item = queue.shift();
        if (!item || typeof item !== 'object') continue;
        const type = item['@type'];
        if (type === 'Product' || (Array.isArray(type) && type.includes('Product'))) jsonProducts.push(item);
        Object.values(item).forEach(value => {
          if (value && typeof value === 'object') Array.isArray(value) ? queue.push(...value) : queue.push(value);
        });
      }
    } catch {}
  });
  const productJson = jsonProducts[0] || {};
  const offer = Array.isArray(productJson.offers) ? productJson.offers[0] : productJson.offers || {};
  const parsePrice = value => {
    const text = clean(value);
    if (!text) return null;
    const explicit = text.match(/\\$\\s*([0-9]{1,4}(?:,[0-9]{3})*)(?:\\s*[\\.]\\s*|\\s+)([0-9]{2})\\b/) || text.match(/\\$\\s*([0-9]{1,4}(?:,[0-9]{3})*)(?:\\.([0-9]{2}))?/);
    if (!explicit) return null;
    const dollars = explicit[1].replace(/,/g, '');
    const cents = explicit[2] || '00';
    const parsed = Number(dollars + '.' + cents);
    return parsed > 0 && parsed < 10000 ? parsed : null;
  };
  const priceFromText = () => {
    const candidates = [];
    const add = value => {
      const parsed = parsePrice(value);
      if (parsed) candidates.push(parsed);
    };
    add(offer.price);
    document.querySelectorAll('meta[property="product:price:amount"], meta[name="product:price:amount"], meta[itemprop="price"], [itemprop="price"]').forEach(el => {
      add(el.content || el.getAttribute('content') || el.getAttribute('value') || el.textContent);
    });
    document.querySelectorAll('[data-testid*="price" i], [class*="price" i], [id*="price" i], [aria-label*="price" i], [data-automation-id*="price" i]').forEach(el => {
      add(el.innerText || el.textContent || el.getAttribute('aria-label') || el.getAttribute('content') || el.getAttribute('value'));
      Object.values(el.dataset || {}).forEach(add);
    });
    const textMatches = visibleText.match(/\\$\\s*[0-9]{1,4}(?:,[0-9]{3})*(?:\\s*[\\.]\\s*|\\s+)?[0-9]{0,2}/g) || [];
    textMatches.slice(0, 30).forEach(add);
    return candidates[0] || null;
  };
  const imageCandidates = [];
  document.querySelectorAll('meta[property="og:image"], meta[name="og:image"]').forEach(meta => imageCandidates.push(meta.content));
  const structuredImages = productJson.image ? (Array.isArray(productJson.image) ? productJson.image : [productJson.image]) : [];
  imageCandidates.push(...structuredImages);
  [...document.images].forEach(img => {
    imageCandidates.push(img.currentSrc, img.src, img.dataset.src, img.dataset.zoom, img.dataset.image, img.dataset.imageUrl);
    imageCandidates.push(...Object.values(img.dataset || {}));
    if (img.srcset) img.srcset.split(',').forEach(part => imageCandidates.push(part.trim().split(/\\s+/)[0]));
  });
  const rawHtml = document.documentElement.innerHTML.replace(/\\\\u002F/g, '/').replace(/\\u002F/g, '/');
  const htmlImages = rawHtml.match(/https?:\\/\\/[^"'\\\\\\s<>]+?\\.(?:jpg|jpeg|png|webp)(?:\\?[^"'\\\\\\s<>]*)?/gi) || [];
  imageCandidates.push(...htmlImages.map(src => src.replace(/&amp;/g, '&')));
  const images = uniq(imageCandidates.map(src => {
    try { return new URL(src, location.href).href; } catch { return ''; }
  })).filter(src => /\\.(jpg|jpeg|png|webp)(\\?|$)/i.test(src) || src.startsWith('data:image/')).slice(0, 100);
  const bulletSelectors = [
    '[data-testid*="bullet"] li',
    '[data-testid*="product-overview"] li',
    '[class*="product-overview"] li',
    '[class*="ProductOverview"] li',
    '.bullet-list li',
    'li'
  ];
  const bulletText = [];
  bulletSelectors.forEach(selector => document.querySelectorAll(selector).forEach(el => {
    const text = clean(el.innerText);
    if (text.length >= 12 && text.length <= 220 && !/sponsored|advertisement|sign in/i.test(text)) bulletText.push(text);
  }));
  const bullets = uniq(bulletText).slice(0, 12);
  const metaDescription = document.querySelector('meta[name="description"]')?.content || document.querySelector('meta[property="og:description"]')?.content || '';
  const description = bullets.length ? bullets.join('\\n') : clean(productJson.description || metaDescription);
  const sourceShippingPrompt = prompt('Optional source shipping cost for this ZIP/order, e.g. 55. Leave blank for free shipping.', '');
  const sourceShipping = sourceShippingPrompt && !Number.isNaN(Number(sourceShippingPrompt.replace(/[^0-9.]/g, ''))) ? Number(sourceShippingPrompt.replace(/[^0-9.]/g, '')) : null;
  const competitor = prompt('Optional competitor eBay price, e.g. 21.49', '');
  const competitorPrice = competitor && !Number.isNaN(Number(competitor)) ? Number(competitor) : null;
  let detectedSourcePrice = priceFromText();
  if (!detectedSourcePrice) {
    const manualSource = prompt('Source/Home Depot price was not detected. Enter source price, e.g. 17.97', '');
    detectedSourcePrice = manualSource && !Number.isNaN(Number(manualSource.replace(/[^0-9.]/g, ''))) ? Number(manualSource.replace(/[^0-9.]/g, '')) : null;
  }
  const payload = {
    source_url: location.href,
    title: clean(productJson.name || document.querySelector('h1')?.innerText || document.querySelector('meta[property="og:title"]')?.content || document.title),
    source_price: detectedSourcePrice,
    source_shipping: sourceShipping,
    competitor_price: competitorPrice,
    description,
    image_urls: images.join('\\n')
  };
  try {
    const response = await fetch(apiBase + '/products/import-captured', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(await response.text());
    console.log('Imported into AutoZS:', payload);
  } catch (error) {
    await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
    console.warn('Direct import blocked; captured JSON copied. Paste it into the local app.', error);
  }
})();`;
      }

      function productsFilterSummary() {

            ${filterMenuOption("Needs capture", productWorkflowFilter === "capture", "setProductWorkflowFilter('capture')", workflowCounts.capture)}
            ${filterMenuOption("Needs shipping", productWorkflowFilter === "shipping", "setProductWorkflowFilter('shipping')", workflowCounts.shipping)}
            ${filterMenuOption("Needs images", productWorkflowFilter === "images", "setProductWorkflowFilter('images')", workflowCounts.images)}
            ${filterMenuOption("eBay ready", productWorkflowFilter === "ready", "setProductWorkflowFilter('ready')", workflowCounts.ready)}
            ${filterMenuOption("No source", productWorkflowFilter === "source", "setProductWorkflowFilter('source')", workflowCounts.source)}
            <div class="filter-menu-section">Shipping</div>
            ${filterMenuOption("All shipping", productShippingFilter === "all", "setProductShippingFilter('all')", visibleProductCount)}
            ${filterMenuOption("Free", productShippingFilter === "free", "setProductShippingFilter('free')", shippingCounts.free)}
            ${filterMenuOption("Paid", productShippingFilter === "paid", "setProductShippingFilter('paid')", shippingCounts.paid)}
            ${filterMenuOption("Unknown", productShippingFilter === "unknown", "setProductShippingFilter('unknown')", shippingCounts.unknown)}

      function toggleProductFilterMenu() {
        productFilterMenuOpen = !productFilterMenuOpen;
        listingFilterMenuOpen = false;

      function visibleProducts() {
        return scheduleFilteredProducts().filter((product) => {
          const shippingMatch = productShippingFilter === "all" || shippingState(product).key === productShippingFilter;
          const workflowMatch = productWorkflowFilter === "all" || productWorkflowState(product).key === productWorkflowFilter;
          return shippingMatch && workflowMatch;
        });
      }

      function scheduleFilteredProducts() {
        return draftProducts();
      }

      function draftProducts() {
        return state.products.filter((product) => !isScheduledProduct(product));
      }

      function scheduledProductIdSet() {
        return new Set((state.listingJobs || [])
          .filter((job) => job.listing_schedule_at && !["cancelled", "tombstoned"].includes(job.status))
          .map((job) => job.product_id));
      }

      function isScheduledProduct(product) {
        return Boolean(product.listing_schedule_at) || scheduledProductIdSet().has(product.id);
      }

      function productSelectionToolbarHtml(products) {
        const visibleIds = products.map((product) => product.id);

        const selectedProducts = products.filter((product) => selectedProductIds.has(product.id));
        const accountKeys = [...new Set(selectedProducts.map((product) => selectedProductEbayStoreKey(product.id)).filter(Boolean))];

        const accountOk = Boolean(accountKey) && ebayBrowserAccountOk(accountKey);
        const importTitle = !selectedVisible
          ? "Select products to import"
          : accountKeys.length !== 1
            ? "Select products assigned to one eBay store at a time."

              : ebayBrowserAccountMessage(accountKey);
        return `<div class="selection-toolbar">
          <label class="select-visible-control" title="Select every product currently visible under these filters"><input type="checkbox" aria-label="Select all visible products" ${allVisibleSelected ? "checked" : ""} onchange="toggleVisibleProductSelection(this.checked)" /></label>
          <span class="selection-count">${selectedVisible} item${selectedVisible === 1 ? "" : "s"} selected</span>
          <div class="selection-toolbar-actions">
            ${toolbarIconButton("queueSelectedProductDrafts()", "Import selected", "import", selectedVisible && accountOk, "", importTitle)}

            ${toolbarIconButton("bulkEditSelectedProducts()", "Bulk edit", "edit", selectedVisible)}
            ${toolbarIconButton("deleteSelectedProducts()", "Delete selected", "trash", selectedVisible, "danger")}
            ${toolbarIconButton("openBulkSchedule('products')", "Schedule listings", "calendar", selectedVisible)}
          </div>
        </div>`;
      }

      function selectedVisibleProductIds() {
        return visibleProducts().map((product) => product.id).filter((id) => selectedProductIds.has(id));

          import: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v11m0 0-4-4m4 4 4-4"/><path d="M5 20h14"/></svg>`,

          edit: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`,

          check: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 12 4 4L19 6"/></svg>`,
